<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>칼바람 내전 팀배정 by doyajino</title>
<style>
:root{--gold:#C89B3C;--gdl:#F0E6B2;--gdd:#785A28;--blue:#0BC4E3;--red:#FF4655;--bg:#010A13;--bg2:#0A1628;--pnl:#0D2035;--txt:#A0B4CC;--wh:#F0E6B2;--fn:'Malgun Gothic','맑은 고딕',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 20% 50%,rgba(11,196,227,.04),transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(255,70,85,.04),transparent 60%)}
.wrap{max-width:740px;margin:0 auto;padding:14px 12px;position:relative;z-index:1}
header{text-align:center;margin-bottom:18px}
.badge{display:inline-block;font-size:10px;letter-spacing:3px;color:var(--gold);border:1px solid var(--gdd);padding:3px 12px;margin-bottom:8px}
header h1{font-size:clamp(20px,5vw,36px);color:var(--gdl);text-shadow:0 0 22px rgba(200,155,60,.4)}
header h1 span{color:var(--blue)}
header h1 small{font-size:11px;font-weight:400;color:rgba(200,155,60,.42);margin-left:6px}
.hdiv{width:150px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:9px auto}
header p{font-size:11px;opacity:.55}
.card{background:linear-gradient(135deg,var(--bg2),var(--pnl));border:1px solid var(--gdd);border-radius:4px;padding:14px;margin-bottom:12px;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.stitle{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:3px;height:13px;background:var(--gold);display:block}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.row:last-child{margin-bottom:0}
input{background:rgba(0,0,0,.4);border:1px solid var(--gdd);border-radius:3px;color:var(--wh);font-family:var(--fn);font-size:14px;padding:9px 11px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--gold);box-shadow:0 0 9px rgba(200,155,60,.2)}
input::placeholder{color:#3a5068}
.btn{font-family:var(--fn);font-size:13px;font-weight:700;padding:9px 14px;border:none;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,#C89B3C,#785A28);color:var(--bg)}
.btn-gold:hover{background:linear-gradient(135deg,#F0E6B2,#C89B3C)}
.btn-blue{background:linear-gradient(135deg,#0A324D,#0BC4E3);color:var(--wh)}
.btn-blue:hover{background:linear-gradient(135deg,#0BC4E3,#7BE8F5)}
.btn-red{background:linear-gradient(135deg,#4D0A10,#FF4655);color:var(--wh);font-size:11px;padding:7px 11px}
.btn-ghost{background:transparent;border:1px solid var(--gdd);color:var(--txt);font-size:11px;padding:7px 11px}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none}
.room-code{background:rgba(0,0,0,.4);border:1px solid var(--gdd);border-radius:3px;padding:9px;font-size:22px;font-weight:700;color:var(--gdl);letter-spacing:8px;text-align:center}
.room-hint{font-size:10px;color:var(--txt);opacity:.5;text-align:center;margin-top:5px}
.ptags{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;margin:8px 0}
.ptag{background:rgba(11,196,227,.1);border:1px solid rgba(11,196,227,.28);border-radius:3px;padding:4px 9px;font-size:12px;color:var(--blue);animation:ti .22s ease}
.ptag.me{background:rgba(200,155,60,.08);border-color:rgba(200,155,60,.4);color:var(--gold)}
.ptag.host{background:rgba(200,155,60,.18);border-color:rgba(200,155,60,.8);color:var(--gdl);font-weight:700}
@keyframes ti{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
.pcount{font-size:11px;color:var(--gold);text-align:right}.pcount span{color:var(--wh);font-weight:700}
.sbar{display:flex;align-items:center;gap:7px;margin-bottom:10px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ADE80;flex-shrink:0}
.stxt{font-size:11px;color:var(--txt)}
.warn{background:rgba(255,70,85,.1);border:1px solid rgba(255,70,85,.28);border-radius:3px;padding:7px 10px;font-size:11px;color:var(--red);display:none;margin-top:6px}
.acd{display:none;text-align:center;margin-top:10px;font-size:30px;font-weight:700;color:var(--gold);text-shadow:0 0 18px rgba(200,155,60,.6)}
#pinSec{display:none}
#pinSec .card::before{background:linear-gradient(90deg,var(--blue),transparent,var(--red))}
#pcanvas{display:block;margin:0 auto;border-radius:3px;border:1px solid rgba(200,155,60,.14);max-width:100%}
.pstat{text-align:center;margin-top:9px;font-size:14px;font-weight:700;color:var(--gdl);min-height:20px}
.cbar{text-align:center;margin-top:5px;font-size:20px;font-weight:700;color:var(--red);display:none;text-shadow:0 0 14px var(--red)}
#resSec{display:none}
.tgrid{display:grid;grid-template-columns:1fr 32px 1fr}
.tpnl{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:1px solid;border-radius:4px;overflow:hidden}
.tb{border-color:rgba(11,196,227,.38)}.tr{border-color:rgba(255,70,85,.38)}
.thdr{padding:9px 12px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.thdr-b{background:linear-gradient(135deg,rgba(11,196,227,.13),transparent);color:var(--blue);border-bottom:1px solid rgba(11,196,227,.18)}
.thdr-r{background:linear-gradient(135deg,rgba(255,70,85,.13),transparent);color:var(--red);border-bottom:1px solid rgba(255,70,85,.18)}
.tdot{width:6px;height:6px;border-radius:50%}
.tdb{background:var(--blue);box-shadow:0 0 5px var(--blue)}.tdr{background:var(--red);box-shadow:0 0 5px var(--red)}
.prow{display:flex;align-items:center;gap:9px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);animation:ri .32s ease both}
.prow:last-child{border-bottom:none}
@keyframes ri{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.cimg{width:32px;height:32px;border-radius:50%;border:2px solid var(--gdd);object-fit:cover;flex-shrink:0;background:var(--bg2)}
.pnm{font-size:12px;color:var(--wh);font-weight:600}
.pnk{font-size:9px;color:#4a6a8a;margin-left:auto;text-align:right;max-width:88px;line-height:1.3}
.vcol{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 2px;gap:6px}
.vtxt{font-size:19px;font-weight:700;color:var(--gold);text-shadow:0 0 14px rgba(200,155,60,.5);writing-mode:vertical-rl;letter-spacing:5px}
.vln{width:1px;height:26px;background:linear-gradient(to bottom,transparent,var(--gdd),transparent)}
@media(max-width:420px){
  .tgrid{grid-template-columns:1fr 26px 1fr}
  .thdr{font-size:11px;padding:7px 8px}.vtxt{font-size:14px;letter-spacing:3px}
  .prow{padding:5px 7px;gap:6px}.pnm{font-size:11px}.cimg{width:26px;height:26px}
  .btn{font-size:12px;padding:8px 11px}.room-code{font-size:16px;letter-spacing:5px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="badge">LEAGUE OF LEGENDS</div>
  <h1>칼바람 <span>내전</span> 팀배정 <small>by doyajino</small></h1>
  <div class="hdiv"></div>
  <p>방 코드를 공유하면 모두가 실시간으로 참가할 수 있어요</p>
</header>

<div class="card" id="entrySec">
  <div class="stitle">방 입장</div>
  <div class="row"><input id="nickIn" placeholder="내 닉네임 입력..." maxlength="12"/></div>
  <div class="row">
    <input id="codeIn" placeholder="방 코드 입력 (없으면 새 방 생성)" maxlength="6" style="letter-spacing:3px;text-transform:uppercase;flex:1"/>
    <button class="btn btn-gold" onclick="joinRoom()">입장</button>
  </div>
  <div class="warn" id="entryWarn"></div>
</div>

<div id="lobbySec" style="display:none">
  <div class="card">
    <div class="stitle">현재 방</div>
    <div class="room-code" id="roomDisp">------</div>
    <div class="room-hint">이 코드를 친구들에게 공유하세요</div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-ghost" onclick="copyCode()">🔗 코드 복사</button>
      <button class="btn btn-red" onclick="leaveRoom()" style="margin-left:auto">나가기</button>
    </div>
  </div>
  <div class="card">
    <div class="stitle">참가자</div>
    <div class="sbar"><div class="sdot" id="sdot"></div><div class="stxt" id="stxt">연결 중...</div></div>
    <div class="ptags" id="ptags"></div>
    <div class="pcount">참가자 <span id="pcnt">0</span> / 10명</div>
    <div class="acd" id="acd"></div>
    <div class="warn" id="lobbyWarn"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-blue" id="startBtn" onclick="startGame()" disabled>🎯 팀 배정 시작</button>
      <button class="btn btn-red" id="resetBtn" onclick="resetPlayers()" style="display:none;margin-left:auto">초기화</button>
    </div>
  </div>
</div>

<div id="pinSec">
  <div class="card">
    <div class="stitle">핀볼 팀 배정</div>
    <canvas id="pcanvas"></canvas>
    <div class="pstat" id="pstat"></div>
    <div class="cbar" id="cbar"></div>
  </div>
</div>

<div id="resSec">
  <div class="stitle" style="margin-bottom:10px">🏆 팀 배정 결과</div>
  <div class="tgrid">
    <div class="tpnl tb"><div class="thdr thdr-b"><div class="tdot tdb"></div>블루팀</div><div id="bList"></div></div>
    <div class="vcol"><div class="vln"></div><div class="vtxt">VS</div><div class="vln"></div></div>
    <div class="tpnl tr"><div class="thdr thdr-r"><div class="tdot tdr"></div>레드팀</div><div id="rList"></div></div>
  </div>
  <div style="text-align:center;margin-top:12px">
    <button class="btn btn-gold" onclick="reRoll()">🔄 다시 배정</button>
  </div>
</div>

</div><!-- /wrap -->

<script>
// ════════════════════════════════════════════════════
// Storage API 헬퍼 (Anthropic 내장 - 미리보기에서 작동)
// ════════════════════════════════════════════════════
async function stGet(key, shared=true){
  try{ const r=await window.storage.get(key,shared); return r?JSON.parse(r.value):null; }catch(e){ return null; }
}
async function stSet(key, val, shared=true){
  try{ await window.storage.set(key,JSON.stringify(val),shared); return true; }catch(e){ return false; }
}
async function stDel(key, shared=true){
  try{ await window.storage.delete(key,shared); }catch(e){}
}

// ════════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════════
const myId = 'u'+Math.random().toString(36).slice(2,9);
let myName='', roomId='', isHost=false, hostId='';
let players={}, animFrame=null, autoTimer=null, pollTimer=null;
let lastEvTs=0;

// ════════════════════════════════════════════════════
// 방 관리
// ════════════════════════════════════════════════════
function genCode(){ return Math.random().toString(36).slice(2,8).toUpperCase(); }

async function joinRoom(){
  const nick=document.getElementById('nickIn').value.trim();
  let code=document.getElementById('codeIn').value.trim().toUpperCase();
  const warn=document.getElementById('entryWarn');
  if(!nick){ showW(warn,'닉네임을 입력하세요'); return; }
  warn.style.display='none';
  myName=nick;
  if(!code) code=genCode();
  roomId=code;

  document.getElementById('entrySec').style.display='none';
  document.getElementById('lobbySec').style.display='block';
  document.getElementById('roomDisp').textContent=roomId;
  document.getElementById('stxt').textContent='연결 중...';

  // 방 상태 초기화 또는 로드
  let room = await stGet('room:'+roomId);
  if(!room){
    room = { host: myId, players:{}, ev:null, ts: Date.now() };
    hostId=myId; isHost=true;
  } else {
    hostId=room.host||'';
    isHost=(hostId===myId);
  }

  // 내 플레이어 등록
  room.players=room.players||{};
  room.players[myId]=myName;
  await stSet('room:'+roomId, room);

  renderPlayers(room.players, room.host);
  document.getElementById('stxt').textContent='🟢 연결됨 | '+Object.keys(room.players).length+'명 접속 중';
  document.getElementById('resetBtn').style.display=isHost?'block':'none';

  // 폴링 시작 (1초마다 상태 동기화)
  startPolling();
}

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    if(!roomId) return;
    const room=await stGet('room:'+roomId);
    if(!room) return;

    // 플레이어 목록 갱신
    players=room.players||{};
    hostId=room.host||'';
    isHost=(hostId===myId);
    document.getElementById('resetBtn').style.display=isHost?'block':'none';
    renderPlayers(players, hostId);

    // 이벤트 처리 (새 이벤트만)
    const ev=room.ev;
    if(ev && ev.ts && ev.ts>lastEvTs){
      lastEvTs=ev.ts;
      handleEv(ev);
    }
  }, 1000);
}

async function leaveRoom(){
  if(pollTimer){ clearInterval(pollTimer); pollTimer=null; }
  cancelAutoCountdown();
  if(roomId){
    const room=await stGet('room:'+roomId);
    if(room && room.players){
      delete room.players[myId];
      // 방이 비었으면 삭제, 아니면 업데이트
      if(Object.keys(room.players).length===0){
        await stDel('room:'+roomId);
      } else {
        // 내가 호스트였으면 다음 사람에게 위임
        if(room.host===myId){
          room.host=Object.keys(room.players)[0];
        }
        await stSet('room:'+roomId, room);
      }
    }
  }
  players={}; roomId=''; isHost=false; animFrame=null;
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('pinSec').style.display='none';
  document.getElementById('resSec').style.display='none';
  document.getElementById('entrySec').style.display='block';
}

async function resetPlayers(){
  if(!isHost) return;
  const room=await stGet('room:'+roomId);
  if(!room) return;
  // 나만 남기고 전부 제거
  room.players={ [myId]: myName };
  await stSet('room:'+roomId, room);
  players=room.players;
  renderPlayers(players, hostId);
}

function copyCode(){
  navigator.clipboard?.writeText(roomId).then(()=>{
    const b=event.target; b.textContent='✅ 복사됨!';
    setTimeout(()=>b.textContent='🔗 코드 복사',1500);
  });
}

// ════════════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════════════
function renderPlayers(pls, hId){
  const wrap=document.getElementById('ptags');
  const cnt=document.getElementById('pcnt');
  const startBtn=document.getElementById('startBtn');
  const n=Object.keys(pls||{}).length;
  wrap.innerHTML='';
  Object.entries(pls||{}).forEach(([id,name])=>{
    const t=document.createElement('div');
    const isMe=(id===myId), isH=(id===hId);
    t.className='ptag'+(isH?' host':'')+(isMe?' me':'');
    t.textContent=(isH?'👑 ':'')+name+(isMe?' (나)':'');
    wrap.appendChild(t);
  });
  cnt.textContent=n;
  startBtn.disabled=!isHost||n<10;
  document.getElementById('stxt').textContent='🟢 연결됨 | '+n+'명 접속 중';

  if(n>=10){ startAutoCountdown(); }
  else { cancelAutoCountdown(); }
}

function showW(el,msg){ el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',2500); }

// ════════════════════════════════════════════════════
// 자동 카운트다운
// ════════════════════════════════════════════════════
function startAutoCountdown(){
  if(autoTimer) return;
  let cnt=5;
  const el=document.getElementById('acd');
  el.style.display='block';
  el.textContent='⏱ '+cnt+'초 후 자동 시작!';
  autoTimer=setInterval(()=>{
    cnt--;
    if(cnt>0){ el.textContent='⏱ '+cnt+'초 후 자동 시작!'; }
    else{
      clearInterval(autoTimer); autoTimer=null;
      el.style.display='none';
      if(isHost) startGame();
    }
  },1000);
}

function cancelAutoCountdown(){
  if(!autoTimer) return;
  clearInterval(autoTimer); autoTimer=null;
  document.getElementById('acd').style.display='none';
}

// ════════════════════════════════════════════════════
// 게임 이벤트
// ════════════════════════════════════════════════════
async function sendEv(ev){
  const room=await stGet('room:'+roomId);
  if(!room) return;
  ev.ts=Date.now();
  room.ev=ev;
  lastEvTs=ev.ts;
  await stSet('room:'+roomId, room);
  handleEv(ev);
}

function handleEv(ev){
  if(!ev) return;
  if(ev.type==='start'){ launchPinball(ev.shuffled); }
  else if(ev.type==='result'){ showResult(ev.blue, ev.red); }
}

async function startGame(){
  const room=await stGet('room:'+roomId);
  if(!room) return;
  const names=Object.values(room.players||{});
  if(names.length<10) return;
  const shuffled=[...names].sort(()=>Math.random()-.5);
  await sendEv({type:'start', shuffled});
}

function reRoll(){ if(isHost) startGame(); }

// ════════════════════════════════════════════════════
// 핀볼
// ════════════════════════════════════════════════════
function launchPinball(names){
  document.getElementById('pinSec').style.display='block';
  document.getElementById('resSec').style.display='none';
  document.getElementById('pinSec').scrollIntoView({behavior:'smooth',block:'start'});
  runPinball(names, async(results)=>{
    const half=Math.floor(names.length/2);
    const blue=results.filter(b=>b.slot<half).map(b=>b.name);
    const red=results.filter(b=>b.slot>=half).map(b=>b.name);
    await sendEv({type:'result', blue, red});
  });
}

function runPinball(names, onDone){
  const canvas=document.getElementById('pcanvas');
  const statEl=document.getElementById('pstat');
  const cdEl=document.getElementById('cbar');
  cdEl.style.display='none'; statEl.textContent='';

  const W=Math.min(680,window.innerWidth-24);
  const H=Math.round(W*.85);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const N=names.length;
  const SW=W/N;
  const BR=Math.max(9,Math.min(14,Math.floor(W/(N*2.9))));
  const GY=H-Math.round(H*.19);
  const FY=H-Math.round(H*.08);
  const HALF=Math.floor(N/2);

  const COLS=['#FF4655','#0BC4E3','#F5C518','#4ADE80','#C084FC','#FB923C','#38BDF8','#F472B6','#A3E635','#FDE68A'];
  const LABS=Array.from({length:N},(_,i)=>i<HALF?'블루'+(i+1):'레드'+(i-HALF+1));

  const pegs=[];
  const PR=Math.max(4,Math.min(7,Math.round(H*.54/48)));
  const PC=Math.max(5,Math.min(11,N+2));
  for(let r=0;r<PR;r++) for(let c=0;c<PC;c++){
    const off=(r%2===0)?SW*.5:0;
    pegs.push({x:SW*.3+off+c*(W-SW*.6)/(PC-1),y:Math.round(H*.1)+r*Math.round((GY-H*.14)/PR),lit:0});
  }

  const bumps=[
    {x:W*.22,y:H*.35,r:Math.round(W*.025),lit:0},
    {x:W*.78,y:H*.35,r:Math.round(W*.025),lit:0},
    {x:W*.50,y:H*.42,r:Math.round(W*.025),lit:0},
    {x:W*.34,y:H*.54,r:Math.round(W*.022),lit:0},
    {x:W*.66,y:H*.54,r:Math.round(W*.022),lit:0},
  ];

  const parts=[];
  function spark(x,y,col){
    for(let i=0;i<14;i++){
      const a=(Math.PI*2/14)*i,sp=1.1+Math.random()*2.3;
      parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.1,life:1,decay:.034+Math.random()*.024,r:2+Math.random()*2.8,col});
    }
  }

  const balls=names.map((name,i)=>({
    name, col:COLS[i%COLS.length],
    x:W/2+(Math.random()-.5)*48, y:-BR*2-i*290,
    vx:(Math.random()-.5)*.28, vy:0,
    landed:false, slot:-1, sq:1.0
  }));

  const taken=new Set();
  let lc=0, done=false;
  const G=0.015, PF=0.54, BB=2.1;
  let cdTimer=null, cdOn=false;

  function chkCD(){
    if(cdOn||done) return;
    const thr=Math.max(2,Math.floor(N*.8));
    if(lc>=thr&&lc<N){
      cdOn=true; let cnt=5;
      cdEl.style.display='block'; cdEl.textContent='⏱ '+cnt+'초 후 자동 배정';
      cdTimer=setInterval(()=>{
        cnt--;
        cdEl.textContent=cnt>0?'⏱ '+cnt+'초 후 자동 배정':'⚡ 자동 배정!';
        if(cnt<=0){ clearInterval(cdTimer); forceAssign(); }
      },1000);
    }
  }

  function forceAssign(){
    const free=Array.from({length:N},(_,i)=>i).filter(s=>!taken.has(s));
    balls.forEach(b=>{
      if(b.landed) return;
      const s=free.shift()??0;
      taken.add(s); b.slot=s; b.x=(s+.5)*SW; b.y=FY-BR-1;
      b.vx=0; b.vy=0; b.landed=true; b.sq=1.3; lc++;
      spark(b.x,GY,b.col);
    });
    cdEl.style.display='none';
  }

  if(animFrame) cancelAnimationFrame(animFrame);

  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#010A13'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(11,196,227,.028)'; ctx.fillRect(0,0,HALF*SW,H);
    ctx.fillStyle='rgba(255,70,85,.028)'; ctx.fillRect(HALF*SW,0,W-HALF*SW,H);

    ctx.save(); ctx.strokeStyle='rgba(200,155,60,.22)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(HALF*SW,0); ctx.lineTo(HALF*SW,GY-10); ctx.stroke(); ctx.restore();

    for(let i=0;i<=N;i++){
      ctx.strokeStyle=i<=HALF?'rgba(11,196,227,.6)':'rgba(255,70,85,.6)';
      ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(i*SW,GY-17); ctx.lineTo(i*SW,FY); ctx.stroke();
    }
    for(let i=0;i<N;i++){
      const cx=(i+.5)*SW, tc=i<HALF?'#0BC4E3':'#FF4655', fi=taken.has(i);
      ctx.strokeStyle=fi?tc:tc+'3A'; ctx.lineWidth=fi?2:1.2;
      ctx.beginPath(); ctx.moveTo(i*SW+2,GY-17); ctx.lineTo(cx-3,GY-25); ctx.lineTo(cx+3,GY-25); ctx.lineTo((i+1)*SW-2,GY-17); ctx.stroke();
      ctx.fillStyle=fi?tc:tc+'44';
      ctx.font='bold '+Math.max(6,Math.round(SW*.16))+'px Malgun Gothic,sans-serif'; ctx.textAlign='center';
      ctx.fillText(LABS[i],cx,GY-28);
      if(fi){
        ctx.fillStyle=i<HALF?'rgba(11,196,227,.065)':'rgba(255,70,85,.065)';
        ctx.fillRect(i*SW+1,GY,SW-2,FY-GY);
        ctx.fillStyle=tc; ctx.fillRect(i*SW+1,GY-5,SW-2,5);
        ctx.save(); ctx.shadowColor=tc; ctx.shadowBlur=6;
        ctx.fillStyle=tc+'88'; ctx.fillRect(i*SW+1,GY-5,SW-2,5); ctx.restore();
      }
    }
    ctx.strokeStyle='rgba(200,155,60,.42)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,FY); ctx.lineTo(W,FY); ctx.stroke();

    pegs.forEach(p=>{
      if(p.lit>0) p.lit--;
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle=p.lit>0?'#FFD700':'rgba(200,155,60,.48)'; ctx.fill();
    });

    bumps.forEach(b=>{
      if(b.lit>0) b.lit--;
      const l=b.lit>0;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);
      ctx.strokeStyle=l?'#FF4655':'rgba(255,70,85,.28)'; ctx.lineWidth=l?2:1.3; ctx.stroke();
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);
      g.addColorStop(0,l?'rgba(255,70,85,.58)':'rgba(255,70,85,.09)'); g.addColorStop(1,'transparent');
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
      ctx.fillStyle=l?'#fff':'rgba(255,70,85,.55)';
      ctx.font='bold '+b.r+'px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('!',b.x,b.y); ctx.textBaseline='alphabetic';
    });

    for(let i=parts.length-1;i>=0;i--){
      const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=.07; p.life-=p.decay;
      if(p.life<=0){parts.splice(i,1);continue;}
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0'); ctx.fill();
    }

    balls.forEach(b=>{
      if(b.landed){ if(b.sq!==1){b.sq+=(1-b.sq)*.13;if(Math.abs(b.sq-1)<.01)b.sq=1;} drawBall(b); return; }
      b.vy+=G; b.x+=b.vx; b.y+=b.vy;
      if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*.68;}
      if(b.x+BR>W){b.x=W-BR;b.vx=-Math.abs(b.vx)*.68;}
      pegs.forEach(p=>{
        const dx=b.x-p.x,dy=b.y-p.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<BR+4&&d>0){const nx=dx/d,ny=dy/d,dot=b.vx*nx+b.vy*ny;
          b.vx=(b.vx-2*dot*nx)*PF; b.vy=(b.vy-2*dot*ny)*PF;
          b.x=p.x+nx*(BR+5); b.y=p.y+ny*(BR+5); b.vx+=(Math.random()-.5)*.35; p.lit=7;}
      });
      bumps.forEach(bm=>{
        const dx=b.x-bm.x,dy=b.y-bm.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<BR+bm.r&&d>0){const nx=dx/d,ny=dy/d;
          b.vx=nx*BB+(Math.random()-.5)*.9; b.vy=ny*BB-1.1; b.vy=Math.min(b.vy,-.55);
          b.x=bm.x+nx*(BR+bm.r+2); b.y=bm.y+ny*(BR+bm.r+2); bm.lit=11;}
      });
      if(b.y+BR>GY){
        for(let i=0;i<=N;i++){
          const wx=i*SW;
          if(b.x-BR<wx&&b.x+BR>wx){ b.vx=(b.x<wx?1:-1)*Math.abs(b.vx)*.38; b.x=b.x<wx?wx+BR:wx-BR; }
        }
        b.vx*=.82;
        const cs=Math.floor(b.x/SW);
        if(cs>=0&&cs<N&&taken.has(cs)&&b.y-BR<GY&&b.y+BR>GY-5){
          b.y=GY-BR-4; b.vy=-(Math.abs(b.vy)*.72+1.1); b.vx+=(Math.random()-.5)*1.1;
        }
      }
      if(b.y+BR>=FY){
        let si=Math.max(0,Math.min(N-1,Math.floor(b.x/SW)));
        if(taken.has(si)){for(let d=1;d<N;d++){if(!taken.has(si-d)&&si-d>=0){si-=d;break;}if(!taken.has(si+d)&&si+d<N){si+=d;break;}}}
        taken.add(si); b.slot=si; b.x=(si+.5)*SW; b.y=FY-BR-1;
        b.vx=0;b.vy=0;b.landed=true;b.sq=1.32; lc++; spark(b.x,GY,b.col); chkCD();
      }
      drawBall(b);
    });

    if(lc===N&&!done){
      done=true; cdEl.style.display='none';
      if(cdTimer) clearInterval(cdTimer);
      statEl.textContent='⚡ 배정 완료! 결과 확인하세요 🎉';
      onDone(balls.map(b=>({name:b.name,slot:b.slot})));
    } else if(!done){
      statEl.textContent='배정 중... ('+lc+'/'+N+')';
    }
    animFrame=requestAnimationFrame(frame);
  }

  function drawBall(b){
    const bx=b.x,by=b.y,sq=b.sq||1;
    const sx=sq>1?1+(sq-1)*.48:sq<1?1+(1-sq)*.28:1;
    const sy=sq>1?1-(sq-1)*.38:sq<1?1-(1-sq)*.22:1;
    ctx.save(); ctx.translate(bx,by); ctx.scale(sx,sy);
    ctx.beginPath(); ctx.arc(2,3,BR,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,.36)'; ctx.fill();
    const gl=ctx.createRadialGradient(0,0,BR*.28,0,0,BR+4);
    gl.addColorStop(0,b.col+'AA'); gl.addColorStop(.5,b.col+'3A'); gl.addColorStop(1,'transparent');
    ctx.beginPath(); ctx.arc(0,0,BR+4,0,Math.PI*2); ctx.fillStyle=gl; ctx.fill();
    const gr=ctx.createRadialGradient(-BR*.26,-BR*.26,1,0,0,BR);
    gr.addColorStop(0,b.col+'FF'); gr.addColorStop(.52,b.col+'CC'); gr.addColorStop(1,b.col+'60');
    ctx.beginPath(); ctx.arc(0,0,BR,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
    ctx.beginPath(); ctx.arc(-BR*.27,-BR*.28,BR*.28,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.3)'; ctx.fill();
    ctx.beginPath(); ctx.arc(0,0,BR,0,Math.PI*2); ctx.strokeStyle=b.col; ctx.lineWidth=1.7; ctx.stroke();
    ctx.save(); ctx.scale(1/sx,1/sy);
    const fs=Math.max(6,Math.round(BR*.56));
    ctx.font='bold '+fs+'px "Malgun Gothic","맑은 고딕",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const lbl=b.name.length>4?b.name.slice(0,3)+'…':b.name;
    ctx.strokeStyle='rgba(0,0,0,.72)'; ctx.lineWidth=2.1; ctx.strokeText(lbl,0,0);
    ctx.fillStyle='#fff'; ctx.fillText(lbl,0,0);
    ctx.restore(); ctx.restore();
  }

  frame();
}

const CHAMPS=["Ahri","Akali","Alistar","Amumu","Anivia","Annie","Ashe","Azir","Bard","Blitzcrank","Brand","Braum","Caitlyn","Camille","Cassiopeia","Darius","Diana","Draven","Ekko","Elise","Evelynn","Ezreal","Fiora","Fizz","Galio","Gangplank","Garen","Gragas","Graves","Hecarim","Irelia","Janna","Jax","Jayce","Jhin","Jinx","Karma","Karthus","Kassadin","Katarina","Kayle","Kennen","Lissandra","Lucian","Lulu","Lux","Malphite","Malzahar","Maokai","Mordekaiser","Morgana","Nami","Nasus","Nautilus","Nidalee","Nocturne","Olaf","Orianna","Pantheon","Poppy","Pyke","Quinn","Rammus","Riven","Rumble","Ryze","Sejuani","Shaco","Shen","Singed","Sion","Sivir","Sona","Soraka","Swain","Syndra","Talon","Taric","Teemo","Thresh","Tristana","Tryndamere","Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vi","Viktor","Vladimir","Volibear","Warwick","Yasuo","Zac","Zed","Ziggs","Zilean","Zoe","Zyra"];
const CFIXES={"Twisted Fate":"TwistedFate","Lee Sin":"LeeSin","Miss Fortune":"MissFortune","Xin Zhao":"XinZhao"};
function cUrl(c){const k=CFIXES[c]||c.replace(/[^a-zA-Z]/g,'');return 'https://ddragon.leagueoflegends.com/cdn/14.9.1/img/champion/'+k+'.png';}
function rC(){return CHAMPS[Math.floor(Math.random()*CHAMPS.length)];}
const NP=['스밍하는','최애픽','입덕한','덕밍아웃한','오열중인','억텐하는','감성폭발','뇌절중인','마상입은','심쿵한','혼파망한','우리편','킹받는','사이다','갓생사는','무지성','극호감','노빠꾸','존맛탱','찐이야','소름돋는','직캠각','포텐폭발'];
const NS=['아히리','야스오','베인','룰루','소나','럭스','세나','카이사','징크스','이즈리얼','드레이븐','잔나','나미','레오나','타릭','티모','제드','아무무','가렌','다리우스','리신','신드라','에코','피즈','빅토르','블라디미르','카밀','트리스타나'];
function rNick(c){const p=NP[Math.floor(Math.random()*NP.length)],s=Math.random()<.5?NS[Math.floor(Math.random()*NS.length)]:c;return p+' '+s;}

function showResult(blue,red){
  document.getElementById('resSec').style.display='block';
  document.getElementById('resSec').scrollIntoView({behavior:'smooth'});
  const bl=document.getElementById('bList'), rl=document.getElementById('rList');
  bl.innerHTML=''; rl.innerHTML='';
  function mkRow(name,i){
    const ch=rC(), row=document.createElement('div');
    row.className='prow'; row.style.animationDelay=(i*65)+'ms';
    const img=document.createElement('img'); img.className='cimg'; img.src=cUrl(ch); img.alt=ch; img.onerror=()=>img.style.display='none';
    const nm=document.createElement('div'); nm.className='pnm'; nm.textContent=name;
    const nk=document.createElement('div'); nk.className='pnk'; nk.textContent=rNick(ch);
    row.append(img,nm,nk); return row;
  }
  blue.forEach((n,i)=>bl.appendChild(mkRow(n,i)));
  red.forEach((n,i)=>rl.appendChild(mkRow(n,i)));
}
