<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포동포동 칼바람 내전 by doyajino</title>
<style>
:root{
  --pk-y:#FFCB05;--pk-b:#3D7DCA;--pk-r:#CC0000;--pk-d:#003A70;
  --bg:#0A1A2E;--bg2:#0D2340;--pnl:#112952;
  --txt:#B8CCE8;--wh:#F0F8FF;
  --fn:'Malgun Gothic','맑은 고딕',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 20%,rgba(255,203,5,.05),transparent 50%),
             radial-gradient(ellipse at 85% 80%,rgba(61,125,202,.07),transparent 50%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(255,203,5,.03) 1px,transparent 1px);background-size:32px 32px}
.wrap{max-width:760px;margin:0 auto;padding:14px 12px;position:relative;z-index:1}

/* 헤더 */
header{text-align:center;margin-bottom:14px;padding:16px 12px;
  background:linear-gradient(135deg,rgba(13,35,64,.95),rgba(17,41,82,.95));
  border:2px solid var(--pk-y);border-radius:8px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--pk-r),var(--pk-y),var(--pk-b))}
.pk-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:4px}
.pk-ball{width:20px;height:20px;border-radius:50%;
  background:linear-gradient(180deg,var(--pk-r) 50%,white 50%);
  border:2px solid var(--pk-d);position:relative;flex-shrink:0}
.pk-ball::after{content:'';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);width:5px;height:5px;
  background:white;border-radius:50%;border:1.5px solid var(--pk-d)}
header h1{font-size:clamp(17px,4vw,30px);color:var(--pk-y);
  text-shadow:2px 2px 0 var(--pk-d),0 0 18px rgba(255,203,5,.5);letter-spacing:.5px}
header p{font-size:10px;color:var(--txt);opacity:.55;margin-top:3px}

/* 탭 */
.tab-nav{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;
  margin-bottom:12px;background:rgba(0,0,0,.4);
  border:2px solid rgba(61,125,202,.3);border-radius:6px;padding:4px}
.tab-btn{padding:8px 4px;border:none;border-radius:4px;cursor:pointer;
  font-family:var(--fn);font-size:11px;font-weight:700;color:var(--txt);
  background:transparent;transition:all .18s;
  display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn .ti{font-size:15px}
.tab-btn.active{background:linear-gradient(135deg,var(--pk-d),var(--pnl));
  color:var(--pk-y);border:1px solid var(--pk-y);box-shadow:0 0 8px rgba(255,203,5,.2)}
.tab-btn:hover:not(.active){color:var(--wh);background:rgba(255,255,255,.05)}

/* 카드 */
.card{background:linear-gradient(135deg,var(--bg2),var(--pnl));
  border:1px solid rgba(61,125,202,.35);border-radius:6px;
  padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--pk-y),transparent)}
.stitle{font-size:11px;font-weight:700;color:var(--pk-y);letter-spacing:2px;
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:3px;height:13px;background:var(--pk-y);flex-shrink:0;border-radius:2px}

/* 입력/버튼 */
input,select{background:rgba(0,0,0,.45);border:1px solid rgba(61,125,202,.4);
  border-radius:4px;color:var(--wh);font-family:var(--fn);font-size:13px;
  padding:8px 11px;outline:none;transition:all .2s;width:100%}
input:focus,select:focus{border-color:var(--pk-y);box-shadow:0 0 8px rgba(255,203,5,.2)}
input::placeholder{color:#3a5a7a}
select option{background:var(--bg2)}
.btn{font-family:var(--fn);font-size:12px;font-weight:700;padding:8px 14px;
  border:none;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.96)}
.btn-y{background:linear-gradient(135deg,#9a7800,var(--pk-y));color:var(--pk-d)}
.btn-y:hover:not(:disabled){background:linear-gradient(135deg,var(--pk-y),#FFE566)}
.btn-b{background:linear-gradient(135deg,#1a4a8a,var(--pk-b));color:white}
.btn-b:hover:not(:disabled){background:linear-gradient(135deg,var(--pk-b),#6BA3E0)}
.btn-r{background:linear-gradient(135deg,#880000,var(--pk-r));color:white;font-size:11px;padding:6px 11px}
.btn-g{background:linear-gradient(135deg,#1a5c1a,#4CAF50);color:white;font-size:11px;padding:6px 11px}
.btn-ghost{background:transparent;border:1px solid rgba(61,125,202,.4);color:var(--txt);font-size:11px;padding:6px 11px}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.row{display:flex;gap:7px;align-items:stretch;margin-bottom:8px}
.row:last-child{margin-bottom:0}
.warn{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.28);
  border-radius:4px;padding:6px 10px;font-size:11px;color:#FF8888;display:none;margin-top:5px}

/* 방 카드 */
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.room-card{background:linear-gradient(160deg,var(--bg2),var(--pnl));
  border:2px solid rgba(61,125,202,.35);border-radius:6px;
  padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.room-card:hover{transform:translateY(-3px)}
.room-card.r1{border-color:rgba(61,125,202,.4)}.room-card.r1:hover{border-color:var(--pk-b);box-shadow:0 6px 20px rgba(61,125,202,.25)}
.room-card.r2{border-color:rgba(255,203,5,.35)}.room-card.r2:hover{border-color:var(--pk-y);box-shadow:0 6px 20px rgba(255,203,5,.18)}
.room-card.r3{border-color:rgba(204,0,0,.35)}.room-card.r3:hover{border-color:var(--pk-r);box-shadow:0 6px 20px rgba(204,0,0,.25)}
.room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.room-card.r1::before{background:var(--pk-b)}.room-card.r2::before{background:var(--pk-y)}.room-card.r3::before{background:var(--pk-r)}
.room-num{font-size:28px;font-weight:700;margin-bottom:3px}
.room-card.r1 .room-num{color:var(--pk-b)}.room-card.r2 .room-num{color:var(--pk-y)}.room-card.r3 .room-num{color:var(--pk-r)}
.room-name{font-size:11px;color:var(--txt);margin-bottom:8px}
.rbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.rb-open{background:rgba(76,175,80,.14);color:#4CAF50;border:1px solid rgba(76,175,80,.3)}
.rb-full{background:rgba(204,0,0,.14);color:var(--pk-r);border:1px solid rgba(204,0,0,.28)}
.room-pc{font-size:11px;color:var(--txt);margin-top:5px;opacity:.7}

/* 참가자 */
.ptags{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;margin:8px 0}
.ptag{background:rgba(61,125,202,.14);border:1px solid rgba(61,125,202,.32);
  border-radius:12px;padding:4px 10px;font-size:11px;color:#7AB8E8;
  display:flex;align-items:center;gap:5px;animation:ti .2s ease}
.ptag .del{background:none;border:none;color:rgba(204,0,0,.45);cursor:pointer;font-size:12px;padding:0}
.ptag .del:hover{color:var(--pk-r)}
@keyframes ti{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.pcount{font-size:11px;color:var(--pk-y);text-align:right;margin-top:3px}
.pcount span{color:var(--wh);font-weight:700}
.sbar{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0;transition:background .3s}
.sdot.off{background:var(--pk-r)}
.stxt{font-size:10px;color:var(--txt)}
.acd{display:none;text-align:center;margin-top:8px;font-size:26px;font-weight:700;
  color:var(--pk-y);text-shadow:0 0 16px rgba(255,203,5,.6)}

/* 핀볼 */
#pinSec{display:none}
#pinSec .card::before{background:linear-gradient(90deg,var(--pk-b),var(--pk-y),var(--pk-r))}
#pcanvas{display:block;margin:0 auto;border-radius:4px;border:2px solid rgba(61,125,202,.28);max-width:100%}
.pstat{text-align:center;margin-top:8px;font-size:13px;font-weight:700;color:var(--pk-y);min-height:20px}
.cbar{text-align:center;margin-top:5px;font-size:17px;font-weight:700;color:var(--pk-r);display:none}

/* 배정 결과 */
#resSec{display:none}
.tgrid{display:grid;grid-template-columns:1fr 28px 1fr}
.tpnl{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:1px solid;border-radius:4px;overflow:hidden}
.tb{border-color:rgba(61,125,202,.35)}.tr{border-color:rgba(204,0,0,.32)}
.thdr{padding:8px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.thdr-b{background:linear-gradient(135deg,rgba(61,125,202,.18),transparent);color:var(--pk-b);border-bottom:1px solid rgba(61,125,202,.18)}
.thdr-r{background:linear-gradient(135deg,rgba(204,0,0,.16),transparent);color:var(--pk-r);border-bottom:1px solid rgba(204,0,0,.15)}
.tdot{width:6px;height:6px;border-radius:50%}
.tdb{background:var(--pk-b);box-shadow:0 0 5px var(--pk-b)}.tdr{background:var(--pk-r);box-shadow:0 0 5px var(--pk-r)}
.prow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);animation:ri .3s ease both}
.prow:last-child{border-bottom:none}
@keyframes ri{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.pnm{font-size:12px;color:var(--wh);font-weight:600}
.vcol{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 1px;gap:5px}
.vtxt{font-size:17px;font-weight:700;color:var(--pk-y);text-shadow:0 0 12px rgba(255,203,5,.5);writing-mode:vertical-rl;letter-spacing:4px}
.vln{width:1px;height:22px;background:linear-gradient(to bottom,transparent,rgba(255,203,5,.3),transparent)}

/* 배정결과 목록 */
.res-item{background:rgba(0,0,0,.22);border:1px solid rgba(61,125,202,.18);
  border-radius:5px;padding:10px 12px;margin-bottom:7px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.res-meta{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.res-room{font-size:10px;font-weight:700;color:var(--pk-y)}
.res-time{font-size:10px;color:var(--txt);opacity:.6}
.res-teams{font-size:10px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.res-teams .b{color:var(--pk-b)}.res-teams .r{color:var(--pk-r)}
.no-data{text-align:center;padding:28px;color:var(--txt);opacity:.45;font-size:12px}
.filter-row{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{font-family:var(--fn);font-size:10px;font-weight:700;padding:4px 10px;
  border:1px solid rgba(61,125,202,.35);border-radius:12px;cursor:pointer;
  background:transparent;color:var(--txt);transition:all .15s}
.filter-btn.on{background:rgba(61,125,202,.25);color:var(--pk-b);border-color:var(--pk-b)}

/* 순위 */
.rank-tbl{width:100%;border-collapse:collapse}
.rank-tbl th{padding:7px 8px;font-size:10px;color:var(--pk-y);
  border-bottom:1px solid rgba(255,203,5,.18);letter-spacing:.5px;text-align:left}
.rank-tbl td{padding:6px 8px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.rank-tbl tr:last-child td{border-bottom:none}
.rank-tbl tr:hover td{background:rgba(255,255,255,.03)}
.rnum{font-weight:700;color:var(--pk-y);font-size:13px;width:26px;text-align:center}
.rnum.g1{color:#FFD700;font-size:16px}.rnum.g2{color:#C0C0C0;font-size:15px}.rnum.g3{color:#CD7F32;font-size:14px}
.rname{color:var(--wh);font-weight:600}
.rwr{font-weight:700}
.wh{color:#4CAF50}.wm{color:var(--pk-y)}.wl{color:var(--pk-r)}
.rrec{font-size:10px;color:var(--txt);opacity:.65}

/* 관리자 */
.admin-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,203,5,.12);
  border:1px solid rgba(255,203,5,.35);border-radius:12px;padding:3px 10px;
  font-size:10px;color:var(--pk-y);margin-bottom:8px}
.rank-input-row{display:grid;grid-template-columns:1fr 60px 60px 70px auto;
  gap:5px;align-items:center;margin-bottom:6px;
  padding:7px;background:rgba(0,0,0,.2);border-radius:4px}
.rank-input-row .pname{font-size:12px;color:var(--wh);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-input-row input{padding:5px 7px;font-size:11px}

/* 모달 */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;
  display:none;align-items:center;justify-content:center;padding:20px}
.modal-ov.show{display:flex}
.modal{background:linear-gradient(135deg,var(--bg2),var(--pnl));
  border:2px solid var(--pk-y);border-radius:8px;padding:20px;
  width:100%;max-width:360px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--pk-b),var(--pk-y),var(--pk-r));border-radius:8px 8px 0 0}
.modal h3{font-size:14px;color:var(--pk-y);margin-bottom:14px;display:flex;align-items:center;gap:6px}

@media(max-width:480px){
  .rooms-grid{grid-template-columns:1fr}
  .room-card{display:flex;align-items:center;gap:12px;text-align:left;padding:12px}
  .room-num{font-size:20px;margin:0;min-width:26px}
  .tgrid{grid-template-columns:1fr 22px 1fr}
  .vtxt{font-size:14px;letter-spacing:3px}
  .prow{padding:5px 8px}.pnm{font-size:11px}
  .rank-input-row{grid-template-columns:1fr 50px 50px 60px auto}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="pk-logo">
    <div class="pk-ball"></div>
    <h1>포동포동 칼바람 내전</h1>
    <div class="pk-ball"></div>
  </div>
  <p>by doyajino</p>
</header>

<!-- 탭 네비 (메인에서만 표시) -->
<div class="tab-nav" id="tabNav">
  <button class="tab-btn active" onclick="showTab('rooms')"><span class="ti">🏠</span>방 선택</button>
  <button class="tab-btn" onclick="showTab('results')"><span class="ti">📋</span>배정결과</button>
  <button class="tab-btn" onclick="showTab('rank')"><span class="ti">🏆</span>순위</button>
</div>

<!-- ① 방 선택 -->
<div id="tab-rooms">
  <div class="card">
    <div class="stitle">방 선택</div>
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>
  <div style="text-align:right">
    <button class="btn-ghost btn" style="font-size:10px;padding:5px 10px" onclick="openAdminLogin()">🔧 관리자</button>
  </div>
</div>

<!-- ② 배정결과 -->
<div id="tab-results" style="display:none">
  <div class="card">
    <div class="stitle">배정 결과 기록</div>
    <div class="filter-row">
      <button class="filter-btn on" onclick="filterRes('all')" id="fb-all">전체</button>
      <button class="filter-btn" onclick="filterRes('room1')" id="fb-room1">1번방</button>
      <button class="filter-btn" onclick="filterRes('room2')" id="fb-room2">2번방</button>
      <button class="filter-btn" onclick="filterRes('room3')" id="fb-room3">3번방</button>
    </div>
    <div id="resList"></div>
  </div>
</div>

<!-- ③ 순위 -->
<div id="tab-rank" style="display:none">
  <div class="card">
    <div class="stitle">전체 순위</div>
    <div id="rankContent"></div>
  </div>
</div>

<!-- 로비 -->
<div id="lobbySec" style="display:none">
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <button class="btn btn-ghost" onclick="goMain()" style="padding:5px 9px;font-size:11px">← 뒤로</button>
      <div class="stitle" style="margin-bottom:0" id="lobbyTitle">1번방</div>
    </div>
    <div class="sbar"><div class="sdot" id="sdot"></div><div class="stxt" id="stxt">연결 중...</div></div>
    <div class="row">
      <input id="nickIn" placeholder="소환사 이름 입력 후 참가..." maxlength="16"/>
      <button class="btn btn-y" id="joinBtn" onclick="addPlayer()">참가</button>
    </div>
    <div class="warn" id="joinWarn"></div>
    <div class="ptags" id="ptags"></div>
    <div class="pcount">참가자 <span id="pcnt">0</span> / <span id="maxCnt">2</span>명</div>
    <div class="acd" id="acd"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-b" id="startBtn" onclick="startGame()" disabled>🎯 팀 배정 시작</button>
      <button class="btn btn-r" id="resetBtn" onclick="resetRoom()" style="display:none;margin-left:auto">초기화</button>
    </div>
  </div>
</div>

<!-- 핀볼 -->
<div id="pinSec">
  <div class="card">
    <div class="stitle">⚡ 핀볼 팀 배정</div>
    <canvas id="pcanvas"></canvas>
    <div class="pstat" id="pstat"></div>
    <div class="cbar" id="cbar"></div>
  </div>
</div>

<!-- 배정 결과 -->
<div id="resSec">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="stitle" style="margin-bottom:0">🏆 팀 배정 결과</div>
      <button class="btn btn-ghost" onclick="goMain()" style="font-size:10px;padding:4px 9px">🏠 홈</button>
    </div>
    <div class="tgrid">
      <div class="tpnl tb">
        <div class="thdr thdr-b"><div class="tdot tdb"></div>블루팀</div>
        <div id="blueList"></div>
      </div>
      <div class="vcol"><div class="vln"></div><div class="vtxt">VS</div><div class="vln"></div></div>
      <div class="tpnl tr">
        <div class="thdr thdr-r"><div class="tdot tdr"></div>레드팀</div>
        <div id="redList"></div>
      </div>
    </div>
    <div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-y" id="rerollBtn" onclick="reRoll()" style="display:none">🔄 다시 배정</button>
      <button class="btn btn-ghost" onclick="goLobby()">← 로비</button>
    </div>
  </div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="modal-ov" id="adminLoginModal">
  <div class="modal">
    <h3>🔧 관리자 로그인</h3>
    <div class="row"><input type="password" id="adminPwInput" placeholder="관리자 비밀번호..."/></div>
    <div class="warn" id="adminWarn"></div>
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('adminLoginModal')">취소</button>
      <button class="btn btn-y" onclick="doAdminLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- 관리자 순위 입력 패널 -->
<div id="adminPanel" style="display:none">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div>
        <div class="admin-badge">👑 관리자 모드</div>
        <div class="stitle" style="margin-bottom:0">순위 관리</div>
      </div>
      <button class="btn btn-ghost" onclick="logoutAdmin()" style="font-size:10px">로그아웃</button>
    </div>

    <div style="margin-bottom:14px">
      <div style="font-size:11px;color:var(--txt);margin-bottom:8px">참가자 추가 (모든 방의 참가자를 불러와 순위에 추가)</div>
      <div class="row" style="margin-bottom:6px">
        <select id="addPlayerSelect" style="flex:1"><option value="">-- 참가자 선택 --</option></select>
        <button class="btn btn-y" onclick="addToRank()">추가</button>
      </div>
      <div class="row">
        <input id="manualPlayerInput" placeholder="직접 입력..." maxlength="16" style="flex:1"/>
        <button class="btn btn-b" onclick="addManualToRank()">추가</button>
      </div>
    </div>

    <div style="font-size:11px;color:var(--txt);margin-bottom:8px">
      순위 직접 입력 <span style="opacity:.6;font-size:10px">(승/패 직접 입력)</span>
    </div>
    <div id="rankEditList"></div>
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
      <button class="btn btn-y" onclick="saveRankings()">💾 저장</button>
    </div>
    <div class="warn" id="adminSaveWarn" style="display:none"></div>
  </div>
</div>

</div>
<script>
// ═══════════════════════════════════════
// Firebase REST
// ═══════════════════════════════════════
const FB = 'https://doyajino-2edff-default-rtdb.firebaseio.com';
const fGet = async p=>{ try{ const r=await fetch(`${FB}/${p}.json`); return r.ok?await r.json():null; }catch{ return null; }};
const fSet = async(p,d)=>{ try{ await fetch(`${FB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); }catch{} };
const fDel = async p=>{ try{ await fetch(`${FB}/${p}.json`,{method:'DELETE'}); }catch{} };

// ═══════════════════════════════════════
// 설정
// ═══════════════════════════════════════
const MAX = 2; // 테스트: 2 / 실제: 10
const ROOMS = ['room1','room2','room3'];
const RNAMES = ['1번방','2번방','3번방'];
const ADMIN_PW = 'doya1234'; // 관리자 비밀번호
const MAX_RES = 10; // 방당 최대 결과 수

// ═══════════════════════════════════════
// 상태
// ═══════════════════════════════════════
const mySession = 's'+Math.random().toString(36).slice(2,9);
let curRoom='', isHost=false, players=[];
let pollTimer=null, autoTimer=null, lastHash='', lastEvTs=0, animFrame=null;
let curBlue=[], curRed=[];
let resCache=[], resFilter='all';
let isAdmin=false;
let rankData={}; // {name:{win,lose}}

// ═══════════════════════════════════════
// 탭
// ═══════════════════════════════════════
const TABS=['rooms','results','rank'];
function showTab(t){
  TABS.forEach(x=>document.getElementById('tab-'+x).style.display=x===t?'block':'none');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',TABS[i]===t));
  document.getElementById('tabNav').style.display='grid';
  ['lobbySec','pinSec','resSec','adminPanel'].forEach(id=>document.getElementById(id).style.display='none');
  if(t==='results') loadResults();
  if(t==='rank') loadRankDisplay();
}

// ═══════════════════════════════════════
// 메인
// ═══════════════════════════════════════
async function loadRooms(){
  const grid=document.getElementById('roomsGrid');
  grid.innerHTML=ROOMS.map((_,i)=>`
    <div class="room-card ${['r1','r2','r3'][i]}" onclick="enterRoom('${ROOMS[i]}','${RNAMES[i]}')">
      <div class="room-num">${i+1}</div>
      <div class="room-name">${RNAMES[i]}</div>
      <div class="rbadge rb-open" id="rb_${ROOMS[i]}">로딩...</div>
      <div class="room-pc" id="rp_${ROOMS[i]}"></div>
    </div>`).join('');
  ROOMS.forEach(r=>updateRoomCard(r));
}

async function updateRoomCard(rk){
  const room=await fGet('rooms/'+rk);
  const rb=document.getElementById('rb_'+rk);
  const rp=document.getElementById('rp_'+rk);
  if(!rb) return;
  const n=room&&room.players?(room.players||[]).length:0;
  if(n>=MAX){ rb.className='rbadge rb-full'; rb.textContent='꽉 참'; }
  else { rb.className='rbadge rb-open'; rb.textContent=n?'모집 중':'대기 중'; }
  rp.textContent=n+'/'+MAX+'명';
}

function goMain(){
  stopPoll(); cancelAcd();
  curRoom=''; isHost=false; players=[]; lastHash=''; lastEvTs=0;
  ['lobbySec','pinSec','resSec','adminPanel'].forEach(id=>document.getElementById(id).style.display='none');
  TABS.forEach(x=>document.getElementById('tab-'+x).style.display=x==='rooms'?'block':'none');
  document.getElementById('tabNav').style.display='grid';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  loadRooms();
}

function goLobby(){
  document.getElementById('resSec').style.display='none';
  document.getElementById('pinSec').style.display='none';
  document.getElementById('lobbySec').style.display='block';
}

// ═══════════════════════════════════════
// 방 입장
// ═══════════════════════════════════════
async function enterRoom(rk,rname){
  curRoom=rk;
  TABS.forEach(x=>document.getElementById('tab-'+x).style.display='none');
  document.getElementById('tabNav').style.display='none';
  document.getElementById('lobbySec').style.display='block';
  document.getElementById('lobbyTitle').textContent=rname;
  document.getElementById('maxCnt').textContent=MAX;
  setSdot(false);
  document.getElementById('stxt').textContent='연결 중...';

  let room=await fGet('rooms/'+rk);
  if(!room){
    isHost=true;
    room={host:mySession,players:[],ev:null,createdAt:Date.now()};
    await fSet('rooms/'+rk,room);
  } else {
    isHost=(room.host===mySession);
    // 이전 게임 이벤트가 result면 ev 초기화
    if(room.ev&&room.ev.type==='result'){
      lastEvTs=room.ev.ts||Date.now();
    }
  }
  document.getElementById('resetBtn').style.display=isHost?'block':'none';
  startPoll();
}

// ═══════════════════════════════════════
// 참가자
// ═══════════════════════════════════════
async function addPlayer(){
  const inp=document.getElementById('nickIn');
  const name=inp.value.trim();
  const w=document.getElementById('joinWarn');
  if(!name){ showW(w,'이름을 입력하세요'); return; }
  const room=await fGet('rooms/'+curRoom);
  if(!room){ showW(w,'연결 오류'); return; }
  const cur=Array.isArray(room.players)?room.players:[];
  if(cur.length>=MAX){ showW(w,MAX+'명이 꽉 찼어요!'); return; }
  if(cur.find(p=>p.name===name)){ showW(w,'이미 등록된 이름이에요'); return; }
  cur.push({name,ts:Date.now()});
  await fSet('rooms/'+curRoom+'/players',cur);
  inp.value='';
}

async function removePlayer(name){
  if(!isHost) return;
  const room=await fGet('rooms/'+curRoom);
  if(!room) return;
  await fSet('rooms/'+curRoom+'/players',(room.players||[]).filter(p=>p.name!==name));
}

async function resetRoom(){
  if(!isHost) return;
  await fSet('rooms/'+curRoom+'/players',[]);
  await fSet('rooms/'+curRoom+'/ev',null);
  lastEvTs=0;
  cancelAcd();
}

// ═══════════════════════════════════════
// 폴링
// ═══════════════════════════════════════
function startPoll(){ stopPoll(); doPoll(); pollTimer=setInterval(doPoll,1200); }
function stopPoll(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} }

async function doPoll(){
  if(!curRoom) return;
  const room=await fGet('rooms/'+curRoom);
  if(!room){ setSdot(false); return; }
  setSdot(true);
  isHost=(room.host===mySession);
  document.getElementById('resetBtn').style.display=isHost?'block':'none';
  const np=Array.isArray(room.players)?room.players:[];
  const nh=JSON.stringify(np);
  if(nh!==lastHash){ lastHash=nh; players=np; renderPlayers(players); }
  const ev=room.ev;
  if(ev&&ev.ts&&ev.ts>lastEvTs){
    lastEvTs=ev.ts;
    handleEv(ev);
  }
}

// ═══════════════════════════════════════
// 렌더링
// ═══════════════════════════════════════
function renderPlayers(pls){
  const wrap=document.getElementById('ptags');
  const n=pls.length;
  wrap.innerHTML='';
  pls.forEach(p=>{
    const t=document.createElement('div'); t.className='ptag';
    t.textContent=p.name;
    if(isHost){
      const d=document.createElement('button'); d.className='del'; d.textContent='✕';
      d.onclick=()=>removePlayer(p.name); t.appendChild(d);
    }
    wrap.appendChild(t);
  });
  document.getElementById('pcnt').textContent=n;
  document.getElementById('startBtn').disabled=!isHost||n<MAX;
  document.getElementById('joinBtn').disabled=n>=MAX;
  document.getElementById('stxt').textContent='🟢 연결됨 | '+n+'명 참가';
  if(n>=MAX) startAcd(); else cancelAcd();
}

function showW(el,msg){ el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',2500); }
function setSdot(on){ document.getElementById('sdot').className='sdot'+(on?'':' off'); }

// ═══════════════════════════════════════
// 카운트다운
// ═══════════════════════════════════════
function startAcd(){
  if(autoTimer) return;
  let cnt=5; const el=document.getElementById('acd');
  el.style.display='block'; el.textContent='⏱ '+cnt+'초 후 자동 시작!';
  autoTimer=setInterval(()=>{
    cnt--;
    if(cnt>0) el.textContent='⏱ '+cnt+'초 후 자동 시작!';
    else{ clearInterval(autoTimer);autoTimer=null;el.style.display='none'; if(isHost) startGame(); }
  },1000);
}
function cancelAcd(){
  if(!autoTimer) return;
  clearInterval(autoTimer); autoTimer=null;
  document.getElementById('acd').style.display='none';
}

// ═══════════════════════════════════════
// 게임 이벤트
// ═══════════════════════════════════════
async function sendEv(ev){
  ev.ts=Date.now();
  lastEvTs=ev.ts;
  await fSet('rooms/'+curRoom+'/ev',ev);
  // 방장만 자신도 handleEv 호출 (다른 사람은 폴링으로 받음)
  handleEv(ev);
}

function handleEv(ev){
  if(!ev) return;
  if(ev.type==='start') launchPinball(ev.shuffled);
  else if(ev.type==='result') showResScreen(ev.blue,ev.red);
}

async function startGame(){
  if(!isHost) return;
  const room=await fGet('rooms/'+curRoom);
  if(!room) return;
  const names=(Array.isArray(room.players)?room.players:[]).map(p=>p.name);
  if(names.length<MAX) return;
  const shuffled=[...names].sort(()=>Math.random()-.5);
  await sendEv({type:'start',shuffled});
}

function reRoll(){ if(isHost) startGame(); }

// ═══════════════════════════════════════
// 결과 저장
// ═══════════════════════════════════════
async function saveResult(blue,red){
  const rk='results/'+curRoom;
  let list=await fGet(rk);
  if(!list) list=[];
  else if(!Array.isArray(list)) list=Object.values(list);
  const entry={blue,red,ts:Date.now(),room:curRoom,roomName:RNAMES[ROOMS.indexOf(curRoom)]};
  list.unshift(entry);
  if(list.length>MAX_RES) list=list.slice(0,MAX_RES);
  await fSet(rk,list);
}

// ═══════════════════════════════════════
// 결과 화면
// ═══════════════════════════════════════
function showResScreen(blue,red){
  curBlue=blue; curRed=red;
  document.getElementById('pinSec').style.display='none';
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('resSec').style.display='block';
  document.getElementById('resSec').scrollIntoView({behavior:'smooth'});
  document.getElementById('rerollBtn').style.display=isHost?'inline-block':'none';
  const bl=document.getElementById('blueList'), rl=document.getElementById('redList');
  bl.innerHTML=''; rl.innerHTML='';
  const mkRow=(name,i)=>{
    const r=document.createElement('div'); r.className='prow';
    r.style.animationDelay=(i*60)+'ms';
    const nm=document.createElement('div'); nm.className='pnm'; nm.textContent=name;
    r.appendChild(nm); return r;
  };
  blue.forEach((n,i)=>bl.appendChild(mkRow(n,i)));
  red.forEach((n,i)=>rl.appendChild(mkRow(n,i)));
}

// ═══════════════════════════════════════
// 배정 결과 목록
// ═══════════════════════════════════════
async function loadResults(){
  resCache=[];
  for(const rk of ROOMS){
    let list=await fGet('results/'+rk);
    if(!list) continue;
    if(!Array.isArray(list)) list=Object.values(list);
    resCache.push(...list);
  }
  resCache.sort((a,b)=>b.ts-a.ts);
  renderResults();
}

function filterRes(f){
  resFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('fb-'+f).classList.add('on');
  renderResults();
}

function renderResults(){
  const container=document.getElementById('resList');
  const list=resFilter==='all'?resCache:resCache.filter(r=>r.room===resFilter);
  if(!list.length){ container.innerHTML='<div class="no-data">📭 배정 기록이 없어요</div>'; return; }
  container.innerHTML=list.map((r,i)=>{
    const d=new Date(r.ts);
    const date=`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
    const time=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `<div class="res-item">
      <div class="res-meta">
        <div class="res-room">${r.roomName||r.room}</div>
        <div class="res-time">📅 ${date} ${time}</div>
        <div class="res-teams">
          <span class="b">🔵 ${(r.blue||[]).join(', ')}</span>
          <span style="opacity:.4"> / </span>
          <span class="r">🔴 ${(r.red||[]).join(', ')}</span>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="replayRes(${resCache.indexOf(r)})">▶ 리플레이</button>
    </div>`;
  }).join('');
}

function replayRes(idx){
  const r=resCache[idx];
  if(!r) return;
  curBlue=r.blue; curRed=r.red;
  TABS.forEach(x=>document.getElementById('tab-'+x).style.display='none');
  document.getElementById('tabNav').style.display='none';
  document.getElementById('resSec').style.display='block';
  document.getElementById('rerollBtn').style.display='none';
  document.getElementById('resSec').scrollIntoView({behavior:'smooth'});
  const bl=document.getElementById('blueList'), rl=document.getElementById('redList');
  bl.innerHTML=''; rl.innerHTML='';
  const mkRow=(name,i)=>{
    const row=document.createElement('div'); row.className='prow';
    row.style.animationDelay=(i*60)+'ms';
    const nm=document.createElement('div'); nm.className='pnm'; nm.textContent=name;
    row.appendChild(nm); return row;
  };
  r.blue.forEach((n,i)=>bl.appendChild(mkRow(n,i)));
  r.red.forEach((n,i)=>rl.appendChild(mkRow(n,i)));
}

// ═══════════════════════════════════════
// 순위 표시
// ═══════════════════════════════════════
async function loadRankDisplay(){
  const data=await fGet('rankings')||{};
  rankData=data;
  const list=Object.values(data).sort((a,b)=>{
    const wa=a.games?a.win/a.games:0, wb=b.games?b.win/b.games:0;
    if(wb!==wa) return wb-wa;
    return b.games-a.games;
  });
  const cont=document.getElementById('rankContent');
  if(!list.length){ cont.innerHTML='<div class="no-data">아직 순위 데이터가 없어요<br>관리자가 경기 결과를 입력하면 순위가 생성됩니다</div>'; return; }
  cont.innerHTML=`<table class="rank-tbl">
    <thead><tr><th>#</th><th>소환사</th><th>승률</th><th>전적</th><th>경기</th></tr></thead>
    <tbody>${list.map((p,i)=>{
      const wr=p.games?Math.round(p.win/p.games*100):0;
      const wc=wr>=60?'wh':wr>=50?'wm':'wl';
      const nc=i===0?'g1':i===1?'g2':i===2?'g3':'';
      const med=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return `<tr>
        <td class="rnum ${nc}">${med||i+1}</td>
        <td class="rname">${p.name}</td>
        <td class="rwr ${wc}">${wr}%</td>
        <td class="rrec">${p.win}승 ${p.lose}패</td>
        <td class="rrec">${p.games}게임</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ═══════════════════════════════════════
// 관리자
// ═══════════════════════════════════════
function openAdminLogin(){
  if(isAdmin){ openAdminPanel(); return; }
  document.getElementById('adminPwInput').value='';
  document.getElementById('adminWarn').style.display='none';
  document.getElementById('adminLoginModal').classList.add('show');
}

function doAdminLogin(){
  const pw=document.getElementById('adminPwInput').value;
  if(pw!==ADMIN_PW){ showW(document.getElementById('adminWarn'),'비밀번호가 틀렸어요'); return; }
  isAdmin=true;
  closeModal('adminLoginModal');
  openAdminPanel();
}

function logoutAdmin(){
  isAdmin=false;
  document.getElementById('adminPanel').style.display='none';
  goMain();
}

async function openAdminPanel(){
  TABS.forEach(x=>document.getElementById('tab-'+x).style.display='none');
  document.getElementById('tabNav').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  document.getElementById('adminPanel').scrollIntoView({behavior:'smooth'});

  // 모든 방의 참가자 수집
  const allNames=new Set();
  for(const rk of ROOMS){
    // 현재 참가자
    const room=await fGet('rooms/'+rk);
    (room&&room.players?room.players:[]).forEach(p=>allNames.add(p.name));
    // 결과 기록의 참가자도
    let list=await fGet('results/'+rk);
    if(list){
      if(!Array.isArray(list)) list=Object.values(list);
      list.forEach(r=>{(r.blue||[]).forEach(n=>allNames.add(n));(r.red||[]).forEach(n=>allNames.add(n));});
    }
  }

  const sel=document.getElementById('addPlayerSelect');
  sel.innerHTML='<option value="">-- 참가자 선택 --</option>'+
    [...allNames].sort().map(n=>`<option value="${n}">${n}</option>`).join('');

  // 기존 순위 로드
  rankData=await fGet('rankings')||{};
  renderRankEdit();
}

function renderRankEdit(){
  const cont=document.getElementById('rankEditList');
  const entries=Object.values(rankData);
  if(!entries.length){ cont.innerHTML='<div style="font-size:11px;color:var(--txt);opacity:.5;padding:10px 0">아직 추가된 참가자가 없어요</div>'; return; }
  cont.innerHTML=entries.map(p=>`
    <div class="rank-input-row">
      <div class="pname">${p.name}</div>
      <input type="number" min="0" value="${p.win||0}" id="rw_${p.name.replace(/\s/g,'_')}" placeholder="승"/>
      <input type="number" min="0" value="${p.lose||0}" id="rl_${p.name.replace(/\s/g,'_')}" placeholder="패"/>
      <div style="font-size:10px;color:var(--txt)">
        ${p.games||0}게임<br>
        <span class="${(p.games?Math.round(p.win/p.games*100):0)>=50?'wh':'wl'}">${p.games?Math.round(p.win/p.games*100):0}%</span>
      </div>
      <button class="btn btn-r" onclick="removeFromRank('${p.name}')">✕</button>
    </div>`).join('');
}

function addToRank(){
  const sel=document.getElementById('addPlayerSelect');
  const name=sel.value; if(!name) return;
  if(!rankData[name]) rankData[name]={name,win:0,lose:0,games:0};
  sel.value='';
  renderRankEdit();
}

function addManualToRank(){
  const inp=document.getElementById('manualPlayerInput');
  const name=inp.value.trim(); if(!name) return;
  if(!rankData[name]) rankData[name]={name,win:0,lose:0,games:0};
  inp.value='';
  renderRankEdit();
}

function removeFromRank(name){
  delete rankData[name];
  renderRankEdit();
}

async function saveRankings(){
  // 입력값 반영
  Object.values(rankData).forEach(p=>{
    const key=p.name.replace(/\s/g,'_');
    const winEl=document.getElementById('rw_'+key);
    const loseEl=document.getElementById('rl_'+key);
    if(winEl&&loseEl){
      p.win=parseInt(winEl.value)||0;
      p.lose=parseInt(loseEl.value)||0;
      p.games=p.win+p.lose;
    }
  });
  await fSet('rankings',rankData);
  const w=document.getElementById('adminSaveWarn');
  w.style.cssText='display:block;background:rgba(76,175,80,.12);border-color:rgba(76,175,80,.3);color:#4CAF50';
  w.textContent='✅ 저장 완료!';
  setTimeout(()=>w.style.display='none',2000);
  renderRankEdit();
}

function closeModal(id){ document.getElementById(id).classList.remove('show'); }

// ═══════════════════════════════════════
// 핀볼
// ═══════════════════════════════════════
function launchPinball(names){
  document.getElementById('pinSec').style.display='block';
  document.getElementById('resSec').style.display='none';
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('pinSec').scrollIntoView({behavior:'smooth',block:'start'});
  runPinball(names, async(results)=>{
    const half=Math.floor(names.length/2);
    const blue=results.filter(b=>b.slot<half).map(b=>b.name);
    const red=results.filter(b=>b.slot>=half).map(b=>b.name);
    curBlue=blue; curRed=red;
    // 결과 저장 (방장만)
    if(isHost) await saveResult(blue,red);
    await sendEv({type:'result',blue,red});
  });
}

function runPinball(names,onDone){
  const canvas=document.getElementById('pcanvas');
  const statEl=document.getElementById('pstat');
  const cdEl=document.getElementById('cbar');
  cdEl.style.display='none'; statEl.textContent='';
  const W=Math.min(680,window.innerWidth-24), H=Math.round(W*.85);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const N=names.length, SW=W/N;
  const BR=Math.max(9,Math.min(15,Math.floor(W/(N*2.7))));
  const GY=H-Math.round(H*.19), FY=H-Math.round(H*.08), HALF=Math.floor(N/2);
  const COLS=['#CC0000','#3D7DCA','#FFCB05','#4CAF50','#9C27B0','#FF6B35','#00BCD4','#E91E63','#8BC34A','#FFF176'];
  const LABS=Array.from({length:N},(_,i)=>i<HALF?'블루'+(i+1):'레드'+(i-HALF+1));
  const pegs=[]; const PR=Math.max(4,Math.min(7,Math.round(H*.54/48))); const PC=Math.max(5,Math.min(11,N+2));
  for(let r=0;r<PR;r++) for(let c=0;c<PC;c++){
    const off=(r%2===0)?SW*.5:0;
    pegs.push({x:SW*.3+off+c*(W-SW*.6)/(PC-1),y:Math.round(H*.1)+r*Math.round((GY-H*.14)/PR),lit:0});
  }
  const bumps=[{x:W*.22,y:H*.35,r:Math.round(W*.025),lit:0},{x:W*.78,y:H*.35,r:Math.round(W*.025),lit:0},{x:W*.50,y:H*.42,r:Math.round(W*.025),lit:0},{x:W*.34,y:H*.54,r:Math.round(W*.022),lit:0},{x:W*.66,y:H*.54,r:Math.round(W*.022),lit:0}];
  const parts=[];
  function spark(x,y,col){for(let i=0;i<14;i++){const a=(Math.PI*2/14)*i,sp=1.1+Math.random()*2.3;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.1,life:1,decay:.034+Math.random()*.024,r:2+Math.random()*2.8,col});}}
  const balls=names.map((name,i)=>({name,col:COLS[i%COLS.length],x:W/2+(Math.random()-.5)*48,y:-BR*2-i*290,vx:(Math.random()-.5)*.28,vy:0,landed:false,slot:-1,sq:1.0}));
  const taken=new Set(); let lc=0,done=false,cdOn=false,cdTimer=null;
  function chkCD(){if(cdOn||done)return;if(lc>=Math.max(2,Math.floor(N*.8))&&lc<N){cdOn=true;let cnt=5;cdEl.style.display='block';cdEl.textContent='⏱ '+cnt+'초 후 자동 배정';cdTimer=setInterval(()=>{cnt--;cdEl.textContent=cnt>0?'⏱ '+cnt+'초 후 자동 배정':'⚡ 자동 배정!';if(cnt<=0){clearInterval(cdTimer);forceAssign();}},1000);}}
  function forceAssign(){const free=Array.from({length:N},(_,i)=>i).filter(s=>!taken.has(s));balls.forEach(b=>{if(b.landed)return;const s=free.shift()??0;taken.add(s);b.slot=s;b.x=(s+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.3;lc++;spark(b.x,GY,b.col);});cdEl.style.display='none';}
  if(animFrame) cancelAnimationFrame(animFrame);

  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0A1A2E';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(61,125,202,.04)';ctx.fillRect(0,0,HALF*SW,H);
    ctx.fillStyle='rgba(204,0,0,.04)';ctx.fillRect(HALF*SW,0,W-HALF*SW,H);
    ctx.save();ctx.strokeStyle='rgba(255,203,5,.18)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(HALF*SW,0);ctx.lineTo(HALF*SW,GY-10);ctx.stroke();ctx.restore();
    for(let i=0;i<=N;i++){ctx.strokeStyle=i<=HALF?'rgba(61,125,202,.6)':'rgba(204,0,0,.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(i*SW,GY-17);ctx.lineTo(i*SW,FY);ctx.stroke();}
    for(let i=0;i<N;i++){
      const cx=(i+.5)*SW,tc=i<HALF?'#3D7DCA':'#CC0000',fi=taken.has(i);
      ctx.strokeStyle=fi?tc:tc+'3A';ctx.lineWidth=fi?2:1.2;ctx.beginPath();ctx.moveTo(i*SW+2,GY-17);ctx.lineTo(cx-3,GY-25);ctx.lineTo(cx+3,GY-25);ctx.lineTo((i+1)*SW-2,GY-17);ctx.stroke();
      ctx.fillStyle=fi?tc:tc+'44';ctx.font='bold '+Math.max(6,Math.round(SW*.16))+'px Malgun Gothic,sans-serif';ctx.textAlign='center';ctx.fillText(LABS[i],cx,GY-28);
      if(fi){ctx.fillStyle=i<HALF?'rgba(61,125,202,.08)':'rgba(204,0,0,.07)';ctx.fillRect(i*SW+1,GY,SW-2,FY-GY);ctx.fillStyle=tc;ctx.fillRect(i*SW+1,GY-5,SW-2,5);ctx.save();ctx.shadowColor=tc;ctx.shadowBlur=6;ctx.fillStyle=tc+'88';ctx.fillRect(i*SW+1,GY-5,SW-2,5);ctx.restore();}
    }
    ctx.strokeStyle='rgba(255,203,5,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FY);ctx.lineTo(W,FY);ctx.stroke();
    pegs.forEach(p=>{if(p.lit>0)p.lit--;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=p.lit>0?'#FFCB05':'rgba(255,203,5,.42)';ctx.fill();});
    bumps.forEach(b=>{if(b.lit>0)b.lit--;const l=b.lit>0;ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.strokeStyle=l?'#CC0000':'rgba(204,0,0,.28)';ctx.lineWidth=l?2:1.3;ctx.stroke();const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,l?'rgba(204,0,0,.55)':'rgba(204,0,0,.08)');g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.fillStyle=l?'#fff':'rgba(204,0,0,.55)';ctx.font='bold '+b.r+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',b.x,b.y);ctx.textBaseline='alphabetic';});
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=p.decay;if(p.life<=0){parts.splice(i,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');ctx.fill();}
    balls.forEach(b=>{
      if(b.landed){if(b.sq!==1){b.sq+=(1-b.sq)*.13;if(Math.abs(b.sq-1)<.01)b.sq=1;}drawBall(b);return;}
      b.vy+=0.015;b.x+=b.vx;b.y+=b.vy;
      if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*.68;}if(b.x+BR>W){b.x=W-BR;b.vx=-Math.abs(b.vx)*.68;}
      pegs.forEach(p=>{const dx=b.x-p.x,dy=b.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+4&&d>0){const nx=dx/d,ny=dy/d,dot=b.vx*nx+b.vy*ny;b.vx=(b.vx-2*dot*nx)*.54;b.vy=(b.vy-2*dot*ny)*.54;b.x=p.x+nx*(BR+5);b.y=p.y+ny*(BR+5);b.vx+=(Math.random()-.5)*.35;p.lit=7;}});
      bumps.forEach(bm=>{const dx=b.x-bm.x,dy=b.y-bm.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+bm.r&&d>0){const nx=dx/d,ny=dy/d;b.vx=nx*2.1+(Math.random()-.5)*.9;b.vy=ny*2.1-1.1;b.vy=Math.min(b.vy,-.55);b.x=bm.x+nx*(BR+bm.r+2);b.y=bm.y+ny*(BR+bm.r+2);bm.lit=11;}});
      if(b.y+BR>GY){for(let i=0;i<=N;i++){const wx=i*SW;if(b.x-BR<wx&&b.x+BR>wx){b.vx=(b.x<wx?1:-1)*Math.abs(b.vx)*.38;b.x=b.x<wx?wx+BR:wx-BR;}}b.vx*=.82;const cs=Math.floor(b.x/SW);if(cs>=0&&cs<N&&taken.has(cs)&&b.y-BR<GY&&b.y+BR>GY-5){b.y=GY-BR-4;b.vy=-(Math.abs(b.vy)*.72+1.1);b.vx+=(Math.random()-.5)*1.1;}}
      if(b.y+BR>=FY){let si=Math.max(0,Math.min(N-1,Math.floor(b.x/SW)));if(taken.has(si)){for(let d=1;d<N;d++){if(!taken.has(si-d)&&si-d>=0){si-=d;break;}if(!taken.has(si+d)&&si+d<N){si+=d;break;}}}taken.add(si);b.slot=si;b.x=(si+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.32;lc++;spark(b.x,GY,b.col);chkCD();}
      drawBall(b);
    });
    if(lc===N&&!done){done=true;cdEl.style.display='none';if(cdTimer)clearInterval(cdTimer);statEl.textContent='⚡ 배정 완료! 🎉';onDone(balls.map(b=>({name:b.name,slot:b.slot})));}
    else if(!done) statEl.textContent='배정 중... ('+lc+'/'+N+')';
    animFrame=requestAnimationFrame(frame);
  }
  function drawBall(b){
    const bx=b.x,by=b.y,sq=b.sq||1;
    const sx=sq>1?1+(sq-1)*.48:sq<1?1+(1-sq)*.28:1,sy=sq>1?1-(sq-1)*.38:sq<1?1-(1-sq)*.22:1;
    ctx.save();ctx.translate(bx,by);ctx.scale(sx,sy);
    ctx.beginPath();ctx.arc(2,3,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
    const gl=ctx.createRadialGradient(0,0,BR*.28,0,0,BR+4);gl.addColorStop(0,b.col+'AA');gl.addColorStop(.5,b.col+'3A');gl.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(0,0,BR+4,0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();
    const gr=ctx.createRadialGradient(-BR*.26,-BR*.26,1,0,0,BR);gr.addColorStop(0,b.col+'FF');gr.addColorStop(.52,b.col+'CC');gr.addColorStop(1,b.col+'60');ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.arc(-BR*.27,-BR*.28,BR*.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.32)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.strokeStyle=b.col;ctx.lineWidth=1.8;ctx.stroke();
    ctx.save();ctx.scale(1/sx,1/sy);ctx.font='bold '+Math.max(6,Math.round(BR*.54))+'px "Malgun Gothic",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const lbl=b.name.length>4?b.name.slice(0,3)+'…':b.name;
    ctx.strokeStyle='rgba(0,0,0,.75)';ctx.lineWidth=2.2;ctx.strokeText(lbl,0,0);ctx.fillStyle='#fff';ctx.fillText(lbl,0,0);
    ctx.restore();ctx.restore();
  }
  frame();
}

// ═══════════════════════════════════════
// 초기화
// ═══════════════════════════════════════
loadRooms();
setInterval(()=>{ if(document.getElementById('tab-rooms').style.display!=='none') loadRooms(); },20000);
</script>
