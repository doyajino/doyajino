<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>칼바람 내전 팀배정 by doyajino</title>
<style>
:root{
  --gold:#C89B3C;--gdl:#F0E6B2;--gdd:#785A28;
  --blue:#0BC4E3;--red:#FF4655;--green:#4ADE80;
  --bg:#010A13;--bg2:#0A1628;--pnl:#0D2035;
  --txt:#A0B4CC;--wh:#F0E6B2;
  --fn:'Malgun Gothic','맑은 고딕',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(11,196,227,.04),transparent 60%),
             radial-gradient(ellipse at 80% 50%,rgba(255,70,85,.04),transparent 60%)}
.wrap{max-width:740px;margin:0 auto;padding:14px 12px;position:relative;z-index:1}

/* 헤더 */
header{text-align:center;margin-bottom:20px}
.badge{display:inline-block;font-size:10px;letter-spacing:3px;color:var(--gold);border:1px solid var(--gdd);padding:3px 12px;margin-bottom:8px}
header h1{font-size:clamp(20px,5vw,36px);color:var(--gdl);text-shadow:0 0 22px rgba(200,155,60,.4)}
header h1 span{color:var(--blue)}
header h1 small{font-size:11px;font-weight:400;color:rgba(200,155,60,.42);margin-left:6px}
.hdiv{width:150px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:9px auto}
header p{font-size:11px;opacity:.55}

/* 카드 */
.card{background:linear-gradient(135deg,var(--bg2),var(--pnl));border:1px solid var(--gdd);border-radius:4px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.stitle{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:3px;height:13px;background:var(--gold);flex-shrink:0}

/* 방 목록 (메인) */
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:0}
.room-card{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:2px solid var(--gdd);border-radius:6px;padding:14px 10px;cursor:pointer;transition:all .18s;text-align:center;position:relative;overflow:hidden}
.room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transition:background .2s}
.room-card.r1::before{background:linear-gradient(90deg,transparent,var(--blue),transparent)}
.room-card.r2::before{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.room-card.r3::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.room-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.room-card.r1:hover{border-color:rgba(11,196,227,.6)}
.room-card.r2:hover{border-color:rgba(200,155,60,.6)}
.room-card.r3:hover{border-color:rgba(255,70,85,.6)}
.room-num{font-size:22px;font-weight:700;margin-bottom:4px}
.room-card.r1 .room-num{color:var(--blue)}
.room-card.r2 .room-num{color:var(--gold)}
.room-card.r3 .room-num{color:var(--red)}
.room-label{font-size:11px;color:var(--txt);margin-bottom:8px;opacity:.7}
.room-status{font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;display:inline-block}
.room-status.open{background:rgba(74,222,128,.12);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.room-status.full{background:rgba(255,70,85,.12);color:var(--red);border:1px solid rgba(255,70,85,.3)}
.room-status.done{background:rgba(200,155,60,.12);color:var(--gold);border:1px solid rgba(200,155,60,.3)}
.room-pcount{font-size:12px;color:var(--txt);margin-top:6px;opacity:.8}

/* 입력 */
.row{display:flex;gap:8px;align-items:stretch;margin-bottom:8px}
.row:last-child{margin-bottom:0}
input{background:rgba(0,0,0,.4);border:1px solid var(--gdd);border-radius:3px;color:var(--wh);font-family:var(--fn);font-size:14px;padding:9px 11px;outline:none;transition:border-color .2s;width:100%}
input:focus{border-color:var(--gold);box-shadow:0 0 9px rgba(200,155,60,.2)}
input::placeholder{color:#3a5068}
input[type=password]{letter-spacing:3px}

/* 버튼 */
.btn{font-family:var(--fn);font-size:13px;font-weight:700;padding:9px 16px;border:none;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.96)}
.btn-gold{background:linear-gradient(135deg,#C89B3C,#785A28);color:var(--bg)}
.btn-gold:hover:not(:disabled){background:linear-gradient(135deg,#F0E6B2,#C89B3C)}
.btn-blue{background:linear-gradient(135deg,#0A324D,#0BC4E3);color:var(--wh)}
.btn-blue:hover:not(:disabled){background:linear-gradient(135deg,#0BC4E3,#7BE8F5)}
.btn-red{background:linear-gradient(135deg,#4D0A10,#FF4655);color:var(--wh);font-size:11px;padding:7px 12px}
.btn-ghost{background:transparent;border:1px solid var(--gdd);color:var(--txt);font-size:11px;padding:7px 12px}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none!important}

/* 참가자 태그 */
.ptags{display:flex;flex-wrap:wrap;gap:6px;min-height:34px;margin:8px 0}
.ptag{background:rgba(11,196,227,.1);border:1px solid rgba(11,196,227,.28);border-radius:3px;padding:5px 10px;font-size:12px;color:var(--blue);display:flex;align-items:center;gap:6px;animation:ti .22s ease}
.ptag .del{background:none;border:none;color:rgba(255,70,85,.5);cursor:pointer;font-size:13px;padding:0;line-height:1}
.ptag .del:hover{color:var(--red)}
@keyframes ti{from{opacity:0;transform:scale(.82)}to{opacity:1;transform:scale(1)}}
.pcount{font-size:11px;color:var(--gold);text-align:right;margin-top:4px}
.pcount span{color:var(--wh);font-weight:700}

/* 상태 */
.sbar{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;transition:background .3s}
.sdot.off{background:var(--red)}
.stxt{font-size:11px;color:var(--txt)}

/* 경고/안내 */
.warn{background:rgba(255,70,85,.1);border:1px solid rgba(255,70,85,.28);border-radius:3px;padding:7px 10px;font-size:11px;color:var(--red);display:none;margin-top:6px}
.info{background:rgba(200,155,60,.08);border:1px solid rgba(200,155,60,.25);border-radius:3px;padding:8px 12px;font-size:11px;color:var(--gold);margin-top:6px;line-height:1.5}

/* 카운트다운 */
.acd{display:none;text-align:center;margin-top:10px;font-size:28px;font-weight:700;color:var(--gold);text-shadow:0 0 18px rgba(200,155,60,.6)}

/* 비밀번호 모달 오버레이 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:linear-gradient(135deg,var(--bg2),var(--pnl));border:1px solid var(--gold-dark,var(--gdd));border-radius:6px;padding:24px;width:100%;max-width:360px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.modal h3{font-size:14px;color:var(--gdl);margin-bottom:6px}
.modal p{font-size:11px;color:var(--txt);margin-bottom:14px;opacity:.7}
.modal-btns{display:flex;gap:8px;margin-top:12px}

/* 핀볼 */
#pinSec{display:none}
#pinSec .card::before{background:linear-gradient(90deg,var(--blue),transparent,var(--red))}
#pcanvas{display:block;margin:0 auto;border-radius:3px;border:1px solid rgba(200,155,60,.14);max-width:100%}
.pstat{text-align:center;margin-top:9px;font-size:14px;font-weight:700;color:var(--gdl);min-height:20px}
.cbar{text-align:center;margin-top:5px;font-size:18px;font-weight:700;color:var(--red);display:none;text-shadow:0 0 14px var(--red)}

/* 결과 */
#resSec{display:none}
.tgrid{display:grid;grid-template-columns:1fr 30px 1fr}
.tpnl{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:1px solid;border-radius:4px;overflow:hidden}
.tb{border-color:rgba(11,196,227,.38)}.tr{border-color:rgba(255,70,85,.38)}
.thdr{padding:9px 12px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
.thdr-b{background:linear-gradient(135deg,rgba(11,196,227,.13),transparent);color:var(--blue);border-bottom:1px solid rgba(11,196,227,.18)}
.thdr-r{background:linear-gradient(135deg,rgba(255,70,85,.13),transparent);color:var(--red);border-bottom:1px solid rgba(255,70,85,.18)}
.tdot{width:6px;height:6px;border-radius:50%}
.tdb{background:var(--blue);box-shadow:0 0 5px var(--blue)}.tdr{background:var(--red);box-shadow:0 0 5px var(--red)}
.prow{display:flex;align-items:center;gap:9px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04);animation:ri .32s ease both}
.prow:last-child{border-bottom:none}
@keyframes ri{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
.cimg{width:32px;height:32px;border-radius:50%;border:2px solid var(--gdd);object-fit:cover;flex-shrink:0;background:var(--bg2)}
.pnm{font-size:12px;color:var(--wh);font-weight:600}
.pnk{font-size:9px;color:#4a6a8a;margin-left:auto;text-align:right;max-width:88px;line-height:1.3}
.vcol{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 2px;gap:6px}
.vtxt{font-size:18px;font-weight:700;color:var(--gold);text-shadow:0 0 14px rgba(200,155,60,.5);writing-mode:vertical-rl;letter-spacing:5px}
.vln{width:1px;height:26px;background:linear-gradient(to bottom,transparent,var(--gdd),transparent)}

@media(max-width:420px){
  .rooms-grid{grid-template-columns:1fr}
  .room-card{padding:12px;display:flex;align-items:center;gap:12px;text-align:left}
  .room-num{font-size:18px;margin-bottom:0;min-width:28px}
  .room-label{margin-bottom:0}
  .tgrid{grid-template-columns:1fr 24px 1fr}
  .thdr{font-size:11px;padding:7px 8px}.vtxt{font-size:13px;letter-spacing:3px}
  .prow{padding:5px 7px;gap:6px}.pnm{font-size:11px}.cimg{width:26px;height:26px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="badge">LEAGUE OF LEGENDS</div>
  <h1>칼바람 <span>내전</span> 팀배정 <small>by doyajino</small></h1>
  <div class="hdiv"></div>
  <p>방을 선택하고 이름을 등록하세요</p>
</header>

<!-- ① 메인: 방 목록 -->
<div id="mainSec">
  <div class="card">
    <div class="stitle">방 선택</div>
    <div class="rooms-grid" id="roomsGrid">
      <!-- JS로 렌더링 -->
    </div>
  </div>
</div>

<!-- ② 로비 -->
<div id="lobbySec" style="display:none">
  <div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <button class="btn btn-ghost" onclick="goMain()" style="padding:6px 10px;font-size:11px">← 뒤로</button>
      <div class="stitle" style="margin-bottom:0" id="lobbyTitle">1번방</div>
    </div>
    <div class="sbar"><div class="sdot" id="sdot"></div><div class="stxt" id="stxt">연결 중...</div></div>

    <!-- 참가 신청 -->
    <div class="row" style="margin-bottom:10px">
      <input id="nickIn" placeholder="소환사 이름 입력 후 참가 버튼..." maxlength="14"/>
      <button class="btn btn-blue" id="joinBtn" onclick="addPlayer()">참가</button>
    </div>
    <div class="warn" id="joinWarn"></div>

    <!-- 참가자 목록 -->
    <div class="ptags" id="ptags"></div>
    <div class="pcount">참가자 <span id="pcnt">0</span> / <span id="maxCnt">2</span>명</div>
    <div class="acd" id="acd"></div>

    <div class="row" style="margin-top:10px">
      <button class="btn btn-blue" id="startBtn" onclick="startGame()" disabled>🎯 배정 시작 (방장)</button>
      <button class="btn btn-red" id="resetBtn" onclick="resetPlayers()" style="display:none;margin-left:auto">초기화</button>
    </div>
  </div>

  <!-- 결과 잠금 카드 (결과 있을 때만 표시) -->
  <div class="card" id="resultLockCard" style="display:none">
    <div class="stitle">🔒 배정 결과</div>
    <div class="info" id="resultInfo"></div>
    <div class="row" style="margin-top:10px">
      <input type="password" id="resultPwInput" placeholder="결과 비밀번호 입력..."/>
      <button class="btn btn-gold" onclick="unlockResult()">확인</button>
    </div>
    <div class="warn" id="pwWarn"></div>
  </div>
</div>

<!-- ③ 핀볼 -->
<div id="pinSec">
  <div class="card">
    <div class="stitle">핀볼 팀 배정</div>
    <canvas id="pcanvas"></canvas>
    <div class="pstat" id="pstat"></div>
    <div class="cbar" id="cbar"></div>
  </div>
</div>

<!-- ④ 결과 -->
<div id="resSec">
  <div class="stitle" style="margin-bottom:10px">🏆 팀 배정 결과</div>
  <div class="tgrid">
    <div class="tpnl tb"><div class="thdr thdr-b"><div class="tdot tdb"></div>블루팀</div><div id="bList"></div></div>
    <div class="vcol"><div class="vln"></div><div class="vtxt">VS</div><div class="vln"></div></div>
    <div class="tpnl tr"><div class="thdr thdr-r"><div class="tdot tdr"></div>레드팀</div><div id="rList"></div></div>
  </div>
  <div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
    <button class="btn btn-gold" id="rerollBtn" onclick="reRoll()" style="display:none">🔄 다시 배정</button>
    <button class="btn btn-ghost" onclick="goLobby()">🏠 로비로</button>
  </div>
</div>

</div><!-- /wrap -->

<script>
// ════════════════════════════════════════════════
// Firebase REST API
// ════════════════════════════════════════════════
const FB = 'https://doyajino-2edff-default-rtdb.firebaseio.com';
async function fbGet(p){ try{ const r=await fetch(`${FB}/${p}.json`); return r.ok?await r.json():null; }catch{ return null; } }
async function fbSet(p,d){ try{ const r=await fetch(`${FB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); return r.ok; }catch{ return false; } }
async function fbDel(p){ try{ await fetch(`${FB}/${p}.json`,{method:'DELETE'}); }catch{} }

// ════════════════════════════════════════════════
// 설정
// ════════════════════════════════════════════════
const MAX_PLAYERS = 2;       // 테스트용 (실제: 10)
const ROOMS = ['room1','room2','room3'];
const ROOM_NAMES = ['1번방','2번방','3번방'];
const ROOM_COLORS = ['r1','r2','r3'];
const RESULT_PASSWORD = '1234'; // 결과 확인 비밀번호

// ════════════════════════════════════════════════
// 상태
// ════════════════════════════════════════════════
const mySession = 's'+Math.random().toString(36).slice(2,9);
let currentRoom = '';
let isHost = false;
let players = [];
let pollTimer = null;
let autoTimer = null;
let lastHash = '';
let lastEvTs = 0;
let animFrame = null;

// ════════════════════════════════════════════════
// 메인 화면 - 방 목록
// ════════════════════════════════════════════════
async function loadRooms(){
  const grid = document.getElementById('roomsGrid');
  grid.innerHTML = ROOMS.map((_,i)=>`
    <div class="room-card ${ROOM_COLORS[i]}" id="rc_${ROOMS[i]}" onclick="enterRoom('${ROOMS[i]}','${ROOM_NAMES[i]}')">
      <div class="room-num">${i+1}</div>
      <div class="room-label">${ROOM_NAMES[i]}</div>
      <div class="room-status open" id="rs_${ROOMS[i]}">불러오는 중...</div>
      <div class="room-pcount" id="rp_${ROOMS[i]}"></div>
      <div class="room-result" id="rr_${ROOMS[i]}" style="display:none"></div>
    </div>
  `).join('');
  for(const r of ROOMS) refreshRoomCard(r);
}

async function refreshRoomCard(roomKey){
  const room = await fbGet('rooms/'+roomKey);
  const statusEl = document.getElementById('rs_'+roomKey);
  const pcountEl = document.getElementById('rp_'+roomKey);
  const resultEl = document.getElementById('rr_'+roomKey);
  if(!statusEl) return;

  if(!room || !room.players){
    statusEl.className='room-status open'; statusEl.textContent='대기 중';
    pcountEl.textContent='0 / '+MAX_PLAYERS+'명';
    if(resultEl) resultEl.style.display='none';
    return;
  }
  const n=(room.players||[]).length;

  if(room.result){
    // 결과 있음 → 메인에 결과 표시
    statusEl.className='room-status done'; statusEl.textContent='배정 완료';
    pcountEl.textContent='';
    if(resultEl){
      const r=room.result;
      const d=new Date(r.ts);
      const t=(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
      resultEl.innerHTML=
        '<div style="font-size:9px;color:var(--txt);opacity:.6;margin-bottom:3px">'+t+'</div>'+
        '<div style="font-size:10px;color:var(--blue);margin-bottom:2px">🔵 '+(r.blue||[]).join(', ')+'</div>'+
        '<div style="font-size:10px;color:var(--red)">🔴 '+(r.red||[]).join(', ')+'</div>';
      resultEl.style.display='block';
    }
  } else if(n>=MAX_PLAYERS){
    statusEl.className='room-status full'; statusEl.textContent='꽉 참';
    pcountEl.textContent=n+' / '+MAX_PLAYERS+'명';
    if(resultEl) resultEl.style.display='none';
  } else {
    statusEl.className='room-status open'; statusEl.textContent='모집 중';
    pcountEl.textContent=n+' / '+MAX_PLAYERS+'명';
    if(resultEl) resultEl.style.display='none';
  }
}

// ════════════════════════════════════════════════
// 방 입장
// ════════════════════════════════════════════════
async function enterRoom(roomKey, roomName){
  currentRoom = roomKey;
  document.getElementById('mainSec').style.display='none';
  document.getElementById('lobbySec').style.display='block';
  document.getElementById('lobbyTitle').textContent=roomName;
  document.getElementById('maxCnt').textContent=MAX_PLAYERS;
  document.getElementById('sdot').className='sdot off';
  document.getElementById('stxt').textContent='연결 중...';
  document.getElementById('resultLockCard').style.display='none';

  const existing = await fbGet('rooms/'+currentRoom);
  if(!existing){
    isHost=true;
    await fbSet('rooms/'+currentRoom, { host:mySession, players:[], ev:null, result:null, createdAt:Date.now() });
  } else {
    isHost=(existing.host===mySession);
    // 결과 있으면 잠금 카드 표시
    if(existing.result) showResultLockCard(existing.result);
  }
  document.getElementById('resetBtn').style.display=isHost?'block':'none';
  startPolling();
}

function goMain(){
  stopPolling();
  cancelAutoCountdown();
  currentRoom=''; isHost=false; players=[]; lastHash=''; lastEvTs=0;
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('pinSec').style.display='none';
  document.getElementById('resSec').style.display='none';
  document.getElementById('mainSec').style.display='block';
  loadRooms();
}

function goLobby(){
  document.getElementById('resSec').style.display='none';
  document.getElementById('pinSec').style.display='none';
  document.getElementById('lobbySec').style.display='block';
}

// ════════════════════════════════════════════════
// 참가자 추가/제거
// ════════════════════════════════════════════════
async function addPlayer(){
  const input=document.getElementById('nickIn');
  const name=input.value.trim();
  const warn=document.getElementById('joinWarn');
  if(!name){ showW(warn,'이름을 입력하세요'); return; }

  const room=await fbGet('rooms/'+currentRoom);
  if(!room){ showW(warn,'연결 오류'); return; }
  const current=room.players||[];
  if(current.length>=MAX_PLAYERS){ showW(warn,`이미 ${MAX_PLAYERS}명이 꽉 찼어요!`); return; }
  if(current.find(p=>p.name===name)){ showW(warn,'이미 등록된 이름이에요'); return; }

  current.push({name, addedAt:Date.now()});
  await fbSet('rooms/'+currentRoom+'/players', current);
  input.value='';
}

async function removePlayer(name){
  if(!isHost) return;
  const room=await fbGet('rooms/'+currentRoom);
  if(!room) return;
  const updated=(room.players||[]).filter(p=>p.name!==name);
  await fbSet('rooms/'+currentRoom+'/players', updated);
}

async function resetPlayers(){
  if(!isHost) return;
  await fbSet('rooms/'+currentRoom+'/players',[]);
  await fbDel('rooms/'+currentRoom+'/result');
  document.getElementById('resultLockCard').style.display='none';
}

// ════════════════════════════════════════════════
// 폴링
// ════════════════════════════════════════════════
function startPolling(){ stopPolling(); poll(); pollTimer=setInterval(poll,1000); }
function stopPolling(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} }

async function poll(){
  if(!currentRoom) return;
  const room=await fbGet('rooms/'+currentRoom);
  if(!room){ setSdot(false); document.getElementById('stxt').textContent='❌ 방을 찾을 수 없습니다'; return; }
  setSdot(true);

  isHost=(room.host===mySession);
  document.getElementById('resetBtn').style.display=isHost?'block':'none';

  const newPlayers=room.players||[];
  const newHash=JSON.stringify(newPlayers);
  if(newHash!==lastHash){ lastHash=newHash; players=newPlayers; renderPlayers(players); }

  const ev=room.ev;
  if(ev&&ev.ts&&ev.ts>lastEvTs){ lastEvTs=ev.ts; handleEv(ev); }

  // 결과 등장 감지
  if(room.result){ showResultLockCard(room.result); }
  else { document.getElementById('resultLockCard').style.display='none'; }
}

// ════════════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════════════
function renderPlayers(pls){
  const wrap=document.getElementById('ptags');
  const cnt=document.getElementById('pcnt');
  const startBtn=document.getElementById('startBtn');
  const joinBtn=document.getElementById('joinBtn');
  const n=pls.length;
  wrap.innerHTML='';
  pls.forEach((p,i)=>{
    const t=document.createElement('div');
    t.className='ptag';
    t.innerHTML=p.name;
    if(isHost){
      const del=document.createElement('button');
      del.className='del'; del.textContent='✕';
      del.onclick=()=>removePlayer(p.name);
      t.appendChild(del);
    }
    wrap.appendChild(t);
  });
  cnt.textContent=n;
  startBtn.disabled=!isHost||n<MAX_PLAYERS;
  joinBtn.disabled=n>=MAX_PLAYERS;
  document.getElementById('stxt').textContent='🟢 연결됨 | '+n+'명 참가';
  if(n>=MAX_PLAYERS) startAutoCountdown();
  else cancelAutoCountdown();
}

function showW(el,msg){ el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',2500); }
function setSdot(on){ document.getElementById('sdot').className='sdot'+(on?'':' off'); }

// ════════════════════════════════════════════════
// 자동 카운트다운
// ════════════════════════════════════════════════
function startAutoCountdown(){
  if(autoTimer) return;
  let cnt=5; const el=document.getElementById('acd');
  el.style.display='block'; el.textContent='⏱ '+cnt+'초 후 자동 시작!';
  autoTimer=setInterval(()=>{
    cnt--;
    if(cnt>0){ el.textContent='⏱ '+cnt+'초 후 자동 시작!'; }
    else{ clearInterval(autoTimer);autoTimer=null;el.style.display='none'; if(isHost) startGame(); }
  },1000);
}
function cancelAutoCountdown(){
  if(!autoTimer) return;
  clearInterval(autoTimer);autoTimer=null;
  document.getElementById('acd').style.display='none';
}

// ════════════════════════════════════════════════
// 결과 잠금
// ════════════════════════════════════════════════
let pendingResult = null;

function showResultLockCard(result){
  pendingResult=result;
  const card=document.getElementById('resultLockCard');
  const info=document.getElementById('resultInfo');
  const d=new Date(result.ts);
  const t=(d.getMonth()+1)+'월 '+d.getDate()+'일 '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
  info.textContent='📅 '+t+' 배정 완료 | 비밀번호를 입력하면 결과를 볼 수 있어요';
  card.style.display='block';
}

function unlockResult(){
  const pw=document.getElementById('resultPwInput').value;
  const warn=document.getElementById('pwWarn');
  if(pw!==RESULT_PASSWORD){ showW(warn,'비밀번호가 틀렸어요'); return; }
  document.getElementById('resultPwInput').value='';
  if(pendingResult) showResult(pendingResult.blue, pendingResult.red, true);
}

// ════════════════════════════════════════════════
// 게임 이벤트
// ════════════════════════════════════════════════
async function sendEv(ev){
  ev.ts=Date.now(); lastEvTs=ev.ts;
  await fbSet('rooms/'+currentRoom+'/ev', ev);
  handleEv(ev);
}

function handleEv(ev){
  if(!ev) return;
  if(ev.type==='start') launchPinball(ev.shuffled);
  else if(ev.type==='result') showResult(ev.blue, ev.red, false);
}

async function startGame(){
  if(!isHost) return;
  const room=await fbGet('rooms/'+currentRoom);
  if(!room) return;
  const pls=room.players||[];
  if(pls.length<MAX_PLAYERS) return;
  const names=pls.map(p=>p.name);
  const shuffled=[...names].sort(()=>Math.random()-.5);
  await sendEv({type:'start',shuffled});
}

function reRoll(){ if(isHost) startGame(); }

// ════════════════════════════════════════════════
// 핀볼
// ════════════════════════════════════════════════
function launchPinball(names){
  document.getElementById('pinSec').style.display='block';
  document.getElementById('resSec').style.display='none';
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('pinSec').scrollIntoView({behavior:'smooth',block:'start'});
  runPinball(names, async(results)=>{
    const half=Math.floor(names.length/2);
    const blue=results.filter(b=>b.slot<half).map(b=>b.name);
    const red=results.filter(b=>b.slot>=half).map(b=>b.name);
    const resultData={blue,red,ts:Date.now()};
    if(isHost) await fbSet('rooms/'+currentRoom+'/result', resultData);
    await sendEv({type:'result',blue,red,ts:resultData.ts});
  });
}

function runPinball(names,onDone){
  const canvas=document.getElementById('pcanvas');
  const statEl=document.getElementById('pstat');
  const cdEl=document.getElementById('cbar');
  cdEl.style.display='none'; statEl.textContent='';
  const W=Math.min(680,window.innerWidth-24);
  const H=Math.round(W*.85);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const N=names.length;
  const SW=W/N;
  const BR=Math.max(9,Math.min(16,Math.floor(W/(N*2.6))));
  const GY=H-Math.round(H*.19);
  const FY=H-Math.round(H*.08);
  const HALF=Math.floor(N/2);
  const COLS=['#FF4655','#0BC4E3','#F5C518','#4ADE80','#C084FC','#FB923C','#38BDF8','#F472B6','#A3E635','#FDE68A'];
  const LABS=Array.from({length:N},(_,i)=>i<HALF?'블루'+(i+1):'레드'+(i-HALF+1));

  const pegs=[];
  const PR=Math.max(4,Math.min(7,Math.round(H*.54/48)));
  const PC=Math.max(5,Math.min(11,N+2));
  for(let r=0;r<PR;r++) for(let c=0;c<PC;c++){
    const off=(r%2===0)?SW*.5:0;
    pegs.push({x:SW*.3+off+c*(W-SW*.6)/(PC-1),y:Math.round(H*.1)+r*Math.round((GY-H*.14)/PR),lit:0});
  }
  const bumps=[
    {x:W*.22,y:H*.35,r:Math.round(W*.025),lit:0},{x:W*.78,y:H*.35,r:Math.round(W*.025),lit:0},
    {x:W*.50,y:H*.42,r:Math.round(W*.025),lit:0},{x:W*.34,y:H*.54,r:Math.round(W*.022),lit:0},
    {x:W*.66,y:H*.54,r:Math.round(W*.022),lit:0},
  ];
  const parts=[];
  function spark(x,y,col){ for(let i=0;i<14;i++){const a=(Math.PI*2/14)*i,sp=1.1+Math.random()*2.3; parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.1,life:1,decay:.034+Math.random()*.024,r:2+Math.random()*2.8,col});} }
  const balls=names.map((name,i)=>({name,col:COLS[i%COLS.length],x:W/2+(Math.random()-.5)*48,y:-BR*2-i*290,vx:(Math.random()-.5)*.28,vy:0,landed:false,slot:-1,sq:1.0}));
  const taken=new Set();
  let lc=0,done=false,cdOn=false,cdTimer=null;

  function chkCD(){
    if(cdOn||done) return;
    if(lc>=Math.max(2,Math.floor(N*.8))&&lc<N){
      cdOn=true;let cnt=5;
      cdEl.style.display='block';cdEl.textContent='⏱ '+cnt+'초 후 자동 배정';
      cdTimer=setInterval(()=>{cnt--;cdEl.textContent=cnt>0?'⏱ '+cnt+'초 후 자동 배정':'⚡ 자동 배정!';if(cnt<=0){clearInterval(cdTimer);forceAssign();}},1000);
    }
  }
  function forceAssign(){
    const free=Array.from({length:N},(_,i)=>i).filter(s=>!taken.has(s));
    balls.forEach(b=>{if(b.landed)return;const s=free.shift()??0;taken.add(s);b.slot=s;b.x=(s+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.3;lc++;spark(b.x,GY,b.col);});
    cdEl.style.display='none';
  }
  if(animFrame) cancelAnimationFrame(animFrame);

  function frame(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle='#010A13';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(11,196,227,.028)';ctx.fillRect(0,0,HALF*SW,H);
    ctx.fillStyle='rgba(255,70,85,.028)';ctx.fillRect(HALF*SW,0,W-HALF*SW,H);
    ctx.save();ctx.strokeStyle='rgba(200,155,60,.22)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(HALF*SW,0);ctx.lineTo(HALF*SW,GY-10);ctx.stroke();ctx.restore();
    for(let i=0;i<=N;i++){ctx.strokeStyle=i<=HALF?'rgba(11,196,227,.6)':'rgba(255,70,85,.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(i*SW,GY-17);ctx.lineTo(i*SW,FY);ctx.stroke();}
    for(let i=0;i<N;i++){
      const cx=(i+.5)*SW,tc=i<HALF?'#0BC4E3':'#FF4655',fi=taken.has(i);
      ctx.strokeStyle=fi?tc:tc+'3A';ctx.lineWidth=fi?2:1.2;
      ctx.beginPath();ctx.moveTo(i*SW+2,GY-17);ctx.lineTo(cx-3,GY-25);ctx.lineTo(cx+3,GY-25);ctx.lineTo((i+1)*SW-2,GY-17);ctx.stroke();
      ctx.fillStyle=fi?tc:tc+'44';ctx.font='bold '+Math.max(6,Math.round(SW*.16))+'px Malgun Gothic,sans-serif';ctx.textAlign='center';
      ctx.fillText(LABS[i],cx,GY-28);
      if(fi){
        ctx.fillStyle=i<HALF?'rgba(11,196,227,.065)':'rgba(255,70,85,.065)';ctx.fillRect(i*SW+1,GY,SW-2,FY-GY);
        ctx.fillStyle=tc;ctx.fillRect(i*SW+1,GY-5,SW-2,5);
        ctx.save();ctx.shadowColor=tc;ctx.shadowBlur=6;ctx.fillStyle=tc+'88';ctx.fillRect(i*SW+1,GY-5,SW-2,5);ctx.restore();
      }
    }
    ctx.strokeStyle='rgba(200,155,60,.42)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FY);ctx.lineTo(W,FY);ctx.stroke();
    pegs.forEach(p=>{if(p.lit>0)p.lit--;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=p.lit>0?'#FFD700':'rgba(200,155,60,.48)';ctx.fill();});
    bumps.forEach(b=>{
      if(b.lit>0)b.lit--;const l=b.lit>0;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.strokeStyle=l?'#FF4655':'rgba(255,70,85,.28)';ctx.lineWidth=l?2:1.3;ctx.stroke();
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,l?'rgba(255,70,85,.58)':'rgba(255,70,85,.09)');g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ctx.fillStyle=l?'#fff':'rgba(255,70,85,.55)';ctx.font='bold '+b.r+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',b.x,b.y);ctx.textBaseline='alphabetic';
    });
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=p.decay;if(p.life<=0){parts.splice(i,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');ctx.fill();}
    balls.forEach(b=>{
      if(b.landed){if(b.sq!==1){b.sq+=(1-b.sq)*.13;if(Math.abs(b.sq-1)<.01)b.sq=1;}drawBall(b);return;}
      b.vy+=0.015;b.x+=b.vx;b.y+=b.vy;
      if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*.68;}if(b.x+BR>W){b.x=W-BR;b.vx=-Math.abs(b.vx)*.68;}
      pegs.forEach(p=>{const dx=b.x-p.x,dy=b.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+4&&d>0){const nx=dx/d,ny=dy/d,dot=b.vx*nx+b.vy*ny;b.vx=(b.vx-2*dot*nx)*.54;b.vy=(b.vy-2*dot*ny)*.54;b.x=p.x+nx*(BR+5);b.y=p.y+ny*(BR+5);b.vx+=(Math.random()-.5)*.35;p.lit=7;}});
      bumps.forEach(bm=>{const dx=b.x-bm.x,dy=b.y-bm.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+bm.r&&d>0){const nx=dx/d,ny=dy/d;b.vx=nx*2.1+(Math.random()-.5)*.9;b.vy=ny*2.1-1.1;b.vy=Math.min(b.vy,-.55);b.x=bm.x+nx*(BR+bm.r+2);b.y=bm.y+ny*(BR+bm.r+2);bm.lit=11;}});
      if(b.y+BR>GY){for(let i=0;i<=N;i++){const wx=i*SW;if(b.x-BR<wx&&b.x+BR>wx){b.vx=(b.x<wx?1:-1)*Math.abs(b.vx)*.38;b.x=b.x<wx?wx+BR:wx-BR;}}b.vx*=.82;const cs=Math.floor(b.x/SW);if(cs>=0&&cs<N&&taken.has(cs)&&b.y-BR<GY&&b.y+BR>GY-5){b.y=GY-BR-4;b.vy=-(Math.abs(b.vy)*.72+1.1);b.vx+=(Math.random()-.5)*1.1;}}
      if(b.y+BR>=FY){let si=Math.max(0,Math.min(N-1,Math.floor(b.x/SW)));if(taken.has(si)){for(let d=1;d<N;d++){if(!taken.has(si-d)&&si-d>=0){si-=d;break;}if(!taken.has(si+d)&&si+d<N){si+=d;break;}}}taken.add(si);b.slot=si;b.x=(si+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.32;lc++;spark(b.x,GY,b.col);chkCD();}
      drawBall(b);
    });
    if(lc===N&&!done){done=true;cdEl.style.display='none';if(cdTimer)clearInterval(cdTimer);statEl.textContent='⚡ 배정 완료! 결과 확인하세요 🎉';onDone(balls.map(b=>({name:b.name,slot:b.slot})));}
    else if(!done) statEl.textContent='배정 중... ('+lc+'/'+N+')';
    animFrame=requestAnimationFrame(frame);
  }

  function drawBall(b){
    const bx=b.x,by=b.y,sq=b.sq||1;
    const sx=sq>1?1+(sq-1)*.48:sq<1?1+(1-sq)*.28:1,sy=sq>1?1-(sq-1)*.38:sq<1?1-(1-sq)*.22:1;
    ctx.save();ctx.translate(bx,by);ctx.scale(sx,sy);
    ctx.beginPath();ctx.arc(2,3,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.36)';ctx.fill();
    const gl=ctx.createRadialGradient(0,0,BR*.28,0,0,BR+4);gl.addColorStop(0,b.col+'AA');gl.addColorStop(.5,b.col+'3A');gl.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(0,0,BR+4,0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();
    const gr=ctx.createRadialGradient(-BR*.26,-BR*.26,1,0,0,BR);gr.addColorStop(0,b.col+'FF');gr.addColorStop(.52,b.col+'CC');gr.addColorStop(1,b.col+'60');ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.arc(-BR*.27,-BR*.28,BR*.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.3)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.strokeStyle=b.col;ctx.lineWidth=1.7;ctx.stroke();
    ctx.save();ctx.scale(1/sx,1/sy);
    ctx.font='bold '+Math.max(6,Math.round(BR*.56))+'px "Malgun Gothic","맑은 고딕",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const lbl=b.name.length>4?b.name.slice(0,3)+'…':b.name;
    ctx.strokeStyle='rgba(0,0,0,.72)';ctx.lineWidth=2.1;ctx.strokeText(lbl,0,0);ctx.fillStyle='#fff';ctx.fillText(lbl,0,0);
    ctx.restore();ctx.restore();
  }
  frame();
}

const CHAMPS=["Ahri","Akali","Alistar","Amumu","Anivia","Annie","Ashe","Azir","Bard","Blitzcrank","Brand","Braum","Caitlyn","Camille","Cassiopeia","Darius","Diana","Draven","Ekko","Elise","Evelynn","Ezreal","Fiora","Fizz","Galio","Gangplank","Garen","Gragas","Graves","Hecarim","Irelia","Janna","Jax","Jayce","Jhin","Jinx","Karma","Karthus","Kassadin","Katarina","Kayle","Kennen","Lissandra","Lucian","Lulu","Lux","Malphite","Malzahar","Maokai","Mordekaiser","Morgana","Nami","Nasus","Nautilus","Nidalee","Nocturne","Olaf","Orianna","Pantheon","Poppy","Pyke","Quinn","Rammus","Riven","Rumble","Ryze","Sejuani","Shaco","Shen","Singed","Sion","Sivir","Sona","Soraka","Swain","Syndra","Talon","Taric","Teemo","Thresh","Tristana","Tryndamere","Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vi","Viktor","Vladimir","Volibear","Warwick","Yasuo","Zac","Zed","Ziggs","Zilean","Zoe","Zyra"];
const CFIXES={"Twisted Fate":"TwistedFate","Lee Sin":"LeeSin","Miss Fortune":"MissFortune","Xin Zhao":"XinZhao"};
function cUrl(c){const k=CFIXES[c]||c.replace(/[^a-zA-Z]/g,'');return 'https://ddragon.leagueoflegends.com/cdn/14.9.1/img/champion/'+k+'.png';}
function rC(){return CHAMPS[Math.floor(Math.random()*CHAMPS.length)];}
const NP=['스밍하는','최애픽','입덕한','덕밍아웃한','오열중인','억텐하는','감성폭발','뇌절중인','마상입은','심쿵한','혼파망한','우리편','킹받는','사이다','갓생사는','무지성','극호감','노빠꾸','존맛탱','찐이야','소름돋는','직캠각','포텐폭발'];
const NS=['아히리','야스오','베인','룰루','소나','럭스','세나','카이사','징크스','이즈리얼','드레이븐','잔나','나미','레오나','타릭','티모','제드','아무무','가렌','다리우스','리신','신드라','에코','피즈','빅토르','블라디미르','카밀','트리스타나'];
function rNick(c){const p=NP[Math.floor(Math.random()*NP.length)],s=Math.random()<.5?NS[Math.floor(Math.random()*NS.length)]:c;return p+' '+s;}

function showResult(blue,red,isReplay){
  document.getElementById('pinSec').style.display='none';
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('resSec').style.display='block';
  document.getElementById('resSec').scrollIntoView({behavior:'smooth'});
  document.getElementById('rerollBtn').style.display=isHost&&!isReplay?'block':'none';
  const bl=document.getElementById('bList'),rl=document.getElementById('rList');
  bl.innerHTML='';rl.innerHTML='';
  function mkRow(name,i){
    const ch=rC(),row=document.createElement('div');row.className='prow';row.style.animationDelay=(i*65)+'ms';
    const img=document.createElement('img');img.className='cimg';img.src=cUrl(ch);img.alt=ch;img.onerror=()=>img.style.display='none';
    const nm=document.createElement('div');nm.className='pnm';nm.textContent=name;
    const nk=document.createElement('div');nk.className='pnk';nk.textContent=rNick(ch);
    row.append(img,nm,nk);return row;
  }
  blue.forEach((n,i)=>bl.appendChild(mkRow(n,i)));
  red.forEach((n,i)=>rl.appendChild(mkRow(n,i)));
}
