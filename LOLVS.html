<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포동포동 칼바람 내전</title>
<style>
:root{
  --y:#FFCB05;--b:#3D7DCA;--r:#CC0000;--g:#4CAF50;
  --bg:#0A1A2E;--bg2:#0D2340;--pnl:#112952;--dk:#003A70;
  --txt:#B8CCE8;--wh:#F0F8FF;
  --fn:'Malgun Gothic','맑은 고딕',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 20%,rgba(255,203,5,.05),transparent 50%),
             radial-gradient(ellipse at 85% 80%,rgba(61,125,202,.07),transparent 50%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(255,203,5,.03) 1px,transparent 1px);background-size:32px 32px}
.wrap{max-width:760px;margin:0 auto;padding:14px 12px;position:relative;z-index:1}

/* 헤더 */
header{text-align:center;margin-bottom:14px;padding:16px 12px;
  background:linear-gradient(135deg,rgba(13,35,64,.95),rgba(17,41,82,.95));
  border:2px solid var(--y);border-radius:8px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--r),var(--y),var(--b))}
.pball{width:20px;height:20px;border-radius:50%;display:inline-block;vertical-align:middle;margin:0 8px;
  background:linear-gradient(180deg,var(--r) 50%,white 50%);border:2px solid var(--dk);position:relative}
.pball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:5px;height:5px;background:white;border-radius:50%;border:1.5px solid var(--dk)}
header h1{font-size:clamp(17px,4vw,30px);color:var(--y);
  text-shadow:2px 2px 0 var(--dk),0 0 18px rgba(255,203,5,.5)}
header p{font-size:10px;color:var(--txt);opacity:.55;margin-top:3px}

/* 탭 */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-bottom:12px;
  background:rgba(0,0,0,.4);border:2px solid rgba(61,125,202,.3);border-radius:6px;padding:4px}
.tab{padding:8px 4px;border:none;border-radius:4px;cursor:pointer;
  font-family:var(--fn);font-size:11px;font-weight:700;color:var(--txt);
  background:transparent;transition:all .18s;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab .ti{font-size:15px}
.tab.on{background:linear-gradient(135deg,var(--dk),var(--pnl));
  color:var(--y);border:1px solid var(--y);box-shadow:0 0 8px rgba(255,203,5,.2)}

/* 카드 */
.card{background:linear-gradient(135deg,var(--bg2),var(--pnl));
  border:1px solid rgba(61,125,202,.35);border-radius:6px;
  padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--y),transparent)}
.stitle{font-size:11px;font-weight:700;color:var(--y);letter-spacing:2px;
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:3px;height:13px;background:var(--y);flex-shrink:0;border-radius:2px}

/* 폼 */
input,select{background:rgba(0,0,0,.45);border:1px solid rgba(61,125,202,.4);
  border-radius:4px;color:var(--wh);font-family:var(--fn);font-size:13px;
  padding:8px 11px;outline:none;transition:all .2s;width:100%}
input:focus,select:focus{border-color:var(--y);box-shadow:0 0 8px rgba(255,203,5,.2)}
input::placeholder{color:#3a5a7a}
select option{background:var(--bg2)}
.row{display:flex;gap:7px;align-items:stretch;margin-bottom:8px}
.row:last-child{margin-bottom:0}

/* 버튼 */
.btn{font-family:var(--fn);font-size:12px;font-weight:700;padding:8px 14px;
  border:none;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.96)}
.by{background:linear-gradient(135deg,#9a7800,var(--y));color:var(--dk)}
.bb{background:linear-gradient(135deg,#1a4a8a,var(--b));color:white}
.br{background:linear-gradient(135deg,#880000,var(--r));color:white;font-size:11px;padding:6px 10px}
.bg{background:linear-gradient(135deg,#1a5c1a,var(--g));color:white;font-size:11px;padding:6px 10px}
.bgh{background:transparent;border:1px solid rgba(61,125,202,.4);color:var(--txt);font-size:11px;padding:6px 11px}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.warn{background:rgba(204,0,0,.1);border:1px solid rgba(204,0,0,.28);
  border-radius:4px;padding:6px 10px;font-size:11px;color:#FF8888;display:none;margin-top:5px}

/* 방 카드 */
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rcard{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:2px solid rgba(61,125,202,.35);
  border-radius:6px;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.rcard:hover{transform:translateY(-3px)}
.rcard.r1:hover{border-color:var(--b);box-shadow:0 6px 20px rgba(61,125,202,.25)}
.rcard.r2:hover{border-color:var(--y);box-shadow:0 6px 20px rgba(255,203,5,.18)}
.rcard.r3:hover{border-color:var(--r);box-shadow:0 6px 20px rgba(204,0,0,.25)}
.rcard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.rcard.r1::before{background:var(--b)}.rcard.r2::before{background:var(--y)}.rcard.r3::before{background:var(--r)}
.rn{font-size:28px;font-weight:700;margin-bottom:3px}
.rcard.r1 .rn{color:var(--b)}.rcard.r2 .rn{color:var(--y)}.rcard.r3 .rn{color:var(--r)}
.rnm{font-size:11px;color:var(--txt);margin-bottom:8px}
.rbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.rbo{background:rgba(76,175,80,.14);color:var(--g);border:1px solid rgba(76,175,80,.3)}
.rbf{background:rgba(204,0,0,.14);color:var(--r);border:1px solid rgba(204,0,0,.28)}
.rpc{font-size:11px;color:var(--txt);margin-top:5px;opacity:.7}

/* 참가자 */
.ptags{display:flex;flex-wrap:wrap;gap:5px;min-height:28px;margin:8px 0}
.ptag{background:rgba(61,125,202,.14);border:1px solid rgba(61,125,202,.32);
  border-radius:12px;padding:4px 10px;font-size:11px;color:#7AB8E8;
  display:flex;align-items:center;gap:5px;animation:fi .2s ease}
.ptag .del{background:none;border:none;color:rgba(204,0,0,.45);cursor:pointer;font-size:12px;padding:0}
@keyframes fi{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.pcount{font-size:11px;color:var(--y);text-align:right;margin-top:3px}
.pcount span{color:var(--wh);font-weight:700}
.sbar{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--g);flex-shrink:0}
.sdot.off{background:var(--r)}
.stxt{font-size:10px;color:var(--txt)}
.acd{display:none;text-align:center;margin-top:10px;font-size:26px;font-weight:700;
  color:var(--y);text-shadow:0 0 16px rgba(255,203,5,.6)}

/* 배정결과 목록 */
.ri{background:rgba(0,0,0,.22);border:1px solid rgba(61,125,202,.18);border-radius:5px;
  padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.rm{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.rrm{font-size:10px;font-weight:700;color:var(--y)}
.rtm{font-size:10px;color:var(--txt);opacity:.6}
.rts{font-size:10px;margin-top:2px}.rts .bl{color:var(--b)}.rts .rd{color:var(--r)}
.fbrow{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fb{font-family:var(--fn);font-size:10px;font-weight:700;padding:4px 10px;
  border:1px solid rgba(61,125,202,.35);border-radius:12px;cursor:pointer;
  background:transparent;color:var(--txt);transition:all .15s}
.fb.on{background:rgba(61,125,202,.25);color:var(--b);border-color:var(--b)}
.nodata{text-align:center;padding:28px;color:var(--txt);opacity:.45;font-size:12px}

/* 결과 화면 */
.tgrid{display:grid;grid-template-columns:1fr 26px 1fr}
.tpnl{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:1px solid;border-radius:4px;overflow:hidden}
.tb{border-color:rgba(61,125,202,.35)}.tr{border-color:rgba(204,0,0,.32)}
.thdr{padding:8px 12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.thdr-b{background:linear-gradient(135deg,rgba(61,125,202,.18),transparent);color:var(--b);border-bottom:1px solid rgba(61,125,202,.18)}
.thdr-r{background:linear-gradient(135deg,rgba(204,0,0,.16),transparent);color:var(--r);border-bottom:1px solid rgba(204,0,0,.15)}
.tdot{width:6px;height:6px;border-radius:50%}
.tdb{background:var(--b)}.tdr{background:var(--r)}
.prow{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(255,255,255,.04);animation:sl .3s ease both}
.prow:last-child{border-bottom:none}
@keyframes sl{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
.pnm{font-size:13px;color:var(--wh);font-weight:600}
.vcol{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;gap:5px}
.vtxt{font-size:17px;font-weight:700;color:var(--y);writing-mode:vertical-rl;letter-spacing:4px}
.vln{width:1px;height:22px;background:linear-gradient(to bottom,transparent,rgba(255,203,5,.3),transparent)}

/* 순위 */
.rtbl{width:100%;border-collapse:collapse;min-width:320px}
.rtbl thead tr{background:rgba(61,125,202,.22)}
.rtbl th{padding:8px 8px;font-size:11px;color:var(--y);border-bottom:2px solid rgba(255,203,5,.2);text-align:center;font-weight:700}
.rtbl th:nth-child(3){text-align:left}
.rtbl td{padding:7px 8px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.05);text-align:center}
.rtbl td:nth-child(3){text-align:left;font-weight:600;color:var(--wh)}
.rtbl tr:hover td{background:rgba(255,255,255,.03)}
.rrank{font-weight:700;color:var(--y)}
.wh{color:var(--g);font-weight:700}.wm{color:var(--y);font-weight:700}.wl{color:var(--r);font-weight:700}
.cup{color:var(--r);font-size:11px;font-weight:700}
.cdn{color:var(--b);font-size:11px;font-weight:700}
.cnew{color:var(--g);font-size:10px;font-weight:700}
.cno{color:var(--txt);font-size:11px;opacity:.5}
.unranked{opacity:.5;font-size:11px}

/* 관리자 */
.abadge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,203,5,.12);
  border:1px solid rgba(255,203,5,.35);border-radius:12px;padding:3px 10px;
  font-size:10px;color:var(--y);margin-bottom:8px}
.erow{display:grid;grid-template-columns:1fr 55px 55px 52px 68px;
  gap:5px;align-items:center;padding:7px 8px;background:rgba(0,0,0,.2);border-radius:4px;margin-bottom:5px}
.erow input{padding:5px 7px;font-size:11px}
.enm{font-size:12px;color:var(--wh);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;
  display:none;align-items:center;justify-content:center;padding:20px}
.ov.show{display:flex}
.modal{background:linear-gradient(135deg,var(--bg2),var(--pnl));
  border:2px solid var(--y);border-radius:8px;padding:20px;
  width:100%;max-width:360px;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--b),var(--y),var(--r));border-radius:8px 8px 0 0}
.modal h3{font-size:14px;color:var(--y);margin-bottom:14px}
.ok{background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.25);
  border-radius:4px;padding:6px 10px;font-size:11px;color:var(--g);display:none;margin-top:5px}

@media(max-width:480px){
  .rgrid{grid-template-columns:1fr}
  .rcard{display:flex;align-items:center;gap:12px;text-align:left;padding:12px}
  .rn{font-size:20px;margin:0;min-width:26px}
  .tgrid{grid-template-columns:1fr 22px 1fr}
  .vtxt{font-size:13px;letter-spacing:3px}
  .erow{grid-template-columns:1fr 45px 45px 42px 58px}
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1><span class="pball"></span>포동포동 칼바람 내전<span class="pball"></span></h1>
  <p>by doyajino</p>
</header>

<!-- 탭 네비 -->
<div class="tabs" id="tabs">
  <button class="tab on" onclick="goTab('rooms')"><span class="ti">🏠</span>방 선택</button>
  <button class="tab" onclick="goTab('results')"><span class="ti">📋</span>배정결과</button>
  <button class="tab" onclick="goTab('rank')"><span class="ti">🏆</span>순위</button>
</div>

<!-- 방 선택 탭 -->
<div id="pg-rooms">
  <div class="card">
    <div class="stitle">방 선택</div>
    <div class="rgrid" id="rgrid"></div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:-4px">
    <button class="btn bgh" style="font-size:10px;padding:4px 10px" onclick="forceResetAll()">🔄 방 전체 초기화</button>
    <button class="btn bgh" style="font-size:10px;padding:4px 10px" onclick="openAdminLogin()">🔧 관리자</button>
  </div>
</div>

<!-- 배정결과 탭 -->
<div id="pg-results" style="display:none">
  <div class="card">
    <div class="stitle">배정 결과 기록</div>
    <div class="fbrow">
      <button class="fb on" onclick="setFilter('all')" id="fb-all">전체</button>
      <button class="fb" onclick="setFilter('room1')" id="fb-room1">1번방</button>
      <button class="fb" onclick="setFilter('room2')" id="fb-room2">2번방</button>
      <button class="fb" onclick="setFilter('room3')" id="fb-room3">3번방</button>
    </div>
    <div id="rlist"></div>
  </div>
</div>

<!-- 순위 탭 -->
<div id="pg-rank" style="display:none">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="stitle" style="margin-bottom:0">📊 랭킹</div>
      <div id="rankAdminBtn" style="display:none">
        <button class="btn bgh" style="font-size:10px;padding:4px 9px" onclick="openAdminPanel()">✏️ 편집</button>
      </div>
    </div>
    <div style="font-size:10px;color:var(--txt);opacity:.6;margin-bottom:8px">
      ※ 최소 <span id="minGamesLabel">3</span>게임 이상 참여해야 순위에 표시됩니다
    </div>
    <div style="overflow-x:auto" id="rankWrap"></div>
  </div>
</div>

<!-- 로비 -->
<div id="pg-lobby" style="display:none">
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <button class="btn bgh" onclick="leaveRoom()" style="padding:5px 9px;font-size:11px">← 뒤로</button>
      <div class="stitle" style="margin-bottom:0" id="lobbyTitle">1번방</div>
    </div>
    <div class="sbar"><div class="sdot off" id="sdot"></div><div class="stxt" id="stxt">연결 중...</div></div>
    <div class="row">
      <input id="nickIn" placeholder="소환사 이름 입력 후 참가..." maxlength="16"/>
      <button class="btn by" id="joinBtn" onclick="joinPlayer()">참가</button>
    </div>
    <div class="warn" id="jw"></div>
    <div class="ptags" id="ptags"></div>
    <div class="pcount">참가자 <span id="pcnt">0</span> / <span id="pmx">2</span>명</div>
    <div class="acd" id="acd"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn bb" id="startBtn" onclick="hostStart()" disabled>🎯 팀 배정 시작</button>
      <button class="btn br" id="resetBtn" onclick="hostReset()" style="display:none;margin-left:auto">초기화</button>
    </div>
  </div>
</div>

<!-- 핀볼 -->
<div id="pg-pinball" style="display:none">
  <div class="card">
    <div class="stitle">⚡ 핀볼 팀 배정</div>
    <canvas id="cv" style="display:block;margin:0 auto;border-radius:4px;border:2px solid rgba(61,125,202,.28);max-width:100%"></canvas>
    <div id="pstat" style="text-align:center;margin-top:8px;font-size:13px;font-weight:700;color:var(--y);min-height:20px"></div>
    <div id="pcd" style="text-align:center;margin-top:5px;font-size:17px;font-weight:700;color:var(--r);display:none"></div>
  </div>
</div>

<!-- 결과 -->
<div id="pg-result" style="display:none">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="stitle" style="margin-bottom:0" id="resultTitle">🏆 팀 배정 결과</div>
      <button class="btn bgh" onclick="leaveRoom()" style="font-size:10px;padding:4px 9px">🏠 홈</button>
    </div>
    <div class="tgrid">
      <div class="tpnl tb"><div class="thdr thdr-b"><div class="tdot tdb"></div>블루팀</div><div id="blist"></div></div>
      <div class="vcol"><div class="vln"></div><div class="vtxt">VS</div><div class="vln"></div></div>
      <div class="tpnl tr"><div class="thdr thdr-r"><div class="tdot tdr"></div>레드팀</div><div id="rlist2"></div></div>
    </div>
    <div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
      <button class="btn by" id="rerollBtn" onclick="doReroll()" style="display:none">🔄 다시 배정</button>
    </div>
  </div>
</div>

<!-- 관리자 패널 -->
<div id="pg-admin" style="display:none">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div><div class="abadge">👑 관리자</div><div class="stitle" style="margin-bottom:0">순위 편집</div></div>
      <button class="btn bgh" onclick="logoutAdmin()" style="font-size:10px">로그아웃</button>
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;color:var(--txt);margin-bottom:7px">참가자 추가</div>
      <div class="row">
        <input id="addName" placeholder="이름 직접 입력..." maxlength="16"/>
        <button class="btn bb" onclick="adminAddPlayer()">추가</button>
      </div>
    </div>
    <div style="font-size:11px;color:var(--txt);opacity:.6;margin-bottom:8px">이름 / 승 / 패 / 승률 / 동작</div>
    <div id="editList"></div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
      <button class="btn by" onclick="saveRank()">💾 저장</button>
    </div>
    <div class="ok" id="saveOk">✅ 저장 완료!</div>
  </div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="ov" id="loginModal">
  <div class="modal">
    <h3>🔧 관리자 로그인</h3>
    <div class="row"><input type="password" id="adminPw" placeholder="비밀번호..."/></div>
    <div class="warn" id="loginWarn"></div>
    <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
      <button class="btn bgh" onclick="closeLogin()">취소</button>
      <button class="btn by" onclick="doLogin()">로그인</button>
    </div>
  </div>
</div>

</div><!-- /wrap -->
<script>
// ════════════════════════════════
// Firebase REST - 심플하게
// ════════════════════════════════
const FB='https://doyajino-2edff-default-rtdb.firebaseio.com';
const GET=async p=>{try{const r=await fetch(`${FB}/${p}.json`);return r.ok?await r.json():null;}catch{return null;}};
const SET=async(p,d)=>{try{await fetch(`${FB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}catch{}};
const DEL=async p=>{try{await fetch(`${FB}/${p}.json`,{method:'DELETE'});}catch{}};

// ════════════════════════════════
// 설정
// ════════════════════════════════
const MAX=2;           // 테스트:2, 실제:10
const MIN_GAMES=3;     // 순위 최소 게임 수
const ADMIN_PW='doya1234';
const MAX_LOG=10;      // 방당 최대 기록
const ROOMS=['room1','room2','room3'];
const RNAMES=['1번방','2번방','3번방'];

// ════════════════════════════════
// 상태
// ════════════════════════════════
const ME='s'+Math.random().toString(36).slice(2,9);
let room='', amHost=false;
let pollId=null, acdId=null, rafId=null;
let pHash='', evTs=0;
let replayData=[]; // 전체 결과 목록 캐시
let resFlt='all';
let rankDb={};
let isAdmin=false;
let curBlue=[], curRed=[], curShuffled=[];

// ════════════════════════════════
// 화면 전환 - 단 하나의 섹션만 보임
// ════════════════════════════════
const PAGES=['rooms','results','rank','lobby','pinball','result','admin'];
function show(pg){
  PAGES.forEach(p=>{ const el=document.getElementById('pg-'+p); if(el) el.style.display='none'; });
  const el=document.getElementById('pg-'+pg);
  if(el){ el.style.display='block'; el.scrollIntoView({behavior:'smooth',block:'start'}); }
  const hasTabs=['rooms','results','rank'];
  document.getElementById('tabs').style.display=hasTabs.includes(pg)?'grid':'none';
}

function goTab(t){
  show(t);
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('on',['rooms','results','rank'][i]===t));
  if(t==='results') loadResults();
  if(t==='rank') loadRank();
}

// ════════════════════════════════
// 방 목록
// ════════════════════════════════
async function loadRooms(){
  const g=document.getElementById('rgrid');
  g.innerHTML=ROOMS.map((_,i)=>`
    <div class="rcard ${['r1','r2','r3'][i]}" onclick="enterRoom('${ROOMS[i]}','${RNAMES[i]}')">
      <div class="rn">${i+1}</div>
      <div class="rnm">${RNAMES[i]}</div>
      <div class="rbadge rbo" id="rb_${ROOMS[i]}">로딩...</div>
      <div class="rpc" id="rp_${ROOMS[i]}"></div>
    </div>`).join('');
  for(const r of ROOMS) updateCard(r);
}

async function updateCard(rk){
  const d=await GET('rooms/'+rk);
  const rb=document.getElementById('rb_'+rk);
  const rp=document.getElementById('rp_'+rk);
  if(!rb) return;
  const n=d&&Array.isArray(d.players)?d.players.length:0;
  const full=n>=MAX && !(d&&d.ev&&d.ev.type==='start'); // start 중일 때는 꽉참 표시 안함
  rb.className='rbadge '+(full?'rbf':'rbo');
  rb.textContent=full?'꽉 참':n?'모집 중':'대기 중';
  rp.textContent=n+'/'+MAX+'명';
}

// 방 전체 강제 초기화 (Firebase stale 데이터 제거)
async function forceResetAll(){
  if(!confirm('모든 방의 참가자를 초기화하시겠어요?')) return;
  for(const rk of ROOMS){
    await SET('rooms/'+rk+'/players',[]);
    await SET('rooms/'+rk+'/ev',null);
  }
  loadRooms();
}

// ════════════════════════════════
// 방 입장/퇴장
// ════════════════════════════════
async function enterRoom(rk,rname){
  room=rk; pHash=''; evTs=0;
  show('lobby');
  document.getElementById('lobbyTitle').textContent=rname;
  document.getElementById('pmx').textContent=MAX;
  document.getElementById('acd').style.display='none';
  document.getElementById('ptags').innerHTML='';
  document.getElementById('sdot').className='sdot off';
  document.getElementById('stxt').textContent='연결 중...';

  let d=await GET('rooms/'+rk);
  if(!d){
    amHost=true;
    await SET('rooms/'+rk,{host:ME,players:[],ev:null});
  } else {
    amHost=(d.host===ME);
    const pls=Array.isArray(d.players)?d.players:[];
    const evType=d.ev&&d.ev.type;
    // 잔재 청소 조건:
    // 1) result ev가 남아있거나
    // 2) 꽉 찼는데 start 이벤트가 없는 경우 (이전 게임 잔재)
    const stale=(evType==='result') || (pls.length>=MAX && evType!=='start');
    if(stale){
      await SET('rooms/'+rk+'/players',[]);
      await SET('rooms/'+rk+'/ev',null);
      evTs=Date.now();
      amHost=true; // 청소한 사람이 방장
      await SET('rooms/'+rk+'/host',ME);
    }
  }
  document.getElementById('resetBtn').style.display=amHost?'block':'none';
  startPoll();
}

function leaveRoom(){
  stopPoll(); stopAcd(); room=''; amHost=false; pHash=''; evTs=0;
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  goTab('rooms');
}

// ════════════════════════════════
// 참가자 조작
// ════════════════════════════════
async function joinPlayer(){
  const inp=document.getElementById('nickIn');
  const name=inp.value.trim();
  const w=document.getElementById('jw');
  if(!name){warnShow(w,'이름을 입력하세요');return;}
  const d=await GET('rooms/'+room);
  if(!d){warnShow(w,'연결 오류');return;}
  const cur=Array.isArray(d.players)?d.players:[];
  if(cur.length>=MAX){warnShow(w,MAX+'명이 꽉 찼어요!');return;}
  if(cur.find(p=>p.name===name)){warnShow(w,'이미 등록된 이름이에요');return;}
  cur.push({name,ts:Date.now()});
  await SET('rooms/'+room+'/players',cur);
  inp.value='';
}

async function kickPlayer(name){
  if(!amHost)return;
  const d=await GET('rooms/'+room);
  if(!d)return;
  await SET('rooms/'+room+'/players',(d.players||[]).filter(p=>p.name!==name));
}

async function hostReset(){
  if(!amHost)return;
  await SET('rooms/'+room+'/players',[]);
  await SET('rooms/'+room+'/ev',null);
  evTs=0; pHash=''; stopAcd();
  renderLobby([]);
}

// ════════════════════════════════
// 폴링 - 단순하게
// ════════════════════════════════
let pinRunning=false; // 핀볼 실행 중 플래그

function startPoll(){ stopPoll(); poll(); pollId=setInterval(poll,1000); }
function stopPoll(){ if(pollId){clearInterval(pollId);pollId=null;} }

async function poll(){
  if(!room)return;
  const d=await GET('rooms/'+room);
  if(!d){document.getElementById('sdot').className='sdot off';return;}
  document.getElementById('sdot').className='sdot';
  amHost=(d.host===ME);
  document.getElementById('resetBtn').style.display=amHost?'block':'none';

  // 핀볼 실행 중에는 이벤트 처리 및 UI 갱신 건너뜀
  if(pinRunning)return;

  // 이벤트 처리
  const ev=d.ev;
  if(ev && ev.ts && ev.ts>evTs){
    evTs=ev.ts;
    if(ev.type==='start'){
      stopAcd();
      startPinball(ev.shuffled);
      return;
    }
    if(ev.type==='result'){
      stopAcd();
      showResult(ev.blue,ev.red,ev.shuffled,false);
      return;
    }
  }

  // 로비 화면일 때만 참가자 갱신
  if(document.getElementById('pg-lobby').style.display==='block'){
    const np=Array.isArray(d.players)?d.players:[];
    const nh=JSON.stringify(np);
    if(nh!==pHash){ pHash=nh; renderLobby(np); }
  }
}

// ════════════════════════════════
// 로비 렌더링
// ════════════════════════════════
function renderLobby(pls){
  const wrap=document.getElementById('ptags');
  const n=pls.length;
  wrap.innerHTML='';
  pls.forEach(p=>{
    const t=document.createElement('div');t.className='ptag';t.textContent=p.name;
    if(amHost){const d=document.createElement('button');d.className='del';d.textContent='✕';d.onclick=()=>kickPlayer(p.name);t.appendChild(d);}
    wrap.appendChild(t);
  });
  document.getElementById('pcnt').textContent=n;
  document.getElementById('startBtn').disabled=!amHost||n<MAX;
  document.getElementById('joinBtn').disabled=n>=MAX;
  document.getElementById('stxt').textContent='🟢 연결됨 | '+n+'명 참가';

  // 카운트다운: 방장만
  if(n>=MAX){
    if(amHost) startAcd();
    else{
      // 비방장: 대기 메시지만
      document.getElementById('acd').style.display='block';
      document.getElementById('acd').textContent='⏳ 방장이 배정을 시작합니다...';
      document.getElementById('acd').style.fontSize='16px';
    }
  } else {
    stopAcd();
    document.getElementById('acd').style.display='none';
  }
}

function warnShow(el,msg){el.textContent=msg;el.style.display='block';setTimeout(()=>el.style.display='none',2500);}

// ════════════════════════════════
// 카운트다운 (방장만)
// ════════════════════════════════
function startAcd(){
  if(acdId) return;
  let cnt=5;
  const el=document.getElementById('acd');
  el.style.display='block';el.style.fontSize='26px';
  el.textContent='⏱ '+cnt+'초 후 자동 시작!';
  acdId=setInterval(()=>{
    cnt--;
    if(cnt>0) el.textContent='⏱ '+cnt+'초 후 자동 시작!';
    else{ stopAcd(); if(amHost&&room) hostStart(); }
  },1000);
}
function stopAcd(){ if(acdId){clearInterval(acdId);acdId=null;} document.getElementById('acd').style.display='none'; }

// ════════════════════════════════
// 게임 시작 - 방장이 Firebase에 쓰면 모두가 폴링으로 받아 시작
// ════════════════════════════════
async function hostStart(){
  if(!amHost||!room)return;
  const d=await GET('rooms/'+room);
  if(!d)return;
  const names=(Array.isArray(d.players)?d.players:[]).map(p=>p.name);
  if(names.length<MAX)return;
  const shuffled=[...names].sort(()=>Math.random()-.5);
  await SET('rooms/'+room+'/ev',{type:'start',shuffled,ts:Date.now()});
}

function doReroll(){hostStart();}

// ════════════════════════════════
// 핀볼 시작
// ════════════════════════════════
function startPinball(shuffled){
  curShuffled=shuffled;
  show('pinball');
  runPinball(shuffled, async(blue,red)=>{
    curBlue=blue; curRed=red;
    // 방장만 결과 저장 + 방 초기화
    if(amHost){
      await saveLog(blue,red,shuffled);
      await autoRegisterRank(blue,red);
      // 결과 ev 저장
      const ts=Date.now();
      await SET('rooms/'+room+'/ev',{type:'result',blue,red,shuffled,ts});
      // 참가자 즉시 초기화
      await SET('rooms/'+room+'/players',[]);
      evTs=ts; pHash='';
    }
    showResult(blue,red,shuffled,false);
  });
}

// ════════════════════════════════
// 결과 화면
// ════════════════════════════════
function showResult(blue,red,shuffled,isReplay){
  curBlue=blue; curRed=red; curShuffled=shuffled||[];
  show('result');
  document.getElementById('resultTitle').textContent=isReplay?'🎬 리플레이 결과':'🏆 팀 배정 결과';
  document.getElementById('rerollBtn').style.display=(amHost&&!isReplay)?'inline-block':'none';
  const bl=document.getElementById('blist'),rl=document.getElementById('rlist2');
  bl.innerHTML='';rl.innerHTML='';
  const mk=(name,i)=>{
    const r=document.createElement('div');r.className='prow';r.style.animationDelay=(i*60)+'ms';
    const n=document.createElement('div');n.className='pnm';n.textContent=name;r.appendChild(n);return r;
  };
  blue.forEach((n,i)=>bl.appendChild(mk(n,i)));
  red.forEach((n,i)=>rl.appendChild(mk(n,i)));
}

// ════════════════════════════════
// 로그 저장
// ════════════════════════════════
async function saveLog(blue,red,shuffled){
  const key='logs/'+room;
  let list=await GET(key)||[];
  if(!Array.isArray(list)) list=Object.values(list);
  list.unshift({blue,red,shuffled,ts:Date.now(),room,roomName:RNAMES[ROOMS.indexOf(room)]});
  if(list.length>MAX_LOG) list=list.slice(0,MAX_LOG);
  await SET(key,list);
}

// 참가자 자동 순위 등록
async function autoRegisterRank(blue,red){
  let ranks=await GET('rankings')||{};
  let changed=false;
  [...blue,...red].forEach(name=>{
    if(!ranks[name]){ranks[name]={name,win:0,lose:0,games:0,isNew:true};changed=true;}
  });
  if(changed) await SET('rankings',ranks);
}

// ════════════════════════════════
// 배정결과 목록 + 리플레이
// ════════════════════════════════
async function loadResults(){
  replayData=[];
  for(const r of ROOMS){
    let list=await GET('logs/'+r)||[];
    if(!Array.isArray(list)) list=Object.values(list);
    replayData.push(...list);
  }
  replayData.sort((a,b)=>b.ts-a.ts);
  renderResults();
}

function setFilter(f){
  resFlt=f;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  document.getElementById('fb-'+f).classList.add('on');
  renderResults();
}

function renderResults(){
  const c=document.getElementById('rlist');
  const list=resFlt==='all'?replayData:replayData.filter(r=>r.room===resFlt);
  if(!list.length){c.innerHTML='<div class="nodata">📭 배정 기록이 없어요</div>';return;}
  c.innerHTML=list.map((r,i)=>{
    const d=new Date(r.ts);
    const dt=`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
    const tm=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `<div class="ri">
      <div class="rm">
        <div class="rrm">${r.roomName||r.room}</div>
        <div class="rtm">📅 ${dt} ${tm}</div>
        <div class="rts">
          <span class="bl">🔵 ${(r.blue||[]).join(', ')}</span><br>
          <span class="rd">🔴 ${(r.red||[]).join(', ')}</span>
        </div>
      </div>
      <button class="btn bgh" onclick="doReplay(${replayData.indexOf(r)})">▶ 리플레이</button>
    </div>`;
  }).join('');
}

// 리플레이 = 핀볼 다시 실행 (저장된 shuffled 순서로)
function doReplay(idx){
  const r=replayData[idx];
  if(!r||!r.shuffled)return;
  show('pinball');
  runPinball(r.shuffled,(blue,red)=>{
    showResult(blue,red,r.shuffled,true);
  });
}

// ════════════════════════════════
// 순위 (롤드컵 방식)
// 최소 MIN_GAMES 이상만 랭킹 표시
// 승률 = 승/(승+패), 동점 시 총 승수 → 게임수
// ════════════════════════════════
async function loadRank(){
  const data=await GET('rankings')||{};
  rankDb=data;
  document.getElementById('rankAdminBtn').style.display=isAdmin?'flex':'none';
  document.getElementById('minGamesLabel').textContent=MIN_GAMES;

  const all=Object.values(data);
  const qualified=all.filter(p=>p.games>=MIN_GAMES);
  const unranked=all.filter(p=>p.games<MIN_GAMES);

  qualified.sort((a,b)=>{
    const wa=a.win/a.games, wb=b.win/b.games;
    if(wb!==wa) return wb-wa;
    if(b.win!==a.win) return b.win-a.win;
    return b.games-a.games;
  });

  // 동률 순위
  function rankStr(arr,i){
    const cur=arr[i];
    const wa=cur.win/cur.games;
    let r=1;
    for(let j=0;j<i;j++){
      const p=arr[j];
      if(p.win/p.games>wa||(p.win/p.games===wa&&p.win>cur.win)) r++;
    }
    const tie=arr.filter((p,j)=>j!==i&&p.win/p.games===wa&&p.win===cur.win).length>0;
    return tie?`공동 ${r}위`:`${r}위`;
  }

  const adminCols=isAdmin?'<th>편집</th>':'';
  const wrap=document.getElementById('rankWrap');
  if(!all.length){wrap.innerHTML='<div class="nodata">아직 순위 데이터가 없어요<br>배정 후 자동으로 등록됩니다</div>';return;}

  let html=`<div style="text-align:center;font-size:12px;font-weight:700;color:var(--y);margin-bottom:8px;padding:6px;background:rgba(61,125,202,.15);border-radius:4px">포동포동 칼바람 내전 랭킹</div>`;
  html+=`<table class="rtbl"><thead><tr>
    <th>현재순위</th><th>변동</th><th>아이디</th><th>승</th><th>패</th><th>승률</th>
    ${adminCols}
  </tr></thead><tbody>`;

  qualified.forEach((p,i)=>{
    const wr=Math.round(p.win/p.games*100);
    const wc=wr>=60?'wh':wr>=50?'wm':'wl';
    const rs=rankStr(qualified,i);
    let chg='<span class="cno">-</span>';
    if(p.isNew) chg='<span class="cnew">(신규)</span>';
    else if(p.prevRank){
      const cur=parseInt(rs.replace(/[^0-9]/g,''))||i+1;
      const diff=p.prevRank-cur;
      if(diff>0) chg=`<span class="cup">▲${diff}</span>`;
      else if(diff<0) chg=`<span class="cdn">▼${Math.abs(diff)}</span>`;
    }
    const ae=isAdmin?`<td><div style="display:flex;gap:3px;justify-content:center">
      <button class="btn" style="font-size:10px;padding:3px 7px;background:rgba(61,125,202,.3);color:var(--b);border:1px solid rgba(61,125,202,.4)" onclick="editEntry('${p.name}')">수정</button>
      <button class="btn br" style="font-size:10px;padding:3px 7px" onclick="delEntry('${p.name}')">삭제</button>
    </div></td>`:'';
    html+=`<tr><td class="rrank">${rs}</td><td>${chg}</td><td>${p.name}</td>
      <td style="color:var(--g);font-weight:700">${p.win}</td>
      <td style="color:var(--r);font-weight:700">${p.lose}</td>
      <td class="${wc}">${wr}%</td>${ae}</tr>`;
  });

  if(unranked.length){
    html+=`<tr><td colspan="${isAdmin?7:6}" style="text-align:center;padding:6px;font-size:10px;color:var(--txt);opacity:.5;background:rgba(0,0,0,.15)">
      ── 아래는 ${MIN_GAMES}게임 미만 (순위 미집계) ──</td></tr>`;
    unranked.forEach(p=>{
      const wr=p.games?Math.round(p.win/p.games*100):0;
      const ae=isAdmin?`<td><div style="display:flex;gap:3px;justify-content:center">
        <button class="btn" style="font-size:10px;padding:3px 7px;background:rgba(61,125,202,.3);color:var(--b);border:1px solid rgba(61,125,202,.4)" onclick="editEntry('${p.name}')">수정</button>
        <button class="btn br" style="font-size:10px;padding:3px 7px" onclick="delEntry('${p.name}')">삭제</button>
      </div></td>`:'';
      html+=`<tr class="unranked"><td>-</td><td>-</td><td>${p.name}</td>
        <td style="color:var(--g)">${p.win}</td><td style="color:var(--r)">${p.lose}</td>
        <td>${wr}%</td>${ae}</tr>`;
    });
  }

  html+='</tbody></table>';
  wrap.innerHTML=html;
}

// ════════════════════════════════
// 관리자
// ════════════════════════════════
function openAdminLogin(){
  if(isAdmin){openAdminPanel();return;}
  document.getElementById('adminPw').value='';
  document.getElementById('loginWarn').style.display='none';
  document.getElementById('loginModal').classList.add('show');
}
function closeLogin(){document.getElementById('loginModal').classList.remove('show');}
function doLogin(){
  if(document.getElementById('adminPw').value===ADMIN_PW){
    isAdmin=true;closeLogin();openAdminPanel();
  } else {
    warnShow(document.getElementById('loginWarn'),'비밀번호가 틀렸어요');
  }
}
function logoutAdmin(){isAdmin=false;document.getElementById('pg-admin').style.display='none';goTab('rooms');}

async function openAdminPanel(){
  show('admin');
  rankDb=await GET('rankings')||{};
  renderEditList();
}

function renderEditList(){
  const cont=document.getElementById('editList');
  const entries=Object.values(rankDb).sort((a,b)=>{
    const wa=a.games?a.win/a.games:0,wb=b.games?b.win/b.games:0;return wb-wa;
  });
  if(!entries.length){cont.innerHTML='<div class="nodata" style="padding:10px 0">아직 참가자가 없어요</div>';return;}
  cont.innerHTML=entries.map(p=>{
    const k=p.name.replace(/[^a-zA-Z0-9가-힣]/g,'_');
    const wr=p.games?Math.round(p.win/p.games*100):0;
    return `<div class="erow">
      <div class="enm">${p.name}</div>
      <input type="number" min="0" value="${p.win||0}" id="ew_${k}" oninput="prevWr('${k}')"/>
      <input type="number" min="0" value="${p.lose||0}" id="el_${k}" oninput="prevWr('${k}')"/>
      <div style="font-size:10px;text-align:center" id="ep_${k}"><span class="${wr>=50?'wh':'wl'}">${wr}%</span></div>
      <button class="btn br" style="font-size:10px;padding:4px 7px" onclick="delFromEdit('${p.name}')">삭제</button>
    </div>`;
  }).join('');
}

function prevWr(k){
  const w=parseInt(document.getElementById('ew_'+k)?.value)||0;
  const l=parseInt(document.getElementById('el_'+k)?.value)||0;
  const g=w+l,wr=g?Math.round(w/g*100):0;
  const el=document.getElementById('ep_'+k);
  if(el) el.innerHTML=`<span class="${wr>=50?'wh':'wl'}">${wr}%</span>`;
}

function adminAddPlayer(){
  const inp=document.getElementById('addName');
  const name=inp.value.trim();if(!name)return;
  if(!rankDb[name]) rankDb[name]={name,win:0,lose:0,games:0,isNew:true};
  inp.value='';renderEditList();
}

function delFromEdit(name){delete rankDb[name];renderEditList();}

async function saveRank(){
  Object.values(rankDb).forEach(p=>{
    const k=p.name.replace(/[^a-zA-Z0-9가-힣]/g,'_');
    const we=document.getElementById('ew_'+k);
    const le=document.getElementById('el_'+k);
    if(we&&le){
      p.prevRank=getCurRank(p.name);
      p.win=parseInt(we.value)||0;
      p.lose=parseInt(le.value)||0;
      p.games=p.win+p.lose;
      p.isNew=false;
    }
  });
  await SET('rankings',rankDb);
  const ok=document.getElementById('saveOk');
  ok.style.display='block';setTimeout(()=>ok.style.display='none',2000);
  renderEditList();
}

function getCurRank(name){
  const s=Object.values(rankDb).sort((a,b)=>{
    const wa=a.games?a.win/a.games:0,wb=b.games?b.win/b.games:0;return wb-wa;
  });
  const i=s.findIndex(p=>p.name===name);return i>=0?i+1:null;
}

async function editEntry(name){
  const p=rankDb[name];if(!p)return;
  const w=prompt(`[${name}] 승 수 입력`,p.win||0);if(w===null)return;
  const l=prompt(`[${name}] 패 수 입력`,p.lose||0);if(l===null)return;
  rankDb[name]={...p,prevRank:getCurRank(name),win:parseInt(w)||0,lose:parseInt(l)||0,games:(parseInt(w)||0)+(parseInt(l)||0),isNew:false};
  await SET('rankings',rankDb);loadRank();
}

async function delEntry(name){
  if(!confirm(`'${name}'을 삭제할까요?`))return;
  delete rankDb[name];await SET('rankings',rankDb);loadRank();
}

// ════════════════════════════════
// 핀볼 엔진
// ════════════════════════════════
function runPinball(names,onDone){
  const cv=document.getElementById('cv');
  const st=document.getElementById('pstat');
  const cd=document.getElementById('pcd');
  cd.style.display='none';st.textContent='준비 중...';

  const W=Math.min(680,window.innerWidth-24),H=Math.round(W*.85);
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  const N=names.length,SW=W/N;
  const BR=Math.max(9,Math.min(15,Math.floor(W/(N*2.7))));
  const GY=H-Math.round(H*.19),FY=H-Math.round(H*.08),HALF=Math.floor(N/2);
  const COLS=['#CC0000','#3D7DCA','#FFCB05','#4CAF50','#9C27B0','#FF6B35','#00BCD4','#E91E63','#8BC34A','#FFF176'];
  const LABS=Array.from({length:N},(_,i)=>i<HALF?'블루'+(i+1):'레드'+(i-HALF+1));

  const pegs=[];
  const PR=Math.max(4,Math.min(7,Math.round(H*.54/48))),PC=Math.max(5,Math.min(11,N+2));
  for(let r=0;r<PR;r++) for(let c=0;c<PC;c++){
    const off=(r%2===0)?SW*.5:0;
    pegs.push({x:SW*.3+off+c*(W-SW*.6)/(PC-1),y:Math.round(H*.1)+r*Math.round((GY-H*.14)/PR),lit:0});
  }
  const bumps=[
    {x:W*.22,y:H*.35,r:Math.round(W*.025),lit:0},{x:W*.78,y:H*.35,r:Math.round(W*.025),lit:0},
    {x:W*.50,y:H*.42,r:Math.round(W*.025),lit:0},{x:W*.34,y:H*.54,r:Math.round(W*.022),lit:0},
    {x:W*.66,y:H*.54,r:Math.round(W*.022),lit:0}
  ];
  const parts=[];
  function spark(x,y,col){for(let i=0;i<14;i++){const a=(Math.PI*2/14)*i,sp=1.1+Math.random()*2.3;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.1,life:1,decay:.034+Math.random()*.024,r:2+Math.random()*2.8,col});}}

  const balls=names.map((name,i)=>({name,col:COLS[i%COLS.length],x:W/2+(Math.random()-.5)*48,y:-BR*2-i*290,vx:(Math.random()-.5)*.28,vy:0,landed:false,slot:-1,sq:1.0}));
  const taken=new Set();
  let lc=0,done=false,cdOn=false,cdId=null;

  function chkCD(){
    if(cdOn||done)return;
    if(lc>=Math.max(2,Math.floor(N*.8))&&lc<N){
      cdOn=true;let cnt=5;cd.style.display='block';cd.textContent='⏱ '+cnt+'초 후 자동 배정';
      cdId=setInterval(()=>{cnt--;cd.textContent=cnt>0?'⏱ '+cnt+'초 후 자동 배정':'⚡ 자동 배정!';if(cnt<=0){clearInterval(cdId);forceAll();}},1000);
    }
  }
  function forceAll(){
    const free=Array.from({length:N},(_,i)=>i).filter(s=>!taken.has(s));
    balls.forEach(b=>{if(b.landed)return;const s=free.shift()??0;taken.add(s);b.slot=s;b.x=(s+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.3;lc++;spark(b.x,GY,b.col);});
    cd.style.display='none';
  }

  if(rafId)cancelAnimationFrame(rafId);

  function frame(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0A1A2E';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(61,125,202,.04)';ctx.fillRect(0,0,HALF*SW,H);
    ctx.fillStyle='rgba(204,0,0,.04)';ctx.fillRect(HALF*SW,0,W-HALF*SW,H);
    ctx.save();ctx.strokeStyle='rgba(255,203,5,.18)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(HALF*SW,0);ctx.lineTo(HALF*SW,GY-10);ctx.stroke();ctx.restore();

    for(let i=0;i<=N;i++){ctx.strokeStyle=i<=HALF?'rgba(61,125,202,.6)':'rgba(204,0,0,.55)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(i*SW,GY-17);ctx.lineTo(i*SW,FY);ctx.stroke();}
    for(let i=0;i<N;i++){
      const cx=(i+.5)*SW,tc=i<HALF?'#3D7DCA':'#CC0000',fi=taken.has(i);
      ctx.strokeStyle=fi?tc:tc+'3A';ctx.lineWidth=fi?2:1.2;
      ctx.beginPath();ctx.moveTo(i*SW+2,GY-17);ctx.lineTo(cx-3,GY-25);ctx.lineTo(cx+3,GY-25);ctx.lineTo((i+1)*SW-2,GY-17);ctx.stroke();
      ctx.fillStyle=fi?tc:tc+'44';ctx.font='bold '+Math.max(6,Math.round(SW*.16))+'px Malgun Gothic,sans-serif';ctx.textAlign='center';ctx.fillText(LABS[i],cx,GY-28);
      if(fi){
        ctx.fillStyle=i<HALF?'rgba(61,125,202,.08)':'rgba(204,0,0,.07)';ctx.fillRect(i*SW+1,GY,SW-2,FY-GY);
        ctx.fillStyle=tc;ctx.fillRect(i*SW+1,GY-5,SW-2,5);
        ctx.save();ctx.shadowColor=tc;ctx.shadowBlur=6;ctx.fillStyle=tc+'88';ctx.fillRect(i*SW+1,GY-5,SW-2,5);ctx.restore();
      }
    }
    ctx.strokeStyle='rgba(255,203,5,.45)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FY);ctx.lineTo(W,FY);ctx.stroke();

    pegs.forEach(p=>{if(p.lit>0)p.lit--;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=p.lit>0?'#FFCB05':'rgba(255,203,5,.42)';ctx.fill();});
    bumps.forEach(b=>{
      if(b.lit>0)b.lit--;const l=b.lit>0;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.strokeStyle=l?'#CC0000':'rgba(204,0,0,.28)';ctx.lineWidth=l?2:1.3;ctx.stroke();
      const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,l?'rgba(204,0,0,.55)':'rgba(204,0,0,.08)');g.addColorStop(1,'transparent');
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
      ctx.fillStyle=l?'#fff':'rgba(204,0,0,.55)';ctx.font='bold '+b.r+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',b.x,b.y);ctx.textBaseline='alphabetic';
    });
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=p.decay;if(p.life<=0){parts.splice(i,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');ctx.fill();}

    balls.forEach(b=>{
      if(b.landed){if(b.sq!==1){b.sq+=(1-b.sq)*.13;if(Math.abs(b.sq-1)<.01)b.sq=1;}dball(b);return;}
      b.vy+=0.015;b.x+=b.vx;b.y+=b.vy;
      if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*.68;}if(b.x+BR>W){b.x=W-BR;b.vx=-Math.abs(b.vx)*.68;}
      pegs.forEach(p=>{const dx=b.x-p.x,dy=b.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+4&&d>0){const nx=dx/d,ny=dy/d,dot=b.vx*nx+b.vy*ny;b.vx=(b.vx-2*dot*nx)*.54;b.vy=(b.vy-2*dot*ny)*.54;b.x=p.x+nx*(BR+5);b.y=p.y+ny*(BR+5);b.vx+=(Math.random()-.5)*.35;p.lit=7;}});
      bumps.forEach(bm=>{const dx=b.x-bm.x,dy=b.y-bm.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+bm.r&&d>0){const nx=dx/d,ny=dy/d;b.vx=nx*2.1+(Math.random()-.5)*.9;b.vy=ny*2.1-1.1;b.vy=Math.min(b.vy,-.55);b.x=bm.x+nx*(BR+bm.r+2);b.y=bm.y+ny*(BR+bm.r+2);bm.lit=11;}});
      if(b.y+BR>GY){
        for(let i=0;i<=N;i++){const wx=i*SW;if(b.x-BR<wx&&b.x+BR>wx){b.vx=(b.x<wx?1:-1)*Math.abs(b.vx)*.38;b.x=b.x<wx?wx+BR:wx-BR;}}
        b.vx*=.82;
        const cs=Math.floor(b.x/SW);if(cs>=0&&cs<N&&taken.has(cs)&&b.y-BR<GY&&b.y+BR>GY-5){b.y=GY-BR-4;b.vy=-(Math.abs(b.vy)*.72+1.1);b.vx+=(Math.random()-.5)*1.1;}
      }
      if(b.y+BR>=FY){
        let si=Math.max(0,Math.min(N-1,Math.floor(b.x/SW)));
        if(taken.has(si)){for(let d=1;d<N;d++){if(!taken.has(si-d)&&si-d>=0){si-=d;break;}if(!taken.has(si+d)&&si+d<N){si+=d;break;}}}
        taken.add(si);b.slot=si;b.x=(si+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.32;lc++;spark(b.x,GY,b.col);chkCD();
      }
      dball(b);
    });

    if(lc===N&&!done){
      done=true;cd.style.display='none';if(cdId)clearInterval(cdId);
      st.textContent='⚡ 배정 완료! 🎉';
      const half=Math.floor(N/2);
      const blue=balls.filter(b=>b.slot<half).map(b=>b.name);
      const red=balls.filter(b=>b.slot>=half).map(b=>b.name);
      onDone(blue,red);
    } else if(!done){
      st.textContent='배정 중... ('+lc+'/'+N+')';
    }
    rafId=requestAnimationFrame(frame);
  }

  function dball(b){
    const bx=b.x,by=b.y,sq=b.sq||1;
    const sx=sq>1?1+(sq-1)*.48:sq<1?1+(1-sq)*.28:1,sy=sq>1?1-(sq-1)*.38:sq<1?1-(1-sq)*.22:1;
    ctx.save();ctx.translate(bx,by);ctx.scale(sx,sy);
    ctx.beginPath();ctx.arc(2,3,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
    const gl=ctx.createRadialGradient(0,0,BR*.28,0,0,BR+4);gl.addColorStop(0,b.col+'AA');gl.addColorStop(.5,b.col+'3A');gl.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(0,0,BR+4,0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();
    const gr=ctx.createRadialGradient(-BR*.26,-BR*.26,1,0,0,BR);gr.addColorStop(0,b.col+'FF');gr.addColorStop(.52,b.col+'CC');gr.addColorStop(1,b.col+'60');ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.arc(-BR*.27,-BR*.28,BR*.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.32)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.strokeStyle=b.col;ctx.lineWidth=1.8;ctx.stroke();
    ctx.save();ctx.scale(1/sx,1/sy);
    ctx.font='bold '+Math.max(6,Math.round(BR*.54))+'px "Malgun Gothic",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const lbl=b.name.length>4?b.name.slice(0,3)+'…':b.name;
    ctx.strokeStyle='rgba(0,0,0,.75)';ctx.lineWidth=2.2;ctx.strokeText(lbl,0,0);ctx.fillStyle='#fff';ctx.fillText(lbl,0,0);
    ctx.restore();ctx.restore();
  }
  frame();
}
