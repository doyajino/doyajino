<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포동포동 칼바람 내전 by doyajino</title>
<style>
:root{
  --pk-yellow:#FFCB05;--pk-blue:#3D7DCA;--pk-red:#CC0000;--pk-dark:#003A70;
  --pk-light:#F8F8F8;--pk-gray:#68A090;
  --bg:#0A1A2E;--bg2:#0D2340;--pnl:#112952;
  --gold:#FFCB05;--gdl:#FFF5CC;--gdd:#C8A000;
  --blue:#3D7DCA;--red:#CC0000;--green:#4CAF50;
  --txt:#B8CCE8;--wh:#F0F8FF;
  --fn:'Malgun Gothic','맑은 고딕',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:var(--fn);background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* 포켓몬 배경 패턴 */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 20%,rgba(255,203,5,.06),transparent 50%),
    radial-gradient(ellipse at 85% 80%,rgba(61,125,202,.08),transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(17,41,82,.4),transparent 70%)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(rgba(255,203,5,.04) 1px,transparent 1px);
  background-size:32px 32px}

.wrap{max-width:760px;margin:0 auto;padding:14px 12px;position:relative;z-index:1}

/* 헤더 */
header{text-align:center;margin-bottom:16px;padding:18px 12px;background:linear-gradient(135deg,rgba(13,35,64,.9),rgba(17,41,82,.9));border:2px solid var(--pk-yellow);border-radius:8px;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pk-red),var(--pk-yellow),var(--pk-blue))}
header::after{content:'⬤';position:absolute;top:10px;right:14px;font-size:28px;color:var(--pk-red);opacity:.7;text-shadow:0 0 12px rgba(204,0,0,.5)}
.pk-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:6px}
.pk-ball{width:22px;height:22px;border-radius:50%;background:linear-gradient(180deg,var(--pk-red) 50%,white 50%);border:2px solid var(--pk-dark);position:relative;flex-shrink:0}
.pk-ball::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:white;border-radius:50%;border:1.5px solid var(--pk-dark)}
header h1{font-size:clamp(18px,4.5vw,32px);color:var(--pk-yellow);text-shadow:2px 2px 0 var(--pk-dark),0 0 20px rgba(255,203,5,.5);letter-spacing:1px}
header p{font-size:10px;color:var(--txt);opacity:.65;margin-top:4px}

/* 탭 네비 */
.tab-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:14px;background:rgba(0,0,0,.4);border:2px solid var(--pk-dark);border-radius:6px;padding:4px}
.tab-btn{padding:8px 4px;border:none;border-radius:4px;cursor:pointer;font-family:var(--fn);font-size:11px;font-weight:700;color:var(--txt);background:transparent;transition:all .18s;letter-spacing:.3px;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab-btn .ticon{font-size:16px}
.tab-btn.active{background:linear-gradient(135deg,var(--pk-dark),var(--pnl));color:var(--pk-yellow);border:1px solid var(--pk-yellow);box-shadow:0 0 8px rgba(255,203,5,.2)}
.tab-btn:hover:not(.active){color:var(--wh);background:rgba(255,255,255,.05)}

/* 카드 */
.card{background:linear-gradient(135deg,var(--bg2),var(--pnl));border:1px solid rgba(61,125,202,.4);border-radius:6px;padding:14px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pk-yellow),transparent)}
.stitle{font-size:11px;font-weight:700;color:var(--pk-yellow);letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stitle::before{content:'';width:3px;height:13px;background:var(--pk-yellow);flex-shrink:0;border-radius:2px}

/* 입력 */
input,select{background:rgba(0,0,0,.45);border:1px solid rgba(61,125,202,.5);border-radius:4px;color:var(--wh);font-family:var(--fn);font-size:13px;padding:8px 11px;outline:none;transition:all .2s;width:100%}
input:focus,select:focus{border-color:var(--pk-yellow);box-shadow:0 0 8px rgba(255,203,5,.2)}
input::placeholder{color:#4a6a8a}
select option{background:var(--bg2)}

/* 버튼 */
.btn{font-family:var(--fn);font-size:12px;font-weight:700;padding:8px 14px;border:none;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn:active{transform:scale(.96)}
.btn-yellow{background:linear-gradient(135deg,#C8A000,#FFCB05);color:var(--pk-dark)}
.btn-yellow:hover:not(:disabled){background:linear-gradient(135deg,#FFCB05,#FFE566)}
.btn-blue{background:linear-gradient(135deg,#1a4a8a,#3D7DCA);color:white}
.btn-blue:hover:not(:disabled){background:linear-gradient(135deg,#3D7DCA,#6BA3E0)}
.btn-red{background:linear-gradient(135deg,#880000,#CC0000);color:white;font-size:11px;padding:6px 11px}
.btn-green{background:linear-gradient(135deg,#1a5c1a,#4CAF50);color:white;font-size:11px;padding:6px 11px}
.btn-ghost{background:transparent;border:1px solid rgba(61,125,202,.5);color:var(--txt);font-size:11px;padding:6px 11px}
.btn:disabled{opacity:.32;cursor:not-allowed;transform:none!important}
.row{display:flex;gap:7px;align-items:stretch;margin-bottom:8px}
.row:last-child{margin-bottom:0}

/* 방 카드 */
.rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.room-card{background:linear-gradient(160deg,var(--bg2),var(--pnl));border:2px solid rgba(61,125,202,.4);border-radius:6px;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.room-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.room-card.r1{border-color:rgba(61,125,202,.5)}.room-card.r1:hover{border-color:var(--pk-blue);box-shadow:0 6px 20px rgba(61,125,202,.3)}
.room-card.r2{border-color:rgba(255,203,5,.4)}.room-card.r2:hover{border-color:var(--pk-yellow);box-shadow:0 6px 20px rgba(255,203,5,.2)}
.room-card.r3{border-color:rgba(204,0,0,.4)}.room-card.r3:hover{border-color:var(--pk-red);box-shadow:0 6px 20px rgba(204,0,0,.3)}
.room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.room-card.r1::before{background:var(--pk-blue)}.room-card.r2::before{background:var(--pk-yellow)}.room-card.r3::before{background:var(--pk-red)}
.room-num{font-size:26px;font-weight:700;margin-bottom:4px}
.room-card.r1 .room-num{color:var(--pk-blue)}.room-card.r2 .room-num{color:var(--pk-yellow)}.room-card.r3 .room-num{color:var(--pk-red)}
.room-name{font-size:11px;color:var(--txt);margin-bottom:8px}
.room-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block}
.rb-open{background:rgba(76,175,80,.15);color:#4CAF50;border:1px solid rgba(76,175,80,.3)}
.rb-full{background:rgba(204,0,0,.15);color:var(--pk-red);border:1px solid rgba(204,0,0,.3)}
.rb-done{background:rgba(255,203,5,.12);color:var(--pk-yellow);border:1px solid rgba(255,203,5,.25)}
.room-pcount{font-size:11px;color:var(--txt);margin-top:5px;opacity:.75}

/* 참가자 태그 */
.ptags{display:flex;flex-wrap:wrap;gap:5px;min-height:30px;margin:8px 0}
.ptag{background:rgba(61,125,202,.15);border:1px solid rgba(61,125,202,.35);border-radius:12px;padding:4px 10px;font-size:11px;color:#7AB8E8;display:flex;align-items:center;gap:5px;animation:ti .2s ease}
.ptag .del{background:none;border:none;color:rgba(204,0,0,.5);cursor:pointer;font-size:12px;padding:0;line-height:1}
.ptag .del:hover{color:var(--pk-red)}
@keyframes ti{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.pcount{font-size:11px;color:var(--pk-yellow);text-align:right;margin-top:3px}
.pcount span{color:var(--wh);font-weight:700}

/* 상태바 */
.sbar{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.sdot{width:7px;height:7px;border-radius:50%;background:#4CAF50;flex-shrink:0;transition:background .3s}
.sdot.off{background:var(--pk-red)}
.stxt{font-size:10px;color:var(--txt)}
.warn{background:rgba(204,0,0,.12);border:1px solid rgba(204,0,0,.3);border-radius:4px;padding:6px 10px;font-size:11px;color:#FF6B6B;display:none;margin-top:5px}
.acd{display:none;text-align:center;margin-top:8px;font-size:26px;font-weight:700;color:var(--pk-yellow);text-shadow:0 0 16px rgba(255,203,5,.6)}

/* 핀볼 */
#pinSec{display:none}
#pinSec .card::before{background:linear-gradient(90deg,var(--pk-blue),var(--pk-yellow),var(--pk-red))}
#pcanvas{display:block;margin:0 auto;border-radius:4px;border:2px solid rgba(61,125,202,.3);max-width:100%}
.pstat{text-align:center;margin-top:8px;font-size:13px;font-weight:700;color:var(--pk-yellow);min-height:20px}
.cbar{text-align:center;margin-top:5px;font-size:17px;font-weight:700;color:var(--pk-red);display:none}

/* 결과 화면 (롤 스타일) */
#resSec{display:none}
.match-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:10px 14px;border-radius:5px}
.match-header.win{background:linear-gradient(135deg,rgba(61,125,202,.25),rgba(61,125,202,.1));border:1px solid rgba(61,125,202,.4)}
.match-header.lose{background:linear-gradient(135deg,rgba(204,0,0,.2),rgba(204,0,0,.08));border:1px solid rgba(204,0,0,.35)}
.match-result-txt{font-size:20px;font-weight:700}
.match-result-txt.win{color:var(--pk-blue)}.match-result-txt.lose{color:var(--pk-red)}

.team-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:11px}
.team-table th{padding:6px 8px;text-align:left;font-size:10px;letter-spacing:.5px;font-weight:700;opacity:.7}
.team-table td{padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.team-table tr:last-child td{border-bottom:none}
.team-blue-hdr{background:rgba(61,125,202,.2);color:var(--pk-blue)}
.team-red-hdr{background:rgba(204,0,0,.18);color:var(--pk-red)}
.champ-cell{display:flex;align-items:center;gap:7px}
.champ-icon{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,.2);object-fit:cover;background:var(--bg2);flex-shrink:0}
.kda-cell{color:var(--wh);font-weight:700}
.kda-good{color:#FFD700}.kda-great{color:#00E5FF}
.win-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:rgba(61,125,202,.3);color:var(--pk-blue);border:1px solid rgba(61,125,202,.4)}
.lose-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:rgba(204,0,0,.25);color:#FF8888;border:1px solid rgba(204,0,0,.3)}

/* KDA 입력 모달 */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-ov.show{display:flex}
.modal{background:linear-gradient(135deg,var(--bg2),var(--pnl));border:2px solid var(--pk-yellow);border-radius:8px;padding:18px;width:100%;max-width:500px;margin:auto;position:relative}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--pk-blue),var(--pk-yellow),var(--pk-red));border-radius:8px 8px 0 0}
.modal h3{font-size:13px;color:var(--pk-yellow);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.player-input-row{display:grid;grid-template-columns:1fr 80px 100px 60px;gap:6px;align-items:center;margin-bottom:7px;padding:7px;background:rgba(0,0,0,.25);border-radius:4px}
.player-input-row .pname{font-size:12px;color:var(--wh);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-input-row input{padding:5px 7px;font-size:11px}
.team-label{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;margin-bottom:6px;display:inline-block}
.tl-blue{background:rgba(61,125,202,.2);color:var(--pk-blue)}.tl-red{background:rgba(204,0,0,.18);color:var(--pk-red)}
.winner-select{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.winner-btn{padding:10px;border:2px solid transparent;border-radius:5px;cursor:pointer;font-family:var(--fn);font-weight:700;font-size:13px;transition:all .18s;text-align:center}
.winner-btn.blue-team{background:rgba(61,125,202,.15);color:var(--pk-blue);border-color:rgba(61,125,202,.4)}
.winner-btn.red-team{background:rgba(204,0,0,.12);color:var(--pk-red);border-color:rgba(204,0,0,.3)}
.winner-btn.selected{box-shadow:0 0 12px currentColor}
.winner-btn.blue-team.selected{background:rgba(61,125,202,.35);border-color:var(--pk-blue)}
.winner-btn.red-team.selected{background:rgba(204,0,0,.3);border-color:var(--pk-red)}

/* 배정 결과 목록 */
.result-item{background:rgba(0,0,0,.25);border:1px solid rgba(61,125,202,.2);border-radius:5px;padding:10px 12px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.result-meta{display:flex;flex-direction:column;gap:2px}
.result-room{font-size:10px;font-weight:700;color:var(--pk-yellow)}
.result-time{font-size:10px;color:var(--txt);opacity:.65}
.result-teams{font-size:10px;color:var(--txt);margin-top:2px}
.result-teams .blue{color:var(--pk-blue)}.result-teams .red{color:var(--pk-red)}
.no-results{text-align:center;padding:30px;color:var(--txt);opacity:.5;font-size:12px}

/* 순위 테이블 */
.rank-table{width:100%;border-collapse:collapse}
.rank-table th{padding:8px 10px;font-size:10px;text-align:left;color:var(--pk-yellow);border-bottom:1px solid rgba(255,203,5,.2);letter-spacing:.5px}
.rank-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.05)}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:rgba(255,255,255,.03)}
.rank-num{font-weight:700;color:var(--pk-yellow);font-size:13px;width:28px}
.rank-num.top1{color:#FFD700;font-size:15px}.rank-num.top2{color:#C0C0C0}.rank-num.top3{color:#CD7F32}
.rank-name{color:var(--wh);font-weight:600}
.rank-wr{font-weight:700}
.wr-high{color:#4CAF50}.wr-mid{color:var(--pk-yellow)}.wr-low{color:var(--pk-red)}
.rank-record{font-size:10px;color:var(--txt);opacity:.7}
.no-rank{text-align:center;padding:30px;color:var(--txt);opacity:.5;font-size:12px}

/* 결과 상세 (롤 결과창 스타일) */
#matchDetailSec{display:none}
.match-info-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:4px;margin-bottom:10px;background:rgba(0,0,0,.3);font-size:11px}

@media(max-width:480px){
  .rooms-grid{grid-template-columns:1fr}
  .room-card{display:flex;align-items:center;gap:12px;text-align:left;padding:12px}
  .room-num{font-size:20px;margin-bottom:0;min-width:28px}
  .player-input-row{grid-template-columns:1fr 65px 85px 50px}
  .tab-btn{font-size:10px}.tab-btn .ticon{font-size:14px}
}
</style>
</head>
<body>
<div class="wrap">

<!-- 헤더 -->
<header>
  <div class="pk-logo">
    <div class="pk-ball"></div>
    <h1>포동포동 칼바람 내전</h1>
    <div class="pk-ball"></div>
  </div>
  <p>by doyajino</p>
</header>

<!-- 탭 네비 -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="showTab('rooms')"><span class="ticon">🏠</span>방 선택</button>
  <button class="tab-btn" onclick="showTab('results')"><span class="ticon">📋</span>배정결과</button>
  <button class="tab-btn" onclick="showTab('rank')"><span class="ticon">🏆</span>순위</button>
  <button class="tab-btn" onclick="showTab('match')"><span class="ticon">⚔️</span>경기결과</button>
</div>

<!-- ① 방 선택 탭 -->
<div id="tab-rooms">
  <div class="card">
    <div class="stitle">방 선택</div>
    <div class="rooms-grid" id="roomsGrid"></div>
  </div>
</div>

<!-- ② 배정결과 탭 -->
<div id="tab-results" style="display:none">
  <div class="card">
    <div class="stitle">배정 결과 기록</div>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <button class="btn btn-ghost" onclick="filterResults('all')" id="fb-all" style="font-size:11px;padding:5px 10px">전체</button>
      <button class="btn btn-ghost" onclick="filterResults('room1')" id="fb-r1" style="font-size:11px;padding:5px 10px">1번방</button>
      <button class="btn btn-ghost" onclick="filterResults('room2')" id="fb-r2" style="font-size:11px;padding:5px 10px">2번방</button>
      <button class="btn btn-ghost" onclick="filterResults('room3')" id="fb-r3" style="font-size:11px;padding:5px 10px">3번방</button>
    </div>
    <div id="resultsList"></div>
  </div>
</div>

<!-- ③ 순위 탭 -->
<div id="tab-rank" style="display:none">
  <div class="card">
    <div class="stitle">전체 참가자 승률 순위</div>
    <div id="rankTable"></div>
  </div>
</div>

<!-- ④ 경기결과 탭 -->
<div id="tab-match" style="display:none">
  <div class="card">
    <div class="stitle">경기 결과 상세</div>
    <div id="matchList"></div>
  </div>
</div>

<!-- 로비 섹션 -->
<div id="lobbySec" style="display:none">
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <button class="btn btn-ghost" onclick="goMain()" style="padding:5px 10px">← 뒤로</button>
      <div class="stitle" style="margin-bottom:0" id="lobbyTitle">1번방</div>
    </div>
    <div class="sbar"><div class="sdot" id="sdot"></div><div class="stxt" id="stxt">연결 중...</div></div>
    <div class="row">
      <input id="nickIn" placeholder="소환사 이름 입력 후 참가..." maxlength="16"/>
      <button class="btn btn-yellow" id="joinBtn" onclick="addPlayer()">참가</button>
    </div>
    <div class="warn" id="joinWarn"></div>
    <div class="ptags" id="ptags"></div>
    <div class="pcount">참가자 <span id="pcnt">0</span> / <span id="maxCnt">2</span>명</div>
    <div class="acd" id="acd"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn btn-blue" id="startBtn" onclick="startGame()" disabled>🎯 팀 배정 시작</button>
      <button class="btn btn-red" id="resetBtn" onclick="resetPlayers()" style="display:none;margin-left:auto">초기화</button>
    </div>
  </div>
</div>

<!-- 핀볼 섹션 -->
<div id="pinSec">
  <div class="card">
    <div class="stitle">⚡ 핀볼 팀 배정</div>
    <canvas id="pcanvas"></canvas>
    <div class="pstat" id="pstat"></div>
    <div class="cbar" id="cbar"></div>
  </div>
</div>

<!-- 배정 결과 섹션 -->
<div id="resSec">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="stitle" style="margin-bottom:0">🏆 팀 배정 결과</div>
      <button class="btn btn-ghost" onclick="goMain()" style="font-size:10px;padding:5px 9px">🏠 홈</button>
    </div>

    <!-- 블루팀 -->
    <table class="team-table">
      <thead><tr class="team-blue-hdr"><th colspan="4">🔵 블루팀</th></tr>
      <tr class="team-blue-hdr" style="opacity:.7"><th>소환사</th><th>챔피언</th><th>KDA</th><th></th></tr></thead>
      <tbody id="blueTeamTb"></tbody>
    </table>
    <!-- 레드팀 -->
    <table class="team-table" style="margin-top:8px">
      <thead><tr class="team-red-hdr"><th colspan="4">🔴 레드팀</th></tr>
      <tr class="team-red-hdr" style="opacity:.7"><th>소환사</th><th>챔피언</th><th>KDA</th><th></th></tr></thead>
      <tbody id="redTeamTb"></tbody>
    </table>

    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;justify-content:center">
      <button class="btn btn-yellow" onclick="openKdaModal()">📝 경기 결과 입력</button>
      <button class="btn btn-blue" id="rerollBtn" onclick="reRoll()" style="display:none">🔄 다시 배정</button>
    </div>
  </div>
</div>

<!-- KDA 입력 모달 -->
<div class="modal-ov" id="kdaModal">
  <div class="modal">
    <h3>⚔️ 경기 결과 입력</h3>
    <div style="margin-bottom:10px">
      <div style="font-size:11px;color:var(--txt);margin-bottom:6px">승리팀 선택</div>
      <div class="winner-select">
        <div class="winner-btn blue-team" onclick="selectWinner('blue')">🔵 블루팀 승리</div>
        <div class="winner-btn red-team" onclick="selectWinner('red')">🔴 레드팀 승리</div>
      </div>
    </div>
    <div id="kdaInputs"></div>
    <div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeKdaModal()">취소</button>
      <button class="btn btn-yellow" onclick="saveMatchResult()">저장</button>
    </div>
  </div>
</div>

</div><!-- /wrap -->
<script>
// ════════════════════════════════════════
// Firebase REST
// ════════════════════════════════════════
const FB = 'https://doyajino-2edff-default-rtdb.firebaseio.com';
async function fbGet(p){ try{ const r=await fetch(`${FB}/${p}.json`); return r.ok?await r.json():null; }catch{ return null; } }
async function fbSet(p,d){ try{ await fetch(`${FB}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); }catch{} }
async function fbPush(p,d){ try{ await fetch(`${FB}/${p}.json`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); }catch{} }
async function fbDel(p){ try{ await fetch(`${FB}/${p}.json`,{method:'DELETE'}); }catch{} }

// ════════════════════════════════════════
// 설정
// ════════════════════════════════════════
const MAX_PLAYERS = 2; // 테스트용 (실제:10)
const ROOMS = ['room1','room2','room3'];
const ROOM_NAMES = ['1번방','2번방','3번방'];
const ROOM_COLORS = ['r1','r2','r3'];
const MAX_RESULTS_PER_ROOM = 10;

// ════════════════════════════════════════
// 상태
// ════════════════════════════════════════
const mySession = 's'+Math.random().toString(36).slice(2,9);
let currentRoom='', isHost=false, players=[];
let pollTimer=null, autoTimer=null, lastHash='', lastEvTs=0, animFrame=null;
let currentBlue=[], currentRed=[], selectedWinner='';
let currentResultFilter='all';

// ════════════════════════════════════════
// 탭
// ════════════════════════════════════════
function showTab(tab){
  ['rooms','results','rank','match'].forEach(t=>{
    document.getElementById('tab-'+t).style.display = t===tab?'block':'none';
  });
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['rooms','results','rank','match'][i]===tab);
  });
  if(tab==='results') loadResults();
  if(tab==='rank') loadRank();
  if(tab==='match') loadMatchDetails();
}

// ════════════════════════════════════════
// 메인 / 방 목록
// ════════════════════════════════════════
async function loadRooms(){
  const grid=document.getElementById('roomsGrid');
  grid.innerHTML=ROOMS.map((_,i)=>`
    <div class="room-card ${ROOM_COLORS[i]}" onclick="enterRoom('${ROOMS[i]}','${ROOM_NAMES[i]}')">
      <div class="room-num">${i+1}</div>
      <div class="room-name">${ROOM_NAMES[i]}</div>
      <div class="room-badge rb-open" id="rb_${ROOMS[i]}">로딩...</div>
      <div class="room-pcount" id="rp_${ROOMS[i]}"></div>
    </div>`).join('');
  ROOMS.forEach(r=>refreshRoomCard(r));
}

async function refreshRoomCard(rk){
  const room=await fbGet('rooms/'+rk);
  const badge=document.getElementById('rb_'+rk);
  const pc=document.getElementById('rp_'+rk);
  if(!badge) return;
  if(!room||!room.players){ badge.className='room-badge rb-open'; badge.textContent='대기 중'; pc.textContent='0/'+MAX_PLAYERS+'명'; return; }
  const n=(room.players||[]).length;
  if(n>=MAX_PLAYERS){ badge.className='room-badge rb-full'; badge.textContent='꽉 참'; }
  else { badge.className='room-badge rb-open'; badge.textContent='모집 중'; }
  pc.textContent=n+'/'+MAX_PLAYERS+'명';
}

function goMain(){
  stopPolling(); cancelAutoCountdown();
  currentRoom=''; isHost=false; players=[]; lastHash=''; lastEvTs=0;
  ['lobbySec','pinSec','resSec'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('tab-rooms').style.display='block';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  loadRooms();
}

// ════════════════════════════════════════
// 방 입장
// ════════════════════════════════════════
async function enterRoom(rk, rname){
  currentRoom=rk;
  // 탭 숨기고 로비 표시
  ['tab-rooms','tab-results','tab-rank','tab-match'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('lobbySec').style.display='block';
  document.getElementById('lobbyTitle').textContent=rname;
  document.getElementById('maxCnt').textContent=MAX_PLAYERS;
  document.getElementById('sdot').className='sdot off';
  document.getElementById('stxt').textContent='연결 중...';

  const existing=await fbGet('rooms/'+rk);
  if(!existing){
    isHost=true;
    await fbSet('rooms/'+rk,{host:mySession,players:[],ev:null,createdAt:Date.now()});
  } else {
    isHost=(existing.host===mySession);
    // 이전 결과 있으면 players/ev 리셋 (결과 기록은 별도 보존)
    if(existing.ev && existing.ev.type==='result'){
      await fbSet('rooms/'+rk+'/players',[]);
      await fbSet('rooms/'+rk+'/ev',null);
      lastEvTs=Date.now();
    }
  }
  document.getElementById('resetBtn').style.display=isHost?'block':'none';
  startPolling();
}

// ════════════════════════════════════════
// 참가자
// ════════════════════════════════════════
async function addPlayer(){
  const input=document.getElementById('nickIn');
  const name=input.value.trim();
  const warn=document.getElementById('joinWarn');
  if(!name){ showW(warn,'이름을 입력하세요'); return; }
  const room=await fbGet('rooms/'+currentRoom);
  if(!room){ showW(warn,'연결 오류'); return; }
  const cur=room.players||[];
  if(cur.length>=MAX_PLAYERS){ showW(warn,MAX_PLAYERS+'명이 꽉 찼어요!'); return; }
  if(cur.find(p=>p.name===name)){ showW(warn,'이미 등록된 이름이에요'); return; }
  cur.push({name,addedAt:Date.now()});
  await fbSet('rooms/'+currentRoom+'/players',cur);
  input.value='';
}

async function removePlayer(name){
  if(!isHost) return;
  const room=await fbGet('rooms/'+currentRoom);
  if(!room) return;
  await fbSet('rooms/'+currentRoom+'/players',(room.players||[]).filter(p=>p.name!==name));
}

async function resetPlayers(){
  if(!isHost) return;
  await fbSet('rooms/'+currentRoom+'/players',[]);
  await fbSet('rooms/'+currentRoom+'/ev',null);
}

// ════════════════════════════════════════
// 폴링
// ════════════════════════════════════════
function startPolling(){ stopPolling(); poll(); pollTimer=setInterval(poll,1200); }
function stopPolling(){ if(pollTimer){clearInterval(pollTimer);pollTimer=null;} }

async function poll(){
  if(!currentRoom) return;
  const room=await fbGet('rooms/'+currentRoom);
  if(!room){ setSdot(false); return; }
  setSdot(true);
  isHost=(room.host===mySession);
  document.getElementById('resetBtn').style.display=isHost?'block':'none';
  const np=room.players||[];
  const nh=JSON.stringify(np);
  if(nh!==lastHash){ lastHash=nh; players=np; renderPlayers(players); }
  const ev=room.ev;
  if(ev&&ev.ts&&ev.ts>lastEvTs){ lastEvTs=ev.ts; handleEv(ev); }
}

// ════════════════════════════════════════
// 렌더링
// ════════════════════════════════════════
function renderPlayers(pls){
  const wrap=document.getElementById('ptags');
  const n=pls.length;
  wrap.innerHTML='';
  pls.forEach(p=>{
    const t=document.createElement('div'); t.className='ptag';
    t.innerHTML=p.name;
    if(isHost){ const d=document.createElement('button'); d.className='del'; d.textContent='✕'; d.onclick=()=>removePlayer(p.name); t.appendChild(d); }
    wrap.appendChild(t);
  });
  document.getElementById('pcnt').textContent=n;
  document.getElementById('startBtn').disabled=!isHost||n<MAX_PLAYERS;
  document.getElementById('joinBtn').disabled=n>=MAX_PLAYERS;
  document.getElementById('stxt').textContent='🟢 연결됨 | '+n+'명 참가';
  if(n>=MAX_PLAYERS) startAutoCountdown(); else cancelAutoCountdown();
}

function showW(el,msg){ el.textContent=msg; el.style.display='block'; setTimeout(()=>el.style.display='none',2500); }
function setSdot(on){ document.getElementById('sdot').className='sdot'+(on?'':' off'); }

// ════════════════════════════════════════
// 카운트다운
// ════════════════════════════════════════
function startAutoCountdown(){
  if(autoTimer) return;
  let cnt=5; const el=document.getElementById('acd');
  el.style.display='block'; el.textContent='⏱ '+cnt+'초 후 자동 시작!';
  autoTimer=setInterval(()=>{
    cnt--;
    if(cnt>0){ el.textContent='⏱ '+cnt+'초 후 자동 시작!'; }
    else{ clearInterval(autoTimer);autoTimer=null;el.style.display='none'; if(isHost) startGame(); }
  },1000);
}
function cancelAutoCountdown(){ if(!autoTimer)return; clearInterval(autoTimer);autoTimer=null; document.getElementById('acd').style.display='none'; }

// ════════════════════════════════════════
// 게임
// ════════════════════════════════════════
async function sendEv(ev){ ev.ts=Date.now(); lastEvTs=ev.ts; await fbSet('rooms/'+currentRoom+'/ev',ev); handleEv(ev); }

function handleEv(ev){
  if(!ev) return;
  if(ev.type==='start') launchPinball(ev.shuffled);
  else if(ev.type==='result') showResultScreen(ev.blue,ev.red);
}

async function startGame(){
  if(!isHost) return;
  const room=await fbGet('rooms/'+currentRoom);
  if(!room) return;
  const names=(room.players||[]).map(p=>p.name);
  if(names.length<MAX_PLAYERS) return;
  await sendEv({type:'start',shuffled:[...names].sort(()=>Math.random()-.5)});
}

function reRoll(){ if(isHost) startGame(); }

// ════════════════════════════════════════
// 핀볼
// ════════════════════════════════════════
function launchPinball(names){
  document.getElementById('pinSec').style.display='block';
  document.getElementById('resSec').style.display='none';
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('pinSec').scrollIntoView({behavior:'smooth',block:'start'});
  runPinball(names,async(results)=>{
    const half=Math.floor(names.length/2);
    const blue=results.filter(b=>b.slot<half).map(b=>b.name);
    const red=results.filter(b=>b.slot>=half).map(b=>b.name);
    currentBlue=blue; currentRed=red;
    // 결과 기록 저장 (방마다 최대 10개)
    await saveAssignResult(blue,red);
    await sendEv({type:'result',blue,red});
  });
}

async function saveAssignResult(blue,red){
  const key='results/'+currentRoom;
  let list=await fbGet(key)||[];
  if(!Array.isArray(list)) list=Object.values(list);
  list.unshift({blue,red,ts:Date.now(),room:currentRoom,roomName:ROOM_NAMES[ROOMS.indexOf(currentRoom)]});
  if(list.length>MAX_RESULTS_PER_ROOM) list=list.slice(0,MAX_RESULTS_PER_ROOM);
  await fbSet(key,list);
}

function showResultScreen(blue,red){
  currentBlue=blue; currentRed=red;
  document.getElementById('pinSec').style.display='none';
  document.getElementById('lobbySec').style.display='none';
  document.getElementById('resSec').style.display='block';
  document.getElementById('resSec').scrollIntoView({behavior:'smooth'});
  document.getElementById('rerollBtn').style.display=isHost?'inline-block':'none';
  renderResultTable('blueTeamTb',blue,'blue');
  renderResultTable('redTeamTb',red,'red');
}

function renderResultTable(tbId,names,team){
  const tb=document.getElementById(tbId);
  tb.innerHTML=names.map(name=>`
    <tr>
      <td><div class="champ-cell"><img class="champ-icon" src="" alt="" id="ci_${name.replace(/\s/g,'_')}" style="display:none"><span>${name}</span></div></td>
      <td style="color:var(--txt);font-size:10px">-</td>
      <td class="kda-cell">-</td>
      <td><span class="${team==='blue'?'win-badge':'lose-badge'}">${team==='blue'?'블루':'레드'}</span></td>
    </tr>`).join('');
}

// ════════════════════════════════════════
// KDA 입력 모달
// ════════════════════════════════════════
const CHAMPS=["Ahri","Akali","Alistar","Amumu","Anivia","Annie","Ashe","Azir","Bard","Blitzcrank","Brand","Braum","Caitlyn","Camille","Cassiopeia","Darius","Diana","Draven","Ekko","Elise","Evelynn","Ezreal","Fiora","Fizz","Galio","Gangplank","Garen","Gragas","Graves","Hecarim","Irelia","Janna","Jax","Jayce","Jhin","Jinx","Karma","Karthus","Kassadin","Katarina","Kayle","Kennen","Lissandra","Lucian","Lulu","Lux","Malphite","Malzahar","Maokai","Mordekaiser","Morgana","Nami","Nasus","Nautilus","Nidalee","Nocturne","Olaf","Orianna","Pantheon","Poppy","Pyke","Quinn","Rammus","Riven","Rumble","Ryze","Sejuani","Shaco","Shen","Singed","Sion","Sivir","Sona","Soraka","Swain","Syndra","Talon","Taric","Teemo","Thresh","Tristana","Tryndamere","Twitch","Udyr","Urgot","Varus","Vayne","Veigar","Vi","Viktor","Vladimir","Volibear","Warwick","Yasuo","Zac","Zed","Ziggs","Zilean","Zoe","Zyra"];
const CFIXES={"Twisted Fate":"TwistedFate","Lee Sin":"LeeSin","Miss Fortune":"MissFortune","Xin Zhao":"XinZhao"};
function cUrl(c){const k=CFIXES[c]||c.replace(/[^a-zA-Z]/g,'');return 'https://ddragon.leagueoflegends.com/cdn/14.9.1/img/champion/'+k+'.png';}
const champOptions=CHAMPS.map(c=>`<option value="${c}">${c}</option>`).join('');

function openKdaModal(){
  selectedWinner='';
  document.querySelectorAll('.winner-btn').forEach(b=>b.classList.remove('selected'));
  const container=document.getElementById('kdaInputs');
  const makeRows=(names,label)=>`
    <div class="team-label ${label==='blue'?'tl-blue':'tl-red'}">${label==='blue'?'🔵 블루팀':'🔴 레드팀'}</div>
    ${names.map(name=>`
      <div class="player-input-row">
        <div class="pname">${name}</div>
        <select id="champ_${name.replace(/\s/g,'_')}" style="font-size:11px;padding:5px 4px">
          <option value="">챔피언</option>${champOptions}
        </select>
        <input id="kda_${name.replace(/\s/g,'_')}" placeholder="K/D/A (예:3/1/7)" style="font-size:11px;padding:5px 7px"/>
        <input id="dmg_${name.replace(/\s/g,'_')}" placeholder="딜량" style="font-size:11px;padding:5px 7px"/>
      </div>`).join('')}`;
  container.innerHTML=makeRows(currentBlue,'blue')+makeRows(currentRed,'red');
  document.getElementById('kdaModal').classList.add('show');
}

function selectWinner(team){
  selectedWinner=team;
  document.querySelectorAll('.winner-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelector('.winner-btn.'+(team==='blue'?'blue':'red')+'-team').classList.add('selected');
}

function closeKdaModal(){ document.getElementById('kdaModal').classList.remove('show'); }

async function saveMatchResult(){
  if(!selectedWinner){ alert('승리팀을 선택해주세요'); return; }
  const getPlayerData=(name)=>{
    const key=name.replace(/\s/g,'_');
    const champ=document.getElementById('champ_'+key)?.value||'';
    const kda=document.getElementById('kda_'+key)?.value||'0/0/0';
    const dmg=document.getElementById('dmg_'+key)?.value||'0';
    return {name,champ,kda,dmg,win:(selectedWinner==='blue'?currentBlue:currentRed).includes(name)};
  };
  const matchData={
    ts:Date.now(),room:currentRoom,roomName:ROOM_NAMES[ROOMS.indexOf(currentRoom)],
    blue:currentBlue.map(n=>getPlayerData(n)),
    red:currentRed.map(n=>getPlayerData(n)),
    winner:selectedWinner
  };
  // 경기결과 저장
  let matches=await fbGet('matches')||[];
  if(!Array.isArray(matches)) matches=Object.values(matches);
  matches.unshift(matchData);
  if(matches.length>100) matches=matches.slice(0,100);
  await fbSet('matches',matches);

  // 순위 업데이트
  await updateRankings(matchData);

  closeKdaModal();
  alert('경기 결과가 저장되었습니다!');
  // 결과 화면 업데이트 (챔피언 아이콘 표시)
  updateResultWithChamps(matchData);
}

function updateResultWithChamps(matchData){
  [...matchData.blue,...matchData.red].forEach(p=>{
    const key=p.name.replace(/\s/g,'_');
    const ci=document.getElementById('ci_'+key);
    if(ci&&p.champ){ ci.src=cUrl(p.champ); ci.style.display='inline-block'; ci.onerror=()=>ci.style.display='none'; }
  });
}

// ════════════════════════════════════════
// 순위 시스템
// ════════════════════════════════════════
async function updateRankings(matchData){
  let ranks=await fbGet('rankings')||{};
  const winTeam=matchData.winner==='blue'?matchData.blue:matchData.red;
  const loseTeam=matchData.winner==='blue'?matchData.red:matchData.blue;
  [...winTeam,...loseTeam].forEach(p=>{
    if(!ranks[p.name]) ranks[p.name]={name:p.name,win:0,lose:0,games:0};
    ranks[p.name].games++;
    if(winTeam.find(w=>w.name===p.name)) ranks[p.name].win++;
    else ranks[p.name].lose++;
  });
  await fbSet('rankings',ranks);
}

async function loadRank(){
  const ranks=await fbGet('rankings')||{};
  const list=Object.values(ranks).sort((a,b)=>{
    const wrA=a.games?a.win/a.games:0, wrB=b.games?b.win/b.games:0;
    if(wrB!==wrA) return wrB-wrA;
    return b.games-a.games;
  });
  const tb=document.getElementById('rankTable');
  if(!list.length){ tb.innerHTML='<div class="no-rank">아직 기록된 경기가 없어요<br>경기 결과를 입력하면 순위가 생성됩니다</div>'; return; }
  tb.innerHTML=`<table class="rank-table">
    <thead><tr><th>#</th><th>소환사</th><th>승률</th><th>전적</th><th>경기수</th></tr></thead>
    <tbody>${list.map((p,i)=>{
      const wr=p.games?Math.round(p.win/p.games*100):0;
      const wrClass=wr>=60?'wr-high':wr>=50?'wr-mid':'wr-low';
      const numClass=i===0?'top1':i===1?'top2':i===2?'top3':'';
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      return `<tr>
        <td class="rank-num ${numClass}">${medal||i+1}</td>
        <td class="rank-name">${p.name}</td>
        <td class="rank-wr ${wrClass}">${wr}%</td>
        <td class="rank-record">${p.win}승 ${p.lose}패</td>
        <td class="rank-record">${p.games}게임</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

// ════════════════════════════════════════
// 배정 결과 목록
// ════════════════════════════════════════
let allResultsCache=[];
async function loadResults(){
  allResultsCache=[];
  for(const rk of ROOMS){
    const list=await fbGet('results/'+rk)||[];
    const arr=Array.isArray(list)?list:Object.values(list);
    allResultsCache.push(...arr);
  }
  allResultsCache.sort((a,b)=>b.ts-a.ts);
  renderResults(currentResultFilter);
}

function filterResults(f){
  currentResultFilter=f;
  document.querySelectorAll('[id^=fb-]').forEach(b=>b.classList.remove('btn-blue'));
  document.getElementById('fb-'+f)?.classList.add('btn-blue');
  renderResults(f);
}

function renderResults(f){
  const container=document.getElementById('resultsList');
  let list=f==='all'?allResultsCache:allResultsCache.filter(r=>r.room===f);
  if(!list.length){ container.innerHTML='<div class="no-results">📭 배정 기록이 없어요</div>'; return; }
  container.innerHTML=list.map((r,i)=>{
    const d=new Date(r.ts);
    const dateStr=`${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
    const timeStr=`${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    return `<div class="result-item">
      <div class="result-meta">
        <div class="result-room">${r.roomName||'방'}</div>
        <div class="result-time">📅 ${dateStr} ${timeStr}</div>
        <div class="result-teams">
          <span class="blue">🔵 ${(r.blue||[]).join(', ')}</span><br>
          <span class="red">🔴 ${(r.red||[]).join(', ')}</span>
        </div>
      </div>
      <button class="btn btn-ghost" onclick="replayResult(${i})">▶ 리플레이</button>
    </div>`;
  }).join('');
}

function replayResult(idx){
  const r=allResultsCache[currentResultFilter==='all'?idx:allResultsCache.findIndex((x,i)=>allResultsCache.filter(a=>a.room===(currentResultFilter==='all'?a.room:currentResultFilter))[idx]===x)];
  const target=document.getElementById('tab-results');
  // 리플레이는 핀볼 없이 결과만 표시
  currentBlue=r.blue; currentRed=r.red;
  currentRoom=r.room;
  ['tab-rooms','tab-results','tab-rank','tab-match'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('resSec').style.display='block';
  document.getElementById('rerollBtn').style.display='none';
  document.getElementById('resSec').scrollIntoView({behavior:'smooth'});
  renderResultTable('blueTeamTb',r.blue,'blue');
  renderResultTable('redTeamTb',r.red,'red');
}

// ════════════════════════════════════════
// 경기결과 상세 (KDA)
// ════════════════════════════════════════
async function loadMatchDetails(){
  const matches=await fbGet('matches')||[];
  const list=Array.isArray(matches)?matches:Object.values(matches);
  const container=document.getElementById('matchList');
  if(!list.length){ container.innerHTML='<div class="no-results">📭 아직 입력된 경기 결과가 없어요<br>배정 결과 화면에서 "경기 결과 입력" 버튼을 눌러주세요</div>'; return; }
  container.innerHTML=list.map((m,mi)=>{
    const d=new Date(m.ts);
    const timeStr=`${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    const winTeam=m.winner==='blue'?m.blue:m.red;
    const loseTeam=m.winner==='blue'?m.red:m.blue;
    const makeTeamRows=(players,isWin)=>players.map(p=>{
      const [k,d2,a]=(p.kda||'0/0/0').split('/');
      const kdaVal=d2>0?(+k+ +a)/+d2:k+a>0?'Perfect':'0.00';
      const kdaNum=typeof kdaVal==='number'?kdaVal:0;
      const kdaClass=kdaNum>=5?'kda-great':kdaNum>=3?'kda-good':'';
      return `<tr>
        <td><div class="champ-cell">
          ${p.champ?`<img class="champ-icon" src="${cUrl(p.champ)}" onerror="this.style.display='none'">`:
          `<div class="champ-icon" style="display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--txt)">?</div>`}
          <span style="font-size:11px;color:var(--wh)">${p.name}</span>
        </div></td>
        <td style="font-size:10px;color:var(--txt)">${p.champ||'-'}</td>
        <td class="kda-cell ${kdaClass}" style="font-size:11px">${p.kda||'0/0/0'}</td>
        <td style="font-size:10px;color:var(--txt)">${p.dmg?Number(p.dmg).toLocaleString():'-'}</td>
        <td>${isWin?'<span class="win-badge">WIN</span>':'<span class="lose-badge">LOSE</span>'}</td>
      </tr>`;
    }).join('');
    return `<div class="card" style="margin-bottom:10px;padding:12px">
      <div class="match-info-bar">
        <span style="color:var(--pk-yellow);font-weight:700">${m.roomName||'내전'}</span>
        <span style="font-size:10px;color:var(--txt)">${timeStr}</span>
        <span style="font-weight:700;color:${m.winner==='blue'?'var(--pk-blue)':'var(--pk-red)'}">
          ${m.winner==='blue'?'🔵 블루팀 승':'🔴 레드팀 승'}
        </span>
      </div>
      <table class="team-table">
        <thead><tr class="team-blue-hdr"><th colspan="5">🔵 블루팀 ${m.winner==='blue'?'<span style="color:#4CAF50">WIN</span>':'<span style="opacity:.5">LOSE</span>'}</th></tr>
        <tr class="team-blue-hdr" style="opacity:.6"><th>소환사</th><th>챔피언</th><th>KDA</th><th>딜량</th><th></th></tr></thead>
        <tbody>${makeTeamRows(m.blue,m.winner==='blue')}</tbody>
      </table>
      <table class="team-table" style="margin-top:6px">
        <thead><tr class="team-red-hdr"><th colspan="5">🔴 레드팀 ${m.winner==='red'?'<span style="color:#4CAF50">WIN</span>':'<span style="opacity:.5">LOSE</span>'}</th></tr>
        <tr class="team-red-hdr" style="opacity:.6"><th>소환사</th><th>챔피언</th><th>KDA</th><th>딜량</th><th></th></tr></thead>
        <tbody>${makeTeamRows(m.red,m.winner==='red')}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════
// 핀볼 엔진
// ════════════════════════════════════════
function runPinball(names,onDone){
  const canvas=document.getElementById('pcanvas');
  const statEl=document.getElementById('pstat');
  const cdEl=document.getElementById('cbar');
  cdEl.style.display='none'; statEl.textContent='';
  const W=Math.min(680,window.innerWidth-24), H=Math.round(W*.85);
  canvas.width=W; canvas.height=H;
  const ctx=canvas.getContext('2d');
  const N=names.length, SW=W/N;
  const BR=Math.max(9,Math.min(15,Math.floor(W/(N*2.7))));
  const GY=H-Math.round(H*.19), FY=H-Math.round(H*.08);
  const HALF=Math.floor(N/2);
  const COLS=['#CC0000','#3D7DCA','#FFCB05','#4CAF50','#9C27B0','#FF6B35','#00BCD4','#E91E63','#8BC34A','#FFF176'];
  const LABS=Array.from({length:N},(_,i)=>i<HALF?'블루'+(i+1):'레드'+(i-HALF+1));
  const pegs=[]; const PR=Math.max(4,Math.min(7,Math.round(H*.54/48))); const PC=Math.max(5,Math.min(11,N+2));
  for(let r=0;r<PR;r++) for(let c=0;c<PC;c++){
    const off=(r%2===0)?SW*.5:0;
    pegs.push({x:SW*.3+off+c*(W-SW*.6)/(PC-1),y:Math.round(H*.1)+r*Math.round((GY-H*.14)/PR),lit:0});
  }
  const bumps=[{x:W*.22,y:H*.35,r:Math.round(W*.025),lit:0},{x:W*.78,y:H*.35,r:Math.round(W*.025),lit:0},{x:W*.50,y:H*.42,r:Math.round(W*.025),lit:0},{x:W*.34,y:H*.54,r:Math.round(W*.022),lit:0},{x:W*.66,y:H*.54,r:Math.round(W*.022),lit:0}];
  const parts=[];
  function spark(x,y,col){for(let i=0;i<14;i++){const a=(Math.PI*2/14)*i,sp=1.1+Math.random()*2.3;parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.1,life:1,decay:.034+Math.random()*.024,r:2+Math.random()*2.8,col});}}
  const balls=names.map((name,i)=>({name,col:COLS[i%COLS.length],x:W/2+(Math.random()-.5)*48,y:-BR*2-i*290,vx:(Math.random()-.5)*.28,vy:0,landed:false,slot:-1,sq:1.0}));
  const taken=new Set(); let lc=0,done=false,cdOn=false,cdTimer=null;
  function chkCD(){if(cdOn||done)return;if(lc>=Math.max(2,Math.floor(N*.8))&&lc<N){cdOn=true;let cnt=5;cdEl.style.display='block';cdEl.textContent='⏱ '+cnt+'초 후 자동 배정';cdTimer=setInterval(()=>{cnt--;cdEl.textContent=cnt>0?'⏱ '+cnt+'초 후 자동 배정':'⚡ 자동 배정!';if(cnt<=0){clearInterval(cdTimer);forceAssign();}},1000);}}
  function forceAssign(){const free=Array.from({length:N},(_,i)=>i).filter(s=>!taken.has(s));balls.forEach(b=>{if(b.landed)return;const s=free.shift()??0;taken.add(s);b.slot=s;b.x=(s+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.3;lc++;spark(b.x,GY,b.col);});cdEl.style.display='none';}
  if(animFrame) cancelAnimationFrame(animFrame);
  function frame(){
    ctx.clearRect(0,0,W,H);
    // 포켓몬 스타일 배경
    ctx.fillStyle='#0A1A2E';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='rgba(61,125,202,.04)';ctx.fillRect(0,0,HALF*SW,H);
    ctx.fillStyle='rgba(204,0,0,.04)';ctx.fillRect(HALF*SW,0,W-HALF*SW,H);
    ctx.save();ctx.strokeStyle='rgba(255,203,5,.2)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(HALF*SW,0);ctx.lineTo(HALF*SW,GY-10);ctx.stroke();ctx.restore();
    for(let i=0;i<=N;i++){ctx.strokeStyle=i<=HALF?'rgba(61,125,202,.6)':'rgba(204,0,0,.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(i*SW,GY-17);ctx.lineTo(i*SW,FY);ctx.stroke();}
    for(let i=0;i<N;i++){
      const cx=(i+.5)*SW,tc=i<HALF?'#3D7DCA':'#CC0000',fi=taken.has(i);
      ctx.strokeStyle=fi?tc:tc+'3A';ctx.lineWidth=fi?2:1.2;ctx.beginPath();ctx.moveTo(i*SW+2,GY-17);ctx.lineTo(cx-3,GY-25);ctx.lineTo(cx+3,GY-25);ctx.lineTo((i+1)*SW-2,GY-17);ctx.stroke();
      ctx.fillStyle=fi?tc:tc+'44';ctx.font='bold '+Math.max(6,Math.round(SW*.16))+'px Malgun Gothic,sans-serif';ctx.textAlign='center';ctx.fillText(LABS[i],cx,GY-28);
      if(fi){ctx.fillStyle=i<HALF?'rgba(61,125,202,.08)':'rgba(204,0,0,.08)';ctx.fillRect(i*SW+1,GY,SW-2,FY-GY);ctx.fillStyle=tc;ctx.fillRect(i*SW+1,GY-5,SW-2,5);ctx.save();ctx.shadowColor=tc;ctx.shadowBlur=6;ctx.fillStyle=tc+'88';ctx.fillRect(i*SW+1,GY-5,SW-2,5);ctx.restore();}
    }
    ctx.strokeStyle='rgba(255,203,5,.5)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,FY);ctx.lineTo(W,FY);ctx.stroke();
    pegs.forEach(p=>{if(p.lit>0)p.lit--;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle=p.lit>0?'#FFCB05':'rgba(255,203,5,.45)';ctx.fill();});
    bumps.forEach(b=>{if(b.lit>0)b.lit--;const l=b.lit>0;ctx.beginPath();ctx.arc(b.x,b.y,b.r+3,0,Math.PI*2);ctx.strokeStyle=l?'#CC0000':'rgba(204,0,0,.3)';ctx.lineWidth=l?2:1.3;ctx.stroke();const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,l?'rgba(204,0,0,.6)':'rgba(204,0,0,.1)');g.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.fillStyle=l?'#fff':'rgba(204,0,0,.6)';ctx.font='bold '+b.r+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('!',b.x,b.y);ctx.textBaseline='alphabetic';});
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life-=p.decay;if(p.life<=0){parts.splice(i,1);continue;}ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fillStyle=p.col+Math.floor(p.life*255).toString(16).padStart(2,'0');ctx.fill();}
    balls.forEach(b=>{
      if(b.landed){if(b.sq!==1){b.sq+=(1-b.sq)*.13;if(Math.abs(b.sq-1)<.01)b.sq=1;}drawBall(b);return;}
      b.vy+=0.015;b.x+=b.vx;b.y+=b.vy;
      if(b.x-BR<0){b.x=BR;b.vx=Math.abs(b.vx)*.68;}if(b.x+BR>W){b.x=W-BR;b.vx=-Math.abs(b.vx)*.68;}
      pegs.forEach(p=>{const dx=b.x-p.x,dy=b.y-p.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+4&&d>0){const nx=dx/d,ny=dy/d,dot=b.vx*nx+b.vy*ny;b.vx=(b.vx-2*dot*nx)*.54;b.vy=(b.vy-2*dot*ny)*.54;b.x=p.x+nx*(BR+5);b.y=p.y+ny*(BR+5);b.vx+=(Math.random()-.5)*.35;p.lit=7;}});
      bumps.forEach(bm=>{const dx=b.x-bm.x,dy=b.y-bm.y,d=Math.sqrt(dx*dx+dy*dy);if(d<BR+bm.r&&d>0){const nx=dx/d,ny=dy/d;b.vx=nx*2.1+(Math.random()-.5)*.9;b.vy=ny*2.1-1.1;b.vy=Math.min(b.vy,-.55);b.x=bm.x+nx*(BR+bm.r+2);b.y=bm.y+ny*(BR+bm.r+2);bm.lit=11;}});
      if(b.y+BR>GY){for(let i=0;i<=N;i++){const wx=i*SW;if(b.x-BR<wx&&b.x+BR>wx){b.vx=(b.x<wx?1:-1)*Math.abs(b.vx)*.38;b.x=b.x<wx?wx+BR:wx-BR;}}b.vx*=.82;const cs=Math.floor(b.x/SW);if(cs>=0&&cs<N&&taken.has(cs)&&b.y-BR<GY&&b.y+BR>GY-5){b.y=GY-BR-4;b.vy=-(Math.abs(b.vy)*.72+1.1);b.vx+=(Math.random()-.5)*1.1;}}
      if(b.y+BR>=FY){let si=Math.max(0,Math.min(N-1,Math.floor(b.x/SW)));if(taken.has(si)){for(let d=1;d<N;d++){if(!taken.has(si-d)&&si-d>=0){si-=d;break;}if(!taken.has(si+d)&&si+d<N){si+=d;break;}}}taken.add(si);b.slot=si;b.x=(si+.5)*SW;b.y=FY-BR-1;b.vx=0;b.vy=0;b.landed=true;b.sq=1.32;lc++;spark(b.x,GY,b.col);chkCD();}
      drawBall(b);
    });
    if(lc===N&&!done){done=true;cdEl.style.display='none';if(cdTimer)clearInterval(cdTimer);statEl.textContent='⚡ 배정 완료! 🎉';onDone(balls.map(b=>({name:b.name,slot:b.slot})));}
    else if(!done) statEl.textContent='배정 중... ('+lc+'/'+N+')';
    animFrame=requestAnimationFrame(frame);
  }
  function drawBall(b){
    const bx=b.x,by=b.y,sq=b.sq||1;
    const sx=sq>1?1+(sq-1)*.48:sq<1?1+(1-sq)*.28:1,sy=sq>1?1-(sq-1)*.38:sq<1?1-(1-sq)*.22:1;
    ctx.save();ctx.translate(bx,by);ctx.scale(sx,sy);
    ctx.beginPath();ctx.arc(2,3,BR,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.4)';ctx.fill();
    const gl=ctx.createRadialGradient(0,0,BR*.28,0,0,BR+4);gl.addColorStop(0,b.col+'AA');gl.addColorStop(.5,b.col+'3A');gl.addColorStop(1,'transparent');ctx.beginPath();ctx.arc(0,0,BR+4,0,Math.PI*2);ctx.fillStyle=gl;ctx.fill();
    const gr=ctx.createRadialGradient(-BR*.26,-BR*.26,1,0,0,BR);gr.addColorStop(0,b.col+'FF');gr.addColorStop(.52,b.col+'CC');gr.addColorStop(1,b.col+'60');ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
    ctx.beginPath();ctx.arc(-BR*.27,-BR*.28,BR*.28,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.32)';ctx.fill();
    ctx.beginPath();ctx.arc(0,0,BR,0,Math.PI*2);ctx.strokeStyle=b.col;ctx.lineWidth=1.8;ctx.stroke();
    ctx.save();ctx.scale(1/sx,1/sy);ctx.font='bold '+Math.max(6,Math.round(BR*.54))+'px "Malgun Gothic",sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    const lbl=b.name.length>4?b.name.slice(0,3)+'…':b.name;
    ctx.strokeStyle='rgba(0,0,0,.75)';ctx.lineWidth=2.2;ctx.strokeText(lbl,0,0);ctx.fillStyle='#fff';ctx.fillText(lbl,0,0);
    ctx.restore();ctx.restore();
  }
  frame();
}
